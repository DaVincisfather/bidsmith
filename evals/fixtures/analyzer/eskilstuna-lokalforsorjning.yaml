  1. Upphandlingsdokument

  1.1 Upphandlingsdokument

  Eskilstuna kommun, Kommunledningskontoret (härefter kallad köparen) ser fram emot ert anbud på 

  UE 26.050 Konsult för genomlysning av Eskilstuna kommuns lokalförsörjningsprocess och 

  framtagande av ny hyresmodell.

  1.1.1 Beskrivning av direktupphandlingen

  Eskilstuna kommun har ett omfattande och varierat lokalbestånd som används för skola, vård och 

  omsorg, kontor och andra samhällsviktiga funktioner. Behovet av ändamålsenliga lokaler är stort
  och 

  förändras över tid till följd av demografiska förändringar, nya arbetssätt och krav på hållbarhet
  samt 

  ekonomiska förutsättningar.

  Lokalerna utgör en strategiskt viktig resurs och kommunen har ett behov av att säkerställa ett 

  långsiktigt hållbart och kostnadseffektivt lokalutnyttjande (externa och egna lokaler) där 

  verksamheterna förses med ändamålsenliga lokaler på kort och lång sikt utifrån ett 

  kommunkoncernövergripande perspektiv. Lokalförsörjningsprocessen mynnar ut i investeringar som 

  i sin tur påverkar förvaltningarnas lokalhyra. Kommunledningskontoret ansvarar för både 

  kommunens lokalförsörjningsprocess och hyresmodell.

  Uppdraget omfattar två delar. Dels en genomlysning av kommunens lokalförsörjningsprocess, dels 

  framtagande av ny hyresmodell.

  Syftet med uppdraget är att ta fram kvalificerade förslag på förbättringar inom båda områdena som 

  bidrar till ett effektivt lokalutnyttjande, en stärkt styrning, en ökad kostnadsmedvetenhet och 

  kostnadskontroll samt säkerställer ett ändamålsenligt stöd till kommunens verksamheter. Nyttan av 

  Sida 1/26


  de förändringar som föreslås ska ställas i relation till kostnaderna för att implementera 

  förändringarna.

  Kontrakt kommer att tecknas med en (1) leverantör under förutsättning att minst ett (1) lämpligt 

  anbud inkommer.

  1.1.2 Volym

  Uppskattad inköpsvolym  beräknas till cirka 500 timmar.

  Tecknat kontrakt innebär inte några garantier från köparen avseende inköpsvolymer. Dock förbinder 

  sig köparen att under avtalstiden köpa sitt behov av konsult/konsulter för uppdraget av
  Eskilstuna 

  kommuns genomlysning av lokalförsörjningsprocess samt framtagande av ny hyresmodell i enlighet 

  med tecknat kontrakt.

  1.1.3 Kontraktets löptid

  Kontraktets löptid är sex (6) månader med två (2) förlängningsoptioner á 1 månad. 

  Beräknat tidigast startdatum för detta kontrakt är 2026-09-01. 

  1.1.4 Kort beskrivning om Eskilstuna kommun/enheten

  Eskilstuna har ett strategiskt läge och en integrerad arbetsmarknad mitt i den expansiva
  Stockholm-

  Mälarregionen. Eskilstunas folkmängd är över 100 000 invånare. Kommunen har drygt 9 000 

  medarbetare, organiserade i åtta förvaltningar och en bolagskoncern. Mer information finns på 

  kommunens hemsida: eskilstuna.se

  Fastighetsenheten har som uppgift att företräda Eskilstuna kommun som ägare av 

  verksamhetsfastigheter som till exempel skolor, äldreboenden, kontor och kultur- och 

  idrottsanläggningar. Vi företräder kommunen i frågor som bland annat gäller långsiktiga 

  investeringsbehov, underhållsplaner, energieffektiviseringar och tillgänglighetsåtgärder. 

  1.1.5 Stöd för anbudsgivare

  Eskilstuna kommun har en företagswebb med information relaterad till upphandling: 

  https://foretag.eskilstuna.se/

  På företagswebben finns också ett  leverantörsregister i vilket leverantör kan registera uppgifter
  om 

  sitt företag: https://foretag.eskilstuna.se/foretag/upphandling/leverantorsregister/

  På Upphandlingsmyndighetens webbsida finns ytterligare information om offentlig upphandling: 

  https://www.upphandlingsmyndigheten.se/

  1.1.6 Upphandlande myndighet

  Upphandlande myndighet i denna direktupphandling är Eskilstuna kommun, org.nr 212000–0357, 

  Kommunstyrelsen.

  1.1.7 Helt anbud

  Anbud ska lämnas på hela uppdraget.

  1.1.8 Upphandlingsförfarande

  Upphandlingen genomförs som en direktupphandling enligt lagen om offentlig upphandling 

  (2016:1145) LOU.

  Kontrakt tilldelas det eller de anbud som uppfyllt samtliga krav och lämnat det ekonomiskt mest 

  fördelaktiga anbudet. Av upphandlingsdokumentet framgår vilka krav som gäller samt hur det eller 

