  1.2.4 Anbudets giltighetstid

  Anbudet ska vara bindande t.o.m.

  2026-12-10

  Om en ansökan om överprövning inkommer avseende upphandlingen förlängs lämnade anbuds 

  giltighetstid automatiskt med sex (6) månader.

  1.2.5 Rättelse, förtydligande och komplettering

  Köparen kan tillåta anbudsgivare att rätta felskrivning, felräkning eller annat fel i anbudet.
  Endast 

  köparen kan begära att ett anbud förtydligas eller kompletteras om det är förenliga med de 

  grundläggande upphandlingsprinciperna.

  1.2.6 Elektronisk signering

  Köparen tillämpar elektronisk signering av kontrakt med krav på elektronisk identifiering 

  med exempelvis Mobilt BankID. Mer information om signering lämnas i samband med 

  eventuellt tecknande av kontrakt.

  1.2.7 Offentlig handling

  Anbud som lämnas till köparen blir i och med tilldelningsbeslutet som huvudregel en offentlig
  allmän 

  handling enligt Offentlighets- och sekretesslagen (2009:400), OSL. Köparen eftersträvar öppenhet
  i 

  upphandlingar och anbud och ämnar att i så hög grad som möjligt redovisa skälen till varför ett 

  anbud har antagits eller inte. Köparen önskar också att anbudsgivare i så hög utsträckning som 

  möjligt ska kunna granska en konkurrents anbud som antagits. Med detta som bakgrund ber 

  köparen anbudsgivare att om möjligt inte begära sekretess för innehållet i anbudet. Om anbudet 

  ändå innehåller affärskänsliga uppgifter ber köparen anbudsgivaren att i så hög utsträckning som 

  möjligt begränsa sekretessbegäran till de uppgifter som är särskilt känsliga.

  Om anbudsgivare önskar sekretess för innehåll som lämnas till köparen med anledning av 

  upphandlingen, ska detta anges under denna punkt.

  Anbudsgivaren ska, på ett tydligt sätt, beskriva vilken information som denne anser ska 

  sekretessbeläggas. Anbudsgivaren ska också motivera varför varje information ska 

  sekretessbeläggas.

  En eventuell sekretessbegäran bör struktureras enligt följande;

  - Vilken information (såsom bilaga eller del av bilaga eller uppgift i dokument), i inlämnad 

  dokumentation som anbudsgivaren anser känslig.

  - Specificera var informationen återfinns/hittats, exempelvis punktreferens, namn på eventuell
  bilaga 

  samt rubrik.

  - Skälen till varför informationen är särskilt känslig

  Notera att köparen inte kan garantera att någon sekretess medges, utan att det avgörs vid varje 

  enskilt tillfälle som informationen begärs ut. Det är viktigt att anbudsgivaren utförligt
  motiverar vad 

  som föranleder begäran om sekretess för att köparen ska kunna göra en rättvis bedömning.

  Beskriv eventuell sekretessbegäran i enlighet med punktlistan 1.2.7 ovan.  

  Om sekretess inte önskas, ange "Nej" i svarsrutan.

