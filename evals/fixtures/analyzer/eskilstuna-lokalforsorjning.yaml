  sikt.

  1.5.3 Framtagande av ny hyresmodell

  Anbudsgivaren ska ta fram förslag på en ny modell som skapar bra planeringsförutsättningar och 

  som bidrar till ett effektivt lokalutnyttjande. Se bilaga 1 Information nuvarande hyresmodell. 
   
  Den nya modellen ska:

  Vara enkel att förstå och förutsägbar, det vill säga det ska vara enkelt att förstå vad som 

  påverkar modellen och vad som driver kostnader och det ska finnas en förutsägbarhet i hyran.

  •

  Vara administrativt enkel.•

  Vara utformad så att den främjar resurs- och kostnadseffektivitet. Modellen ska säkerställa 

  nödvändiga investeringar.

  •

  Prissättning ska spegla någon typ av självkostnad, dock inte nödvändigtvis per 

  fastighet/byggnad eller år (men över tid). Anbudsgivaren ska ha i åtanke att hyror till skolan 

  påverkar skolpengen som betalas till fristående enheter.

  •

  Innehålla principer för hantering av komponentutbyten, verksamhetsanpassningar, 

  energiinvesteringar, beredskapsfrågor och lagstyrda investeringar och hur detta påverkar hyran.

  •

  Genomföra en simulering av hur den nya modellen slår på respektive fastighet•

  1.5.4 Leverans

  Anbudsgivaren ska lämna in förslag på metod och angreppssätt.

  Uppdraget ska resultera i en skriftlig rapport innehållande analys, slutsatser och
  rekommendationer.

  Rapporten ska presenteras för Eskilstuna kommunledning vid särskilt avstämningsmöte.

  1.5.5 Kvalitet

  Samtliga tjänster ska tillhandahållas i enlighet med kraven och villkoren i detta 

  upphandlingsdokument och uppfylla de krav som häri föreskrivits.

  Den skriftliga rapporten och tillhörande presentation ska:

  Vara välstrukturerad, tydlig och fackmässigt utformad.•

  Bygga på verifierbara uppgifter och transparenta analysmetoder.•

  Vara kvalitetssäkrad innan leverans, inklusive språkgranskning och faktagranskning.•

  1.5.6 Kompetens och erfarenhet

  Konsulten ska ha för uppdraget erforderlig kompetens och dokumenterad erfarenhet av liknande 

  uppdrag. Erfarenhet från arbete inom kommunal sektor är meriterande. 

  Anbudsgivaren ska ha dokumenterade rutiner som säkerställa att konsult med rätt kompetens 

  förmedlas till aktuella uppdrag.

  Konsulten ska ha: 

  För uppdraget relevant examen eller utbildning (t.ex ekonomi, fastighet, offentlig förvaltning
  eller 

  motsvarande)

  •

  Dokumenterad erfarenhet att leda workshops, genomföra dialogprocesser och driva 

  förändringsarbete.

  •

  Behärska svenska språket flytande i tal och skrift.•

