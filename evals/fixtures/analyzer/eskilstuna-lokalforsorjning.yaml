  2.4 Fakturaspecifikation.

  2.8.3 Ansvarsbegränsning

  Parts ansvar omfattar endast direkta skador. Leverantörens ansvar begränsas till att per
  skadetillfälle 

  inte överstiga 15 % av den ersättning som leverantören uppskattas vara berättigad till per 

  ramavtalsår.
   
  Detta villkor gäller inte för de fall leverantören handlat uppsåtligt eller grovt vårdslöst.

  2.8.4 Befrielsegrund

  Leverantören ska vara befriad från sina åtaganden om denne kan visa att det inträffat hinder
  utanför 

  dennes kontroll, som denne skäligen inte kunnat förutse när ramavtalet slöts och vars följder
  denne 

  inte heller skäligen kunnat undvika eller övervinna.  
   
  För att leverantören ska ha rätt att göra gällande befrielsegrund enligt ovan, ska denne utan
  dröjsmål 

  underrätta köparen om uppkomsten därav, liksom om dess upphörande. Leverantören ska därvid 

  också informera köparen om när fullgörelse beräknas kunna ske.
   
  Leverantören är emellertid alltid skyldig att vidta skäliga åtgärder för att minimera köparens
  skada. 

  Leverantören är ersättningsskyldig för sådana skador som denne inte förhindrat eller begränsat,
  men 

  som denne genom rimliga och skäliga åtgärder kunnat begränsa eller förhindra.

  2.8.5 Reklamation

  Kommunen ska reklamera fel utan oskäligt uppehåll efter att felet visat sig. Fel som kommunen 

  påtalar inom 3 månader från leverans ska anses ha förelegat vid köptillfället. För fel som visar
  sig 

  efter utgången av denna tid är leverantörers ansvar begränsat till garantiutfästelser som en följd
  av 

  krav i upphandlingen eller vad som i övrigt följer av antagen offert/anbud.

  Leverantören ska efter kommunens önskemål utan dröjsmål antingen vidta omleverans, avhjälpa 

  felet eller kreditera (prisavdrag) kommunen i skälig utsträckning.

  2.9 Övriga kontraktsvillkor

  2.9.1 Nyttjanderätt

  Köparen ska ha ägande- och nyttjanderätt till leverantörens arbetsresultat, med undantag för
  ideell 

  rätt, i det fall detta är framställt och eller anpassat för köparens räkning. Detta innebär att
  köparen 

  fritt får nyttja sådant material, inklusive göra ändringar som inte strider mot den ideella rätten
  samt 

  överlåta sin upphovsrätt vidare på annan. Leverantören får inte utan skriftligt medgivande av 

  köparen publicera eller på annat sätt nyttja arbetsmaterial eller arbetsresultat framställt för
  köparen. 

  Allteftersom arbetet fortskrider överlåter leverantören sina rättigheter till köparen. 

