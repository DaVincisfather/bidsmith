  2.1.9 Ansvar

  Leverantören svarar för att uppdraget genomförs fackmannamässigt och i enlighet med god sed. 

  Leverantören har att tillse och ansvara för att dennes personal har erforderlig kompetens och att 

  kapacitet löpande finns att tillgå hos leverantören under hela kontraktstiden. Krav och villkor i 

  kravspecifikation samt andra för uppdraget relevanta handlingar såsom bilagor, tekniska 

  beskrivningar samt anvisningar etc., accepteras av leverantören och utgör kontraktsvillkor för 

  uppdragets fullgörande och träffas därmed av kontraktets sanktioner. Relevanta handlingar biläggs 

  detta kontrakt i enlighet med punkt "kontraktshandlingar".

  2.1.10 Viljeriktning

  Parterna är medvetna om att kontraktet inte kan reglera samtliga frågeställningar och händelser
  som 

  kan tänkas uppkomma till följd av ständig utveckling och förändrade förhållanden. Parterna ska 

  sträva efter att anpassa sig till sådana nya förhållanden som kan uppstå under kontraktstiden, för
  att 

  på så sätt tillgodose varandras ändrade förutsättningar och behov. Kontraktet bygger på
  ömsesidigt 

  förtroende mellan parterna.

  2.1.11 Förändring av uppdragsinnehåll

  Köparen ska, i samråd med leverantören, revidera uppdraget/leveransen (ingående tjänster) och 

  anpassa detta till köparens faktiska behov. Tillkommande tjänster ska prissättas enligt samma 

  principer som tillämpades vid upphandlingen.
   
  Köparen kan komma att göra förändringar i avtalat tjänsteutbud. Sådana förändringar ska göras i 

  samråd med leverantören. Leverantören får inte utan köparens godkännande byta ut eller ingående 

  tjänst i avtalat tjänsteutbud. Vidare ska avtalat tjänsteutbud löpande revideras och anpassas
  till 

  köparens faktiska behov. Vid förändringar ska leverantören bistå köparen med uppdatering av 

  prislista.

  2.1.12 Utbyte av konsult/nyckelperson på leverantörens initiativ

  Leverantören får inte byta ut namngiven konsult/nyckelperson utan godkännande från köparen. 

  Godkännande ges främst då konsult/nyckelperson avslutat sin anställning hos leverantören eller
  bytt 

  arbetsuppgifter. Ersättande konsult/nyckelperson ska minst uppfylla de krav som ställdes på 

  konsult/nyckelperson i den upphandling som ledde fram till detta kontrakt, samt i övrigt ha
  likvärdig 

  kompetens. Köparen avgör, på underlag som tillhandahålls av leverantören, om ersättande 

  konsult/nyckelperson har likvärdig kompetens.

  2.1.13 Utbyte av konsult/nyckelperson på köparens initiativ

  Leverantören är skyldig att utan oskäligt dröjsmål ersätta konsult/nyckelperson som köparen anser 

  sakna erforderlig kompetens eller med vilken köparen anser sig ha samarbetssvårigheter.

  2.1.14 Underleverantör

  Leverantören får inte anlita underleverantör för direkt medverkan till kontraktets fullgörande,
  utan 

  köparens medgivande. Leverantören svarar för underleverantörs arbete som för eget arbete.

  Följande underleverantörer var godkända vid kontraktets tecknande: / Ingen underleverantör är 

