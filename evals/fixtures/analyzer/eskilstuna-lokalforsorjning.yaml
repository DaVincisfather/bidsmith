  1.3.7 Sanktioner mot Ryssland och Belarus

  Som en följd av rådande sanktioner mot Ryssland kan Kommunen, i enlighet med 19 kap. 17 § LOU, 

  komma att utesluta leverantörer som tillhör någon av följande personkategorier: 

  1) Ryska medborgare. 

  2) Fysiska och juridiska personer, enheter eller organ (oavsett eventuell bolagsform) som är
  bosatta 

  eller etablerade i Ryssland. 

  3) Juridiska personer, enheter eller organ (oavsett eventuell bolagsform) som till mer än 50 % 

  direkt eller indirekt ägs av någon som avses i 1) eller 2) ovan. 

  4) Fysiska eller juridiska personer, enheter eller organ som agerar för, eller på uppdrag av, 

  någon person eller organisation som avses i 1) – 3) ovan.

  Kommunen kan även komma att utesluta leverantörer som avser att använda underleverantör 

  eller annan samarbetspartner som tillhör någon av personkategorierna 1) – 4) ovan vid
  fullgörandet 

  av det kontrakt som upphandlingen avser, om underleverantören eller samarbetspartnern står för 

  mer än 10 % av kontraktets värde.  

  Kommunen kan även komma att utesluta leverantörer som åberopar kapaciteten hos någon 

  som avses i 1) – 4) ovan för att uppfylla kvalificeringskraven i upphandlingen.

