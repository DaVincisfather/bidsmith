  1.1.9 Frågor under anbudstiden och förtydliganden/kompletteringar

  Köparen avser med upphandlingsdokumenten att ge en saklig och allsidig information 

  om förutsättningarna för upphandlingen och uppdraget. I upphandlingsdokumenten anges de krav 

  som köparen ställer på anbudsgivaren och på anbudet samt hur köparen kommer att 

  utvärdera anbuden. Det är därför angeläget att anbudsgivaren kontaktar köparen om något är oklart.
   
  Frågor ställs via frågor- och svarsfunktionen i TendSign.
   
  Svar med tillhörande fråga och eventuella kompletteringar/förtydliganden, delges via tendsign.com 

  till samtliga (i TendSign) registrerade underlagshämtare för aktuell upphandling. Om underlaget 

  hämtas på annat sätt, är det anbudsgivarens skyldighet att själv hålla sig informerad om
  eventuella 

  förändringar. Eventuella frågor efter sista datum för frågor har löpt ut besvaras som regel ej.
   
  Frågor om systemet ställs till TendSign support per e-post: tendsignsupport@mercell.com. 

  Manual, instruktionsfilm och vanliga frågor och svar finns på www.tendsign.com/support. TendSign 

  support har vanligtvis öppet vardagar 07.00-17.00, avvikelser kan förekomma. 
   
  Frågor med anledning av upphandlingen ska ställas till köparen senast

  2026-06-08

  1.1.10 Avbrytande av upphandling

  Upphandlingen kan komma att avbrytas om sakliga skäl föreligger. Om upphandlingen avbryts innan 

  sista anbudsdag kommer samtliga som hämtat upphandlingsdokumenten att underrättas om detta. 

  Om upphandlingen avbryts efter sista anbudsdag kommer samtliga anbudsgivare att underrättas om 

  detta.

  Ersättning för kostnader i samband med anbudslämnande kommer inte i något fall att betalas ut.

  1.2 Anbudsgivning

  1.2.1 Anbudets form och innehåll

  Anbudet inklusive bilagor ska lämnas skriftligen på svenska och elektroniskt i TendSign. 

  Bifogade dokument ska vara i Word, Excel eller PDF-format. Dokumentation såsom tekniska 

  specifikationer och intyg om certifiering får lämnas på engelska. 

  Ofullständiga eller orena anbud kommer inte att prövas

  1.2.2 Reserverationer mot krav och villkor

  Anbud som innehåller reservationer mot krav och/eller villkor i upphandlingsdokumenten kan komma 

  att förkastas. Bifoga därför inga handlingar som inte uttryckligen efterfrågas. Handlingar som
  kan 

  innehålla reservationer är exempelvis anbudsgivares egna avtalsvillkor såsom Allmänna villkor
  eller 

  liknande. Eventuella handlingar som innehåller reservationer och som bifogats anbudet, men som 

  inte ansetts motivera ett förkastande och som saknar relevans för uppdraget, kommer vid en 

  eventuell tilldelning inte att utgöra en del av ramavtalsvillkoren/kontraktsvillkoren.

  1.2.3 Sista anbudsdag

  Anbud som inkommer efter sista anbudsdag kommer inte att prövas.

  Sista anbudsdag är 2026-06-10 23:59.

