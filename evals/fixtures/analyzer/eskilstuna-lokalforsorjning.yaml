  1.2.9 Intygande om sanningsenligt uppgiftslämnande

  Genom att besvara frågan nedan med "Ja" intygar anbudsgivaren att samtliga uppgifter lämnade 

  med anbudet är sanningsenliga.

  Krav enligt ovan uppfylls?

  Ja/Nej. Ja krävs

  1.3 Krav på leverantören

  1.3.1 Uteslutning

  Uteslutningsgrunderna som framgår av 13 kap 1–3 §§ LOU gäller för denna upphandling.  

  Utöver dessa uteslutningsgrunder, tillämpas även den särskilda uteslutningsgrund som anges 

  nedan. Syftet med uteslutningen är att säkerställa att ramavtal endast tecknas med seriösa 

  leverantörer.

  Samtliga angivna uteslutningsgrunder enligt denna punkt kommer, utöver tillämpning gentemot 

  anbudsgivare, även att tillämpas gentemot eventuella underleverantörer. Tillämpning kommer att 

  göras oaktat om underleverantör åberopas för kapacitet eller om underleverantör medverkar till 

  ramavtalets/kontraktets fullgörande.

  Anbudsgivare ska intyga, att denne såväl som eventuell underleverantör enligt ovan, inte berörs
  av 

  någon av de uteslutningsgrunder som framgår av 13 kap 1–3 §§ LOU.

  Anbudsgivaren ska intyga ovanstående

  Ja/Nej. Ja krävs

