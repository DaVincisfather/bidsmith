golden:
  title: Konsult för genomlysning av Eskilstuna kommuns lokalförsörjningsprocess och framtagande av ny
    hyresmodell
  client: Eskilstuna kommun, Kommunledningskontoret
  deadline: 2026-06-10
  summary: Eskilstuna kommun söker en konsult för att genomlysa kommunens lokalförsörjningsprocess
    samt ta fram en ny hyresmodell. Uppdraget syftar till att stärka styrning, öka
    kostnadsmedvetenhet och säkerställa ändamålsenliga lokaler på kort och lång sikt. Uppdraget
    beräknas till ca 500 timmar och ska resultera i skriftliga rapporter med rekommendationer.
  background: Eskilstuna kommun förvaltar ett omfattande och varierat lokalbestånd för skola, vård och
    omsorg, kontor och samhällsviktiga funktioner. Behovet av lokaler förändras över tid på grund av
    demografiska förändringar, nya arbetssätt och hållbarhetskrav. Kommunledningskontoret ansvarar
    för både lokalförsörjningsprocessen och hyresmodellen. Lokalförsörjningsprocessen mynnar ut i
    investeringar som påverkar förvaltningarnas lokalhyra, varför en effektiv process och en tydlig
    hyresmodell är strategiskt viktiga. Kommunen har drygt 9 000 medarbetare organiserade i åtta
    förvaltningar och en bolagskoncern, med ett strategiskt läge i Stockholm-Mälarregionen.
    Nuvarande process och hyresmodell bedöms behöva ses över för att möjliggöra bättre överblick,
    kostnadseffektivitet och ändamålsenligt stöd till verksamheterna.
  diaryNumber: UE 26.050
  requirements:
    - category: Uppdragsinnehåll
      description: Genomlysning av Eskilstuna kommuns lokalförsörjningsprocess inklusive roller, ansvar,
        mandat, gränssnitt mot investeringsprocessen, lokalbankens roll, beslutsunderlag, styrning
        och jämförelser med god praxis.
      priority: must
    - category: Uppdragsinnehåll
      description: Framtagande av förslag på ny hyresmodell som är enkel, förutsägbar, administrativt
        enkel, kostnadseffektiv, baserad på självkostnadsprincipen och innehåller simulering av
        effekter per fastighet.
      priority: must
    - category: Leverans
      description: Skriftlig rapport innehållande analys, slutsatser och rekommendationer för varje
        uppdragsdel, levererad senast 2027-02-28.
      priority: must
    - category: Leverans
      description: Presentation av rapporternas resultat och rekommendationer för Eskilstuna kommunledning
        vid särskilt avstämningsmöte.
      priority: must
    - category: Kompetens
      description: Konsult ska ha relevant examen eller utbildning (ekonomi, fastighet, offentlig
        förvaltning eller motsvarande) och dokumenterad erfarenhet av liknande uppdrag.
      priority: must
    - category: Kompetens
      description: Konsult ska ha dokumenterad erfarenhet av att leda workshops, genomföra dialogprocesser
        och driva förändringsarbete.
      priority: must
    - category: Kompetens
      description: Konsult ska behärska svenska flytande i tal och skrift.
      priority: must
    - category: Kvalitet
      description: Rapporten ska vara välstrukturerad, tydlig, fackmässigt utformad, bygga på verifierbara
        uppgifter och vara kvalitetssäkrad (språk- och faktagranskad) innan leverans.
      priority: must
    - category: Leverantörskrav
      description: Anbudsgivaren ska ha ratingklassificering minst 'A' i Riskguardian, inga oreglerade
        skatteskulder, vara registrerad för moms och F-skatt.
      priority: must
    - category: Leverantörskrav
      description: Anbudsgivaren ska ange tre referenspersoner för liknande uppdrag utförda de senaste fem
        åren, där referenspersonerna ska tala och skriva svenska.
      priority: must
    - category: Leverantörskrav
      description: Anbudsgivaren ska arbeta systematiskt med miljö och kunna bevisa detta med certifikat
        eller beskrivning inkl. miljöpolicy och handlingsplaner.
      priority: must
    - category: Leverantörskrav
      description: Anbudsgivaren ska arbeta systematiskt med kvalitet och kunna bevisa detta med
        certifikat eller beskrivning inkl. kvalitetspolicy och handlingsplaner.
      priority: must
    - category: Kompetens
      description: Erfarenhet från arbete inom kommunal sektor är meriterande.
      priority: nice-to-have
    - category: Metodbeskrivning
      description: Anbudsgivaren ska vid uppdragsstart presentera projektorganisation, namngivna
        konsulter, metod, arbetssätt och tidplan.
      priority: must
    - category: Kommersiella villkor
      description: Leverantören ska skicka elektroniska fakturor och fakturering ska ske löpande månadsvis
        i efterskott.
      priority: must
  evaluationCriteria:
    - name: Metodbeskrivning
      weight: null
      description: Bedömning av anbudsgivarens beskrivna metod och angreppssätt för uppdragets
        genomförande. Rangordnat som första kriterium — källan anger ingen procentvikt.
    - name: Kompetens/Erfarenhet
      weight: null
      description: Bedömning av offererade konsulters dokumenterade kompetens och erfarenhet av liknande
        uppdrag. Rangordnat som andra kriterium — källan anger ingen procentvikt.
    - name: Referenser
      weight: null
      description: Bedömning baserad på referenspersoners svar kring levererad kvalitet, problemhantering,
        kommunikation och helhetsomdöme. Rangordnat som tredje kriterium — källan anger ingen procentvikt.
    - name: Pris
      weight: null
      description: Utvärderingspris är det offererade timpriset i SEK exklusive moms. Rangordnat som
        fjärde kriterium — källan anger ingen procentvikt.
  requiredCompetencies:
    - Relevant akademisk examen inom ekonomi, fastighet eller offentlig förvaltning
    - Dokumenterad erfarenhet av liknande uppdrag
    - Erfarenhet av att leda workshops och dialogprocesser
    - Erfarenhet av förändringsarbete
    - Flytande svenska i tal och skrift
    - God förmåga att dokumentera analys och slutsatser
    - Kännedom om relevant lagstiftning för uppdraget
    - Personlig lämplighet, integritet och hög ansvarskänsla
  estimatedScope: Ca 500 timmar, kontraktstid 6 månader (2026-09-01 till 2027-02-28) med två
    förlängningsoptioner á 1 månad. Fast timpris, en leverantör.
  redFlags:
    - Anbudstiden är extremt kort (publicerad 2026-06-04, sista anbudsdag 2026-06-10 – endast 6
      dagar), vilket starkt begränsar konkurrensen.
    - Utvärderingskriteriernas inbördes viktning är inte numeriskt specificerad i dokumentet, utan
      anges endast som rangordning – detta skapar osäkerhet kring den faktiska viktningen.
    - Kravet på tre referenspersoner anges initialt som 'två (3)' vilket är en uppenbbar
      felskrivning i dokumentet.
    - Ansvarsbegränsningen är satt till 15% av uppskattad ersättning per ramavtalsår, vilket kan vara
      lågt vid mer komplexa fel.
    - Ingen information om nuvarande hyresmodell finns i upphandlingsdokumentet (hänvisas till
      Bilaga 1 som inte är tillgänglig i detta dokument), vilket försvårar anbudsgivarens möjlighet
      att offerera adekvat.
    - Garanterad volym saknas – kommunen förbinder sig att köpa behovet men det finns inga
      minimivolymer.
  domain: Fastighet & lokalförsörjning, kommunal förvaltning
  oslReference: 2009:400
