  Parterna är medvetna om att EU kan komma att besluta om nya sanktioner under kontraktstiden. Vid 

  förändringar av sanktionsreglerna får köparen besluta om sådana justeringar av detta avsnitt som
  är 

  nödvändiga för att efterleva nya eller ändrade krav. Leverantören får inte motsätta sig,
  fördröja, 

  försvåra eller äventyra genomförandet av de justeringar som köparen meddelat med hänvisning till 

  ändringar av sanktionsreglerna.

  2.17 Tvist

  Om tvist uppstår inom ramen för detta kontrakt ska den i första hand lösas av parterna. I andra
  hand 

  ska tvist hänskjutas till svensk allmän domstol på köparens hemort och avgöras enligt svensk rätt.

  2.18 Skadestånd

  Om kontraktet upphör på grund av hävning eller förtida upphörande, äger skadelidanden rätt till 

  skadestånd. Leverantören är i det sammanhanget skyldig att redovisa och härvid lag överlämna 

  samtliga med anledning av uppdraget relevanta handlingar.

  Reklamationsärenden och meddelande om hävning ska ske skriftligen till kontaktperson för 

  respektive part.

  2.19 Hävning och omedelbart upphörande

  Köparen har rätt att, med omedelbar verkan, häva kontraktet vid följande situationer:

  Leverantören väsentligen brister i någon förpliktelse enligt kontraktet och inte inom 30 dagar 

  efter skriftlig anmodan vidtagit rättelse, alternativt vid upprepade tillfällen brister i någon 

  förpliktelse enligt kontraktet, och inte inom 30 dagar efter skriftlig anmodan vidtagit rättelse.

  •

  Leverantören utför sina åtaganden så bristfälligt att maximalt vite utfaller tre (3) månader i
  följd, 

  alternativt fem (5) gånger under en 12-månadersperiod.

  •

  Leverantören åsidosätter sina åtaganden enligt avsnitt Intrång.•

  Leverantören åsidosätter sina åtaganden enligt avsnitt Sekretess.•

  Leverantören åsidosätter sina åtaganden enligt avsnitt Arbetsrättsliga villkor.•

  Leverantören åsidosätter sina åtaganden enligt avsnitt Antidiskriminering.•

  Det framkommer att leverantören har lämnat oriktiga uppgifter i anbudet eller på annat sätt i 

  samband med upphandlingen och dessa uppgifter har varit av väsentlig betydelse vid 

  bedömning avseende tilldelning av kontraktet.

  •

  Någon omständighet föreligger som skulle kunna utesluta leverantören från upphandling enligt 

  13 kap. 1-3 §§ LOU eller de särskilda uteslutningsgrunder som framgår av avsnitt1.3.1 

  Uteslutning.

  •
   
  Vid hävning av kontraktet väljer köparen fritt om hävningen ska avse hela kontraktet eller delar 

  därav. 
   
  Köparen har vidare rätt att säga upp kontraktet till omedelbart upphörande vid följande
  situationer: 

  - Om kontraktet varit föremål för en ändring som inte är tillåten enligt 17 kap. 9–14 §§ LOU. 

  - Om omständighet som anges i 17 kap. 17 § p. 3 LOU inträffar.
   
  Meddelande om hävning sker skriftligen till vid var tid av leverantören för kontraktet angiven 

  kontaktperson.

  2.20 Tecknade av kontrakt

  Bindande överenskommelse föreligger när båda parter signerat detta kontrakt. Kontraktet signeras 

  elektroniskt.

