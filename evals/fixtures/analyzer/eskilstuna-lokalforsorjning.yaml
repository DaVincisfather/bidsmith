  I detta avsnitt avser hänvisningar till ”underleverantör” samtliga underleverantörer, leverantörer
  och 

  enheter vars kapacitet nyttjas i den mening som avses i Europaparlamentets och rådets direktiv 

  2014/23/EU, direktiv 2014/24/EU, direktiv 2014/25/EU samt direktiv 2009/81/EG (oavsett led i 

  leverantörskedjan). 
   
  Leverantören garanterar att: 

  a) leverantören varken direkt eller indirekt är föremål för en sanktionsåtgärd beslutad av EU 

  inklusive, men inte begränsat till, rådets förordning (EU) nr 833/2014, rådets förordning (EU) nr 

  269/2014, rådets förordning (EG) nr 765/2006 samt rådets beslut 2012/642/Gusp (gemensamt 

  ”sanktionsreglerna”), 

  b) inga i kontraktet ingående varor eller tjänster har sitt ursprung i eller har exporterats från
  Ryssland 

  eller Belarus, och 

  c) leverantören inom ramen för detta kontrakt inte har eller kommer att (i) anlita eller betala 

  underleverantör som är föremål för sanktion enligt sanktionsreglerna, (ii) på annat sätt medverka
  till 

  köp, import eller transport av varor eller tjänster som omfattas av sanktionsreglerna, eller (iii)
  i övrigt 

  företräda ryska intressen i strid med sanktionsreglerna. 
   
  Leverantören ska samarbeta fullt ut med köparen i frågor som rör efterlevnaden av 

  sanktionsreglerna enligt vid var tid gällande lydelse, vilket bland annat innebär att leverantören
  ska: 

  a) hålla köparen informerad om relevanta förhållanden, samt tillhandahålla köparen de uppgifter
  som 

  är nödvändiga i detta avseende, 

  b) löpande genomföra och dokumentera kontroller av underleverantörer för att säkerställa att 

  sanktionsreglerna efterlevs, 

  c) ge köparen nödvändig insyn i relevanta delar av leverantörens och dess underleverantörers 

  verksamhet, och 

  d) omedelbart meddela köparen om leverantören, någon av dess underleverantörer eller detta 

  kontrakt direkt eller indirekt (till exempel på grund av förändringar i ägarförhållanden,
  kontraktet eller 

  annat skäl) är eller blir föremål för sanktioner enligt sanktionsreglerna (oavsett vilken
  påverkan 

  leverantören bedömer att sådana förhållanden har på detta kontrakt). 
   
  Köparens skyldighet att betala och i övrigt fullgöra sina skyldigheter enligt detta kontrakt är
  villkorad 

  av att leverantören vid varje given tidpunkt kan visa att varken leverantören eller dess 

  underleverantörer är föremål för sanktioner enligt sanktionsreglerna. Detta innebär bland annat
  att 

  köparen inte är skyldig att betala eller fullgöra annan avtalad skyldighet i den mån sådan
  fullgörelse 

  skulle innebära en överträdelse av sanktionsreglerna. Detsamma gäller om det enligt köparens 

  skäliga och välgrundade bedömning inte kan uteslutas att fullgörelse av en viss skyldighet enligt 

  detta kontrakt skulle innebära att köparen bryter mot sanktionsreglerna. 
   
  Vidare får köparen säga upp detta kontrakt till omedelbart upphörande (eller den senare tidpunkt 

  som köparen meddelar) om: 

  a) köparen (under viss period eller tills vidare) inte längre får köpa varor eller tjänster eller
  betala 

  enligt detta kontrakt på grund av att leverantören direkt eller indirekt är eller blir föremål
  för 

  sanktioner enligt sanktionsreglerna, eller 

  b) leverantören inte samarbetar fullt ut med köparen på det sätt som anges i tredje stycket ovan,
  i 

  detta avsnitt. 
   
  Om köparen bedömer att ett hinder mot fortsatt fullgörelse av detta kontrakt kan läkas genom
  utbyte 

  av viss underleverantör eller viss vara eller tjänst som ingår i kontraktet, ska leverantören på 

  köparens begäran omedelbart byta ut sådan underleverantör, vara eller tjänst (såsom tillämpligt) 

  utan rätt till tidsförlängning eller tillkommande ersättning. Om aktuell underleverantörs
  kapacitet 

  åberopats i upphandlingen som föregick detta kontrakt, ska leverantören därutöver (i) säkerställa
  att 

  ersättaren uppfyller alla relevanta krav som ställdes i upphandlingen, och (ii) inhämta köparens 

  godkännande av den nya underleverantören. 
   
  Det faktum att leverantören eller någon av dess underleverantörer är eller blir föremål för
  sanktioner 

  enligt sanktionsreglerna utgör inte Force Majeure/befrielsegrund för leverantören, och får inte
  heller 

  åberopas av leverantören som grund för tidsförlängning eller annan befrielse från ansvar enligt
  detta 

  kontrakt. 
   
