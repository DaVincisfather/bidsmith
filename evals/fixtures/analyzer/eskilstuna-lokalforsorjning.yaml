  1.5.2 Genomlysning av lokalförsörjningsprocessen

  Anbudsgivaren ska genomföra en genomlysning av Eskilstuna kommuns lokalförsörjningsprocess 

  samt lämna förslag på förbättringar. 

  Arbetet ska omfatta, men är inte begränsat till, följande:

  Genomlysning av processen inklusive roller, ansvar, mandat och befogenheter, med den 

  beslutade lokalförsörjningsprocessen som utgångspunkt. I kartläggningen ska gränssnittet mot 

  investeringsprocessen förtydligas.

  •

  Lokalbankens roll och funktion för en kostnadseffektiv lokalanvändning ska analyseras.•

  Analys av beslutsunderlag utifrån relevans och kvalitet samt beslutspunkter och beslutsnivåer i 

  respektive skede av processen (lokaliseringsprövning, volymstudie, förstudie, byggprojekt med 

  mera).

  •

  Analys av i vilken utsträckning verksamheterna får det stöd de behöver från fastighetsenheten i 

  lokalförsörjningsprocessens olika delar och vice versa.

  •

  Bedömning av styrning, uppföljning och det långsiktigt strategiska arbetet inom lokalområdet.•

  Prövning av förutsättningarna för att bedriva en effektiv lokalförsörjningsprocess, där tekniska 

  systemstöd, organisatoriska strukturer, kompetensförsörjning och styrmodell analyseras.

  •

  Jämförelser med god praxis från andra kommuner eller motsvarande organisationer.•

