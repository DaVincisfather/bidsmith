  inom 30 dagar från det att kommunen skriftligen påtalat bristerna.

  Leverantören visar sig ha lämnat oriktiga uppgifter i anbudet eller vilselett kommunen på annat 

  sätt innan kontraktet har ingåtts och dessa omständigheter får anses vara av väsentlig 

  betydelse för kontraktets fullgörande.

  •

  Leverantören inte längre uppfyller de i direktupphandlingen ställda kraven.•

  Någon omständighet föreligger som skulle kunna utesluta leverantören från upphandling enligt 

  13 kap 1-3 § LOU

  •

  Vid förtida upphörande av kontraktet väljer kommunen fritt om hela avtalet eller delar därav sägs 

  upp.

  2.12 Avveckling

  I en framtida avveckling åtar sig leverantören att genomföra alla de aktiviteter som krävs för
  att 

  avveckling och överföring till köparen och/eller ny leverantör ska kunna ske på ett kontrollerat,
  säkert 

  och fackmannamässigt sätt. Leverantören är medveten om att det är av högsta vikt för köparen att 

  avveckling och överföring sker med minimal påverkan för verksamheterna. 
   
  Leverantören ska också, i så stor utsträckning som möjligt, verka för att avveckling och
  överföring 

  sker på ett enkelt och smidigt sätt utan onödiga kostnader och/eller olägenheter för köparen
  och/eller 

  ny leverantör. 
   
  Leverantören åtar sig att överföra sin kompetens gällande leveransen/uppdraget till köparen eller
  till 

  annan av köparen anvisad part. Leverantören är ansvarig för att all relevant dokumentation och 

  information överlämnats till köparen. Leverantören förbinder sig att ge saklig information till
  köparen.

  Inför kontraktets upphörande upprättas ett projekt för överlämning av tjänsten/uppdraget.
  Projektet 

  bemannas av köparen, leverantören och eventuellt ny leverantör i samråd med utgångspunkt i 

  respektive parts åtagande. Leverantören äger rätt till timdebitering för möten som sker i enlighet
  med 

  denna punkt. 
   
  Som utgångspunkt ska pågående arbeten/leveranser/uppdrag slutföras i enlighet med beställning 

  och villkoren i kontraktet. Köparen och leverantören har dock rätt att ta upp pågående arbeten
  till 

  diskussion och, inom ramen för överlämningsprojektet, besluta att pågående arbeten ska övertas av 

  köparen och/eller eventuell ny leverantör. Ett sådant beslut ska fattas gemensamt av köparen och 

  leverantören.

  2.13 Överlåtelse av kontrakt

  Leverantören äger inte rätt att överlåta kontraktet på annan part utan skriftligt godkännande
  från 

  köparen.

  2.14 Ändringar och tillägg till kontraktet

  Ändringar eller tillägg till kontraktet ska, för att vara gällande, göras skriftligen och
  behörigen 

  undertecknas av parterna.

  2.15 Ändringar i kontraktet vid tvist

  Parterna har rätt att göra ändringar i kontraktet, även ändringar som inte är av mindre värde, om 

  dessa är följden av en förhandling för att lösa en avtalstvist under förutsättning att
  ändringarna; 

  a) anges i ett skriftligt förlikningsavtal, och  

  b) inte ändrar kontraktets övergripande karaktär.

  Ändringen kan avse ersättning och/eller parternas skyldigheter och rättigheter i övrigt enligt 

  kontraktet.

