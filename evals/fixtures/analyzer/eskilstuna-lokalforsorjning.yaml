  Syftet med uppdraget är att ta fram kvalificerade förslag på förbättringar inom båda områdena 

  som bidrar till ett effektivt lokalutnyttjande, en stärkt styrning, en ökad kostnadsmedvetenhet 

  och kostnadskontroll samt säkerställer ett ändamålsenligt stöd till kommunens verksamheter. 

