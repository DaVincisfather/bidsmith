  2.9.5 Försäkring

  Leverantören ska under hela kontraktstiden vidmakthålla för uppdraget tecknad lämplig 

  ansvarsförsäkring. Kopia av försäkringsbeviset kan komma att begäras in och ska således uppvisas 

  för köparen på begäran.

  2.9.6 Arbetsmiljö

  Leverantören ansvarar för att utförande av arbete som efterfrågas enligt kontraktet utförs enligt 

  Arbetsmiljöverkets föreskrifter.
   
  Eskilstuna kommunkoncern har rökfri arbetstid. Detta träffar således uppdragstagare såsom 

  konsulter/arbetstagare som utför arbete i köparens lokaler.

  2.9.7 Arbetsrättsliga villkor

  Leverantören ska säkerställa att de arbetstagare som utför arbete inom ramen för detta kontrakt
  har 

  anställningsvillkor som minst motsvarar:

  • Lön och ersättningar enligt tillämpligt svenskt kollektivavtal för branschen eller, om
  kollektivavtal 

  saknas, vad som är brukligt på orten.

  • Arbetstid och semester i enlighet med arbetstidslagen (1982:673) och semesterlagen (1977:480), 

  eller motsvarande regler i tillämpligt kollektivavtal.

  • Försäkrings- och sociala förmåner som ger skydd vid sjukdom, arbetsskada och föräldraledighet,
  i 

  enlighet med svensk lag eller motsvarande.

  Villkoren gäller även underleverantörer som deltar i utförandet av kontraktet. Leverantören
  ansvarar 

  för att följa upp att dessa krav efterlevs och ska på begäran lämna in underlag som visar att
  villkoren 

  uppfylls.

  2.9.8 Antidiskrimineringsklausul

  Leverantören ska vid utförande av den avtalade tjänsten följa vid varje tid gällande 

  antidiskrimineringslagstiftning.  
   
  Leverantören eller underleverantör som denna anlitar, får inte i sin näringsverksamhet
  diskriminera 

  någon på grund av kön, etnicitet, funktionshinder, sexuell läggning, religion, ålder, 

  könsöverskridande identitet eller av sådana skäl otillbörligt särbehandla arbetstagare eller 

  arbetssökande. Brister Leverantören i fullgörandet av detta åtagande äger köparen rätt att häva 

  kontraktet.

