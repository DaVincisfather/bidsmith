  Ja/Nej. Ja krävs

  1.3.3 Teknisk och yrkesmässig kapacitet - referenser

  Anbudsgivaren ska ha den tekniska förmågan och kapaciteten samt erfarenheten som krävs för att 

  genomföra aktuellt uppdrag med en för köparen godtagbar kvalitet.

  Som bevis ska anbudsgivaren, ange två (3) referenspersoner för tidigare utförda liknande uppdrag. 

  Uppdragen ska ha utförts under de fem (5) senaste åren räkna från sista anbudsdag. Med liknande 

  uppdrag avses utförande av sådana tjänster som upphandlingen avser. Referensuppdragen ska ha 

  genomförts med godtagbar kvalitet.

  Anbudsgivare ska lämna uppgift om referenspersonerna med namn, e-post och telefonnummer samt 

  information om referensuppdragets art och tid för utförande. Referenspersonerna ska kunna
  bekräfta 

  att uppdraget utförts med godtagbar kvalitet genom att besvara nedanstående frågor.

  Referenspersonen ska tala och skriva svenska.

  Anbudsgivaren ansvarar för att referensperson är vidtalad om att köparen kan komma att kontakta 

  denne.

  Köparen kommer att kontakta referenspersonerna och ställa nedan frågor Frågorna besvaras med 

  ”Ja” eller ”Nej”.

  Anbudsgivare som erhåller betyget ”Nej” av referensperson kommer att beredas möjlighet att 

  skriftligt förklara orsakerna till omdömet. Köparen kommer därefter att genomföra en individuell 

  bedömning av huruvida orsakerna till omdömet kan bedömas bestå eller har rättats till. Om 

  anbudsgivaren inte kan lämna en godtagbar förklaring, enligt köparen, kommer anbudet inte att gå 

  vidare till utvärderingen.

