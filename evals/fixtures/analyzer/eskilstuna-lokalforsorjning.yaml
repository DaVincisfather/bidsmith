  Ömsesidigt undertecknade av detta kontrakt anses utgöra beställning av uppdraget som ingår i 

  kontraktet.

  2.2.2 Leverans

  Leverans ska ske fritt till på av köparen angivet sätt. Konsulten ska leverera samtliga handlingar
  i 

  både redigerbara format och PDF.

  Leveransen ska omfatta: 

  - Rapport avseende genomlysning av Eskilstuna kommuns lokalförsörjningsprocess.

  - Rapport avseende framtagande av ny hyresmodell Eskilstuna kommun. 

  2.3 Pris och fakturering

  2.3.1 Pris/Ersättning

  Timpris för köp av tjänsten xxx SEK. 
   
  Ersättningen ska vara i SEK, fast och exklusive moms, samt inkludera alla med 

  uppdraget/leveransen förenliga kostnader.
   
  Mervärdesskatt (moms) tillkommer enligt gällande skattelagstiftning.

  2.4 Fakturaspecifikation

  Faktura ska innehålla följande uppgifter; 

  • Fakturareferens 40KLKLED 

