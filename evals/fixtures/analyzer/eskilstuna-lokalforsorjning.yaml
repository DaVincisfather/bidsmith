  avvikelser 

  ska i första hand avhjälpas utan dröjsmål. Avhjälpande anses ha skett när leveransen fullt ut 

  motsvarar kontraktets krav.

  Om avhjälpande inte sker inom skälig tid efter skriftligt påtalande har köparen rätt att ta ut
  vite om 

  4% av uppdragsvärdet per påbörjad kalenderdag, dock högst 20% av uppdragsvärdet per 

  bristtillfälle. Om bristen till sin natur inte kan avhjälpas, utgår vite om 20% av uppdragsvärdet
  per 

