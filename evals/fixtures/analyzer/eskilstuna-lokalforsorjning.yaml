  Kontakta köparens e-handelsfunktion vid hjälp avseende elektronisk fakturahantering, e-

  handel@eskilstuna.se.

  a. Ange kontaktperson med telefonnummer och e-postadress för frågor gällande 

  införande av e-faktura.

  Fritext

  b. Ange om någon annan än anbudsgivaren kommer att ombesörja faktureringen till 

