  2.9.2 Intrång

  Leverantören ansvarar för att denne har erforderliga tillstånd och rättigheter att leverera
  avtalat 

  åtagande. Leverantören ansvarar för att det inte krävs någon ytterligare licens och att några 

  ytterligare kostnader till följd av leveransen tillkommer än de som leverantören specificerat och 

  kommunicerat till köparen. Leverantören garanterar att köparen till följd av leveransen inte gör 

  intrång i tredje parts immateriella rättigheter. Leverantören åtar sig därför att på egen
  bekostnad 

  försvara köparen mot krav som riktas mot denne med anledning av leveransen.
   
  Leverantörens åtagande att försvara köparen mot krav gäller endast om köparen aviserat 

  leverantören meddelande härom inom skälig tid. Leverantören är inte ansvarig för krav som riktas 

  mot köparen med anledning av intrång som inte härrör från leverantörens leverans eller om köparen 

  inte följt de instruktioner som leverantören lämnat.

  2.9.3 Begränsning av marknadsföringsrätt

  Hänvisning till uppdraget eller i övrigt till köparen i reklam- eller marknadsföringssyfte får ej
  göras av 

  leverantören eller av denne anlitad underleverantör utan köparens skriftliga godkännande. Denna 

  begränsning gäller även efter uppdragets upphörande.

  2.9.4 Sekretess och konfidentialitet

  Leverantören förbinder sig enligt kontraktet att iaktta sekretess och tystnadsplikt enligt 

  bestämmelserna i offentlighets- och sekretesslagen (2009:400), lag om skydd för 

  företagshemligheter (1990:409) och Brottsbalken (1962:700).
   
  Leverantören åtar sig att, utan begränsning i tid, behandla all information och alla handlingar
  som 

  kommer leverantören till kännedom eller handa med anledning av kontraktet så som konfidentiell. 

  Leverantören åtar sig därför att inte, direkt eller indirekt, vidarebefordra information eller
  handlingar 

  till andra än till vilka det är nödvändigt för fullgörandet av det uppdrag som följer av
  kontraktet. Detta 

  under förutsättning att de personer som får ta del av informationen omfattas av detta kontrakt.
   
  Det åligger leverantören att tillse att de personer som kan antas komma i kontakt med
  konfidentiell 

  information omfattas av och informeras om bestämmelserna i detta kontrakt.

  Leverantören ska behandla all konfidentiell information som leverantören får ta del av med
  anledning 

  av kontraktet och det uppdrag som följer därav med sekretess. Sekretessen omfattar all
  information 

  kring köparen som inte uppenbart är av sådan karaktär att den utan olägenhet för köparen kan 

  avslöjas för utomstående. Sekretessen gäller heller inte om leverantören kan visa att
  informationen 

  är allmänt känd eller kommit leverantören till kännedom på annat sätt än genom kontraktet. 
   
  Leverantören äger ej rätt att använda information som kommer denne till handa med anledning av 

  kontraktet för några andra ändamål än de som följer av kontraktet. Förbudet gäller även all 

  användning inom den egna organisationen som inte är nödvändig för fullgörandet av uppdrag som 

  följer av kontraktet. 
   
  Leverantören äger inga materiella rättigheter till konfidentiell information, om inte detta
  särskilt 

  framgår av kontraktet.

  Leverantören ska under kontraktets löptid tillämpa erforderliga rutiner avseende 

  informationssäkerhet för säkerställande av att för uppdraget relevanta aspekter såsom riktighet, 

  konfidentialitet, tillgänglighet och spårbarhet, utifrån ett informationssäkerhetsperspektiv,
  hanteras på 

  ändamålsenligt sätt.

  För brister och avvikelser avseende villkoren i denna punkt utgår vite per skadetillfälle enligt
  punkt 

  2.8.1 Fel, avhjälpande och sanktioner.

  Om part är skyldig att lämna ut uppgifter på grund av myndighetsbeslut, ska detta ej betraktas
  som 

  avtalsbrott utifrån vad som reglerats i detta avsnitt.

