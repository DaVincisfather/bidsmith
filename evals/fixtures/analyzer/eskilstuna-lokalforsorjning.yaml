  2.10.3 Uppföljning

  Köparen kommer att följa upp detta kontraktet under dess löptid. Köparen förbehåller sig därför 

  rätten att genomföra kontroller och nödvändiga efterforskningar för att säkerställa kontraktets 

  efterlevnad. 

  Leverantören ska medverka i uppföljningen genom att bidra med information i sådan utsträckning 

  som krävs för att de frågor som är föremål för kontroll ska kunna utredas ändamålsenligt, samt 

  genom att delta i uppföljningsmöten på anmodan.

  Uppföljningen kommer att avse uppdragets genomförande såväl som för detta tillhörande krav och 

  villkor. Kontroller kan komma att ske både annonserat och oannonserat vid utförande av uppdrag.

  Eventuella avvikelser och/eller brister kommer att hanteras i enlighet med vad som därom 

  föreskrivits i detta kontrakt.

  2.10.3.1 Dokumentation

  Köparen har rätt att från leverantören begära ut dokumentation och/eller rapporter i syfte att 

  säkerställa att leverans sker i enlighet med kontraktet. Om köparen önskar ska leverantören
  leverera 

  definierade rapporter med visst intervall. Leverantören ska också inför kontraktets upphörande,
  på 

  köparens begäran, överlämna den information som krävs för att köparen eller annan leverantör ska 

  kunna överta leveranserna.

  Dokumentation som efterfrågas i uppföljningssyfte ska i regel vara köparen tillhanda inom fem (5) 

  arbetsdagar från det att begäran om dokumentationen framställts.

  2.11 Förtida upphörande

  Kommunen har rätt att säga upp Kontraktet med omedelbar verkan om någon av följande 

  omständigheter inträffar:

  Leverantören väsentligen brister i någon förpliktelse enligt detta kontrakt och inte vidtar
  rättelse •

