  2.5 Fakturerings- och betalningsvillkor

  Fakturering ska ske löpande månadsvis i efterskott för samtliga uppdrag föregående månad. 

  Betalningsvillkor är 30 dagar netto efter mottagen faktura. Betalning sker efter specificerad och 

  godkänd faktura. En faktura som saknar obligatoriska uppgifter anses inte vara specificerad och 

  kommer inte att betalas förrän den är fullständig. Faktureringsavgift eller andra avgifter får ej
  tas ut.
   
  Fakturering får inte överlåtas på tredje part utan skriftligt godkännande av köparen. Vid
  försenad 

  betalning äger leverantören rätt till dröjsmålsränta enligt räntelagen. Dröjsmålsränta betalas
  inte för 

  ofullständiga eller felaktigt adresserade fakturor. 
   
  För leverantörens fordringar avseende produkten/tjänsten gäller en preskriptionstid om 12 månader 

  räknat från det att produkten/tjänsten levererats/slutförts. Har leverantörens fordran uppstått
  till följd 

  av en tjänst som levereras löpande och faktureras löpande månadsvis i efterskott räknas 

  preskriptionstiden från det datum leverantören borde ha fakturerat tjänsten. Villkor enligt detta
  stycke 

  förutsätter att leverantören inte framställt krav (d.v.s. fakturerat i enlighet med villkoren i
  detta 

  kontrakt) avseende fordringarna under angiven preskriptionstid. Observera att endast korrekt
  utställd 

  faktura enligt kontraktet räknas som framställt krav.

  2.6 Elektronisk fakturahantering

  Leverantören ska skicka elektroniska fakturor till köparen.

  För vidare information om e-faktura för Eskilstuna kommun, se denna webbplats: 

