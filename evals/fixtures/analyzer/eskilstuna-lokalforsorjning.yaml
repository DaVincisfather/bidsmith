  1.3.6 Underleverantör och åberopande av kapacitet

  Anbudsgivaren ska ange nedan om underleverantör kommer att anlitas och/eller om annat företags 

  kapacitet åberopas.

  Information

  Med underleverantör avses leverantör som direkt medverkar till kontraktets fullgörande och som 

  därmed utför hela eller delar av det uppdrag som ramavtalet/kontraktet avser, i leverantörens
  ställe. 

  Underleverantör kan vara såväl konsulter som företag verksamma inom det aktuella 

  upphandlingsområdet samt leverantörer av i leveransen ingående produkter/tjänster. Däremot 

  omfattas inte företag som levererar diverse varor och kringtjänster till anbudsgivaren såsom 

  exempelvis städföretag, matleverans eller företag som hjälper till med brandskydd. 

  Observera att annat bolag som ingår i samma koncern, till exempel moderbolag/dotterbolag, i denna 

  upphandling är att betrakta som underleverantör till anbudsgivaren om bolagen har olika 

  organisationsnummer. 

  Om anbudsgivaren åberopar kapacitet från annat företag för att uppfylla kravet på ekonomisk och 

  finansiell ställning, ska det åberopade företaget, tillsammans med leverantören, vara solidariskt 

  ansvarig för fullgörandet av ramavtalet/kontraktet. 

  Vid åberopande av kapacitet kommer åberopade företag att kontrolleras utifrån 

  uteslutningsgrunderna som anges i 1.3.1 Uteslutning av leverantör samt gentemot det/de krav 

  kapaciteten åberopas för. Om det vid sådan kontroll framkommer att det åberopade företaget är 

  föremål för uteslutningsgrunder, får, och i vissa fall ska, köparen begära att det åberopade
  företaget 

  byts ut.

