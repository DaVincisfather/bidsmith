  2.1.6 Omfattning

  Kontraktet omfattar utförande av genomlysning av kommunens lokalförsörjningsprocess samt 

  framtagande av ny hyresmodell.

  Eskilstuna kommun har ett omfattande och varierat lokalbestånd som används för skola, vård och 

  omsorg, kontor och andra samhällsviktiga funktioner. Behovet av ändamålsenliga lokaler är stort
  och 

  förändras över tid till följd av demografiska förändringar, nya arbetssätt och krav på hållbarhet
  samt 

  ekonomiska förutsättningar.

  Lokalerna utgör en strategiskt viktig resurs och kommunen har ett behov av att säkerställa ett 

  långsiktigt hållbart och kostnadseffektivt lokalutnyttjande (externa och egna lokaler) där 

  verksamheterna förses med ändamålsenliga lokaler på kort och lång sikt utifrån ett 

  kommunkoncernövergripande perspektiv. Lokalförsörjningsprocessen mynnar ut i investeringar som 

  i sin tur påverkar förvaltningarnas lokalhyra. Kommunledningskontoret ansvarar för både 

  kommunens lokalförsörjningsprocess och hyresmodell.

  Uppdraget omfattar två delar. Dels en genomlysning av kommunens lokalförsörjningsprocess, dels 

  framtagande av ny hyresmodell.  

  Syftet med uppdraget är att ta fram kvalificerade förslag på förbättringar inom båda områdena som 

  bidrar till ett effektivt lokalutnyttjande, en stärkt styrning, en ökad kostnadsmedvetenhet och 

  kostnadskontroll samt säkerställer ett ändamålsenligt stöd till kommunens verksamheter. Nyttan av 

  de förändringar som föreslås ska ställas i relation till kostnaderna för att implementera 

  förändringarna.

