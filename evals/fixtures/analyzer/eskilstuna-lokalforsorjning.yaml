  1.3.4 Miljöledningsarbetet

  Enligt Eskilstuna kommunkoncernens upphandlingsriktlinjer, ska upphandling främja hållbar 

  utveckling som leder till en god miljö för nuvarande och kommande generationer. 

  Kommunkoncernen ska göra miljömässiga hänsynstaganden, bland annat genom att handla med 

  leverantörer som bedriver ett aktivt miljöarbete, ställa miljökrav på varor, tjänster och
  entreprenader, 

  prioritera miljöanpassade varor, tjänster och entreprenader och på så sätt stimulera en
  produktion 

  som påverkar miljön så lite som möjligt.

  De viktigaste miljömålen i Kommunkoncernen är;

  * Minskning av klimatutsläpp med 80 % fram till 2030

  * Minskad användning av hälso- och miljöfarliga kemikalier

  * Ökat återbruk och cirkulära modeller

  Som leverantör till kommunkoncernen förväntas du verka för att kommunkoncernen når sina 

  miljömål.

  Anbudsgivaren ska arbeta systematiskt med miljö.

  Anbudsgivaren ska, kunna bevisa kravuppfyllnad genom att skicka in antingen ett 

  tredjepartscertifikat från sitt miljöledningssystem eller en beskrivning av anbudsgivarens
  miljöarbete. 

  I de fall en beskrivning av anbudsgivarens miljöarbete lämnas, ska minst följande ingå

  * Miljöpolicy

