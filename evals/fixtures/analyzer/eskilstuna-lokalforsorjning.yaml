  2.7 Kvittning

  Köparen förbehåller sig rätten att kvitta vite, prisavdrag samt nedsättning av pris/ersättning
  enligt 

  detta kontrakt. Kvittning sker genom avdrag med motsvarande belopp på nästkommande faktura 

  eller, om slutfakturering skett, genom debitering mot leverantör.

