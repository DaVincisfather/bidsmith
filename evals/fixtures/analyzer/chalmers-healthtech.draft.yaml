  Leverantören ansvarar för att denne, i samband med uppdragets genomförande och/eller skapande 
  av uppdragets resultat, inte gör intrång i tredje mans immateriella rättigheter. Leverantören ska 
  vidare hålla köparen skadelös för alla ersättningskrav som kan uppstå till följd av intrång i 
  immateriella rättigheter tillhörande tredje man. Denna bestämmelse gäller även efter avtalets utgång.
  4.30 Uppförandekod
  Vår vision är: Chalmers – ett globalt framstående tekniskt universitet för en bättre värld. Den 
  definierar en av våra viktigaste fokuspunkter – en levande och angelägen framtidsbild med hela 
  mänskligheten i vågskålen. Med visionen vill vi förmedla ett engagerat, innovativt och banbrytande 
  sätt möta människans behov av ekologisk, social och ekonomisk hållbarhet. Vi vill vara stolta över 
  våra insatser och vara en förebild internationellt.
  I enlighet med vår vision vill vi verka för att de varor och tjänster som köps in är producerade under 
  hållbara och ansvarsfulla förhållanden.
  Vi förväntar oss att leverantören respekterar Chalmers uppförandekod och att de gör sitt yttersta för 
  att uppnå kraven inom den egna organisationen och i leverantörskedjan. Detta bör ske genom 
  dialog, transparens och ett öppet samarbete mellan Chalmers och leverantören, vilket gynnar båda 
  parter.
