  vare sig Skatteverket och Kronofogdemyndigheten. Köparen kontrollerar detta och förbehåller sig 
  rätten att i varje enskilt fall avgöra vad som kan betraktas som betydande skulder. Mindre skulder 
  accepteras om: skulden är tvistig, skulden kan regleras innan avtal skrivs, eller om 
  överenskommelse finns med berörd myndighet.
