  Öppet förfarande
  Denna upphandling genomförs genom ett öppet förfarande enligt lagen (2016:1145) om offentlig 
  upphandling (LOU). Förfarandet innebär att alla anbudsgivare som vill får lämna anbud. Förfarandet 
  tillåter inte förhandling, och det är därför av stor vikt att alla krav och villkor enligt 
  upphandlingsdokumentationen följs och att bästa möjliga erbjudande lämnas i anbudet.
  1.7.3 Kompletteringar och förtydliganden
  Chalmers kommer, om det anses lämpligt, att begära rättelser, förtydliganden eller kompletteringar 
  av anbud.
  Förtydliganden eller kompletteringar av anbud kommer inte beaktas om de ändrar villkoren i ett 
  anbud. Det innebär att Chalmers under anbudsutvärderingen inte kommer att tillåta exempelvis 
  utbyte av en produkt, ändring av erbjudna mervärden eller ändrade priser.
  Däremot kan en rättelse innebära ändring av de kommersiella villkoren under vissa omständigheter, 
  se nedan.
  Rättelser
  Anbudsgivaren kan få rätta en felskrivning, felräkning eller något annat fel i anbudet som för 
  Chalmers är uppenbart. För att Chalmers ska tillåta rättelsen, krävs att det kan utläsas av anbudet 
  vad som egentligen avsågs.
  Förtydliganden
  Förtydliganden ska syfta till att fastställa anbudets avsedda innehåll.
  Om Chalmers uppfattar att en uppgift i ett anbud är tvetydig eller otydlig, kan Chalmers låta 
  anbudsgivaren förtydliga vilken tolkning som är avsedd.
  Utöver tvetydiga eller otydliga fall kommer Chalmers inte att beakta förtydliganden som motsäger en 
  ursprunglig uppgift i anbudet. Chalmers kommer inte heller att beakta förtydliganden som ändrar de 
  affärsmässiga villkoren i det ursprungliga anbudet.
  Kompletteringar
  Chalmers kan tillåta att anbudsgivare kompletterar anbudet med:
  uppgifter och bevis som rör historiska förhållanden eller fakta om anbudsgivarens företag 
  (uppgifter som återfinns i avsnitt ”Kvalificering av anbudsgivaren”)
  1. 
  information, exempelvis kontaktuppgifter till en referent eller uppgifter om värde, till 
  referensuppdrag som lämnats i det ursprungliga anbudet.
  2. 
  uppgifter om en varas egenskaper som saknas i det ursprungliga Kompletteringen får inte 
  innebära att en vara t.ex. byts ut eller modifieras eller att priset ändras.
  3. 
  uppgifter om innehållet i, eller utformningen av, en tjänst som saknas i det ursprungliga 
  anbudet. Kompletterande information får inte innebära att erbjudna mervärden eller pris 
  ändras eller att en helt annan tjänst offereras.
  4. 
  information om en namngiven konsult som saknas i det ursprungliga anbudet. 
  Kompletteringen får ex. inte innebära att personen byts ut eller priset ändras.
  5. 
  fullmakter, behörighetshandlingar, underskrifter eller liknande som saknas eller är 
  ofullständiga i det ursprungliga anbudet.
  6. 
  uppgifter som återfinns på en annan plats i det ursprungliga7. 
  Chalmers kan tillåta att anbud kompletteras med andra uppgifter eller handlingar än de som anges i 
  punkterna 1–7. Sådana uppgifter eller handlingar kan komma att beaktas om de var tillgängliga eller 
  upprättade när anbud senast skulle lämnas in i upphandlingen och anbudsgivaren kan visa detta.
  Exempel på en handling som anbudet kan kompletteras med är ett intyg som visar att anbudsgivaren 
