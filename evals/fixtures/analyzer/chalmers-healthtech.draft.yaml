  1.7.9 Anbudets bindningstid
  Anbudet ska vara bindande till och med 2026-09-24.
  Anbudsgivaren accepterar anbudets bindningstid enligt ovan.
  Ja/Nej. Ja krävs
  1.7.10 Begäran om sekretess
  Efter avslutad upphandling är samtliga handlingar i upphandlingen normalt offentliga. De rättsliga 
  möjligheterna att sekretessbelägga anbud och/eller andra handlingar är mycket begränsade sedan 
  upphandlingen avslutats. 31 kap. 16 § Offentlighets- och sekretesslagen (2009:400) kan dock ge 
  skydd åt enskilds affärs- eller driftförhållanden när denne har trätt i affärsförbindelse med en 
  myndighet, om det av särskild anledning kan antas att den enskilde lider skada om uppgiften röjs.
  Anbudsgivare ska nedan ange om sekretess önskas och i sådant fall ange:
  Vilka uppgifter som önskas sekretessbeläggas•
  Vilken skada anbudsgivaren skulle lida om uppgifterna röjs•
  Observera att sekretessbegäran bör vara utförlig och ha skrivits specifikt för aktuell upphandling för 
  att köparen ska kunna ta ställning till anbudsgivarens begäran.
  Sekretessprövning sker först om eller när någon begär att få ta del av uppgift. Om köparen gör en 
  bedömning att sekretess föreligger kan beslutet överklagas och prövas i domstol. Garantier för att 
  uppgifterna inte kommer att lämnas ut kan därför aldrig ges.
  a. Önskas sekretess
