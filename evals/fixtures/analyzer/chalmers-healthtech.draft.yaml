  4.20 Beställarens försening
  Om beställaren finner det sannolikt att han inte kommer att kunna ta emot varan på avtalad tid, ska 
  han utan dröjsmål skriftligen anmäla detta till säljaren samt ange orsaken till förseningen och den 
  tidpunkt då mottagandet beräknas kunna ske.
