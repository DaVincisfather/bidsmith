  Priserna är fasta i tjugofyra (24) månader från avtalsstart och/eller föregående godkänd 
  justering. Därefter får justering av priset ske enligt nedan.
  I de fall leverantören begär prisjustering ska denna skriftligen framställas till avtalets kontaktperson. 
  Komplett begäran om önskad prisjustering ska inkomma senast tre (3) månader före den dag från 
  och med vilken det justerade priset önskas träda i kraft. Begäran ska innehålla beräkningsgrunderna 
  och samtliga nya priser. Prisjusteringen träder i kraft vid månadsskiftet efter godkänd justering.
  Det åligger åberopande part att visa att grund för förändrade kostnader föreligger. Prisjustering 
  får begäras om prisutvecklingen avsevärt förändrats och detta vederbörligen verifieras. 
  Eventuell prisjustering sker i enlighet med prisutvecklingen.
  Om överenskommelse ej träffas, äger köparen rätt att skriftligen säga upp gällande avtal 
  med iakttagande av uppsägningstid på tre (3) månader. Under uppsägningstiden gäller de 
  ursprungliga villkoren.
