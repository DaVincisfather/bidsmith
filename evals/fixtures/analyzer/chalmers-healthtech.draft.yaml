  2. KVALIFICERING AV ANBUDSGIVARE
  2.1 Allmän beskrivning av anbudsgivaren
  Anbudsgivaren ska lämna en kortfattad beskrivning av företagets verksamhet kopplat till uppdraget.
  Anbudsgivaren ska ange kontaktpersoner för anbudet och för avtalet.
  a. Beskriv kortfattat er verksamhet kopplat till upphandlingsobjektet
  Fritext
  b. Ange kontaktpersoner för anbudet (namn, telefon, e-post)
  Fritext
  c. Ange behörig avtalstecknare (namn, e-post)
  Fritext
  2.2 Uteslutning av anbudsgivare
  I denna upphandling tillämpas uteslutningsgrunder som anges i 13 kap. 1 § LOU samt 13 kap. 3 § 
  LOU. Dessa uteslutningsgrunder gör det möjligt för köparen att utesluta en anbudsgivare från 
  deltagande i upphandlingen. Uteslutningsgrunderna gäller även om företrädare för anbudsgivaren 
  gjort sig skyldig till överträdelserna.
  Anbudsgivare får även, enligt 13 kap. 3 § LOU, uteslutas från att delta i en upphandling, om köparen 
  kan visa att anbudsgivaren är föremål för någon av de punkter som nämns i denna paragraf och inte 
  tilltagit fullgoda åtgärder som visar på tillförlitlighet (s.k. självsanering) eller kan lämna en förklaring 
  som medgör att ett avtal kan fullföljas trots omständigheterna.
  Uteslutningsgrunder gäller även för underleverantör som anbudsgivaren avser använda för 
  uppdraget enligt 14 kap. 7 § LOU.
  Köparen kan komma att begära att anbudsgivare och/eller underleverantör lämnar in ett utdrag ur 
  brottsregister eller likvärdig handling som har utfärdats av behörig myndighet i det land där 
  anbudsgivaren är etablerad som visar att det inte finns omständigheter som enligt 13 kap. 1 § LOU 
  utgör skäl för att utesluta anbudsgivaren ur upphandlingen.
  Är anbudsgivaren föremål för någon av uteslutningsgrunderna enligt ovan?
  Ja/Nej. Nej krävs
   
