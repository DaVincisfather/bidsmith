  Steg 2: Anbudspresentation
  De tre (3) konsulter som erhållit högst mervärde i steg 1 bjuds in till en muntlig 
  anbudspresentation för att verifiera de preliminära omdömen som anbudet tilldelats baserat på de 
  skriftliga anbuden. Om konsulterna inte kan skiljas åt i den inledande utvärderingen, kan ytterligare 
  konsulter bli inbjudna till anbudspresentationen. Den muntliga redogörelsen ska överensstämma 
  med innehållet i anbudet. Anbudsgivaren ska, inom fem arbetsdagar från när Chalmers så begär, 
  kunna genomföra en sådan presentation hos Chalmers eller via videomöte.
  Steg 3: Vinnande anbudsgivare utses
  Chalmers kommer att anta det ekonomiskt mest fördelaktiga anbudet med hänsyn tagen till Pris och 
  Kvalitet (mervärden) där värdering sker enligt följande:
  Utvärderingspris = Anbudspris (kr/tim) - Mervärde kompetens (erhållna poäng (max 80) x 25 kr)
  Anbudet som erhåller lägst Utvärderingspris kommer att antas. Negativt Utvärderingspris 
  kan erhållas.
  Om flera anbud erhåller samma Utvärderingspris, kommer avtalet tilldelas den anbudsgivare vars 
  anbud erhållit högst mervärden.
