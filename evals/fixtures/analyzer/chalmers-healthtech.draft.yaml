  title: Affärsutveckling och marknadsföring av HealthTech
  client: Chalmers Next Labs AB (administreras av Chalmers Tekniska Högskola AB)
  deadline: 2026-06-24
  summary: Chalmers Next Labs AB söker en konsult för att driva affärsutveckling, marknadsföring och
    finansiering av Chalmers Precision HealthTech Hub. Konsulten ska ha djup erfarenhet av
    biomedicinskt företagande, fundraising och arbete i gränslandet mellan akademi och industri.
    Ramavtalet löper initialt till 2026-12-31 med möjlighet till förlängning upp till totalt fyra år
    och ett takvärde på 4 500 000 kr.
  background: Chalmers Tekniska Högskola har sedan 2017 ansvarat för det SSF-finansierade
    forskningscentret FoRmulaEx, inriktat på RNA-baserade läkemedel, i samarbete med Karolinska
    Institutet, Göteborgs universitet och industriparter som AstraZeneca. Inför avslutningen av
    FoRmulaEx bildades Chalmers Precision HealthTech Hub för att tillvarata resultaten och erbjuda
    tjänster, kompetens och utrustning för utveckling av lipida nanopartiklar för mRNA-baserade
    terapier. Hubben planeras samlokaliseras med OligoNova Hub inom Active Lab på GoCo Health
    Innovation City i Mölndal. En central del av verksamheten är att erbjuda tjänster till externa
    kunder, från startups till etablerade bolag, vilket kräver avancerad affärsutveckling och
    marknadsföring. Chalmers Next Labs AB är ett icke-vinstdrivande helägt bolag i
    universitetskoncernen med uppdrag att nyttiggöra framstående forskning.
