  4. AVTALSUTKAST, TJÄNSTER
  4.1 Parter
  4.1.1 Köparen
  Chalmers tekniska högskola, org. nr. 556479-5598
  Personer från köparen som avropar från detta avtal benämns beställaren.
  4.1.2 Leverantören
  Leverantörens namn, org.nr. Leverantörens organisationsnummer
  4.2 Om detta avtal
  Detta ramavtal grundar sig på köparens upphandlingsdokument och leverantörens anbud. 
  4.3 Uppdragets art och omfattning
  Köparen uppdrar åt leverantören att tillhandahålla konsult för utveckling och finansiering av 
  infrastruktur "Precision HealthTech Hub". Uppdraget ska utföras i enlighet med bestämmelser i detta 
  avtal och med den skicklighet och omsorg som köparen har anledning att förvänta av en 
  välrenommerad leverantör i branschen.
  4.4 Kvalitet och utförande
  Levererat uppdrag enligt detta avtal ska överensstämma med, i upphandlingsdokumenten, 
  uppställda krav och, i anbudet lämnade uppgifter. Om även leverans av varor ingår i uppdraget 
  ska de vara typgodkända och märkta enligt tillämpliga svenska samt europeiska standarder.
  4.5 Viljeinriktning
  Avtalet bygger på ömsesidigt förtroende mellan parterna. Parterna är medvetna om att avtalet inte 
  kan reglera samtliga frågeställningar och händelser som kan tänkas uppkomma till följd av ständig 
  utveckling och förändrade förhållanden. Parterna ska sträva efter att anpassa sig till de nya 
  förhållanden som kan uppstå under avtalstiden för att på så sätt tillgodose varandras ändrade 
  förutsättningar och behov.
  4.6 Förändringar av uppdraget
  Uppdraget kan komma att förändras om det sker:
  väsentliga förändringar i lagstiftning,•
  väsentliga förändringar i organisationen, •
  eller om hela eller stora delar av ett bolags verksamhet avvecklas, ombildas eller överlåts på en 
  annan juridisk person
  •
  Tecknat avtal kan då komma att upphöra att gälla eller, om ändringarna bedöms vara tillåtna inom 
  ramen för lagen om offentlig upphandling (LOU), omförhandlas i relevant utsträckning.
  Ändringar och tillägg till detta avtal eller annan rättshandling med anknytning till detta avtal ska för att 
  vara gällande vara skriftliga och undertecknade av behörig hos båda parter.
