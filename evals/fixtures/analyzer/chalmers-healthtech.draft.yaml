      till en specifik person.
    - Inga angivna garanterade minimitimmar eller minimivolymer – noll-avrop är möjligt.
    - Krav på disputerad inom biomedicin/bioteknik och ML/AI-kompetens är ambitiösa mervärden som
      kan begränsa antalet kvalificerade anbudsgivare kraftigt.
    - Priset ska inkludera samtliga kostnader, men resor till Göteborg ersätts ej – indirekt
      kostnadsdrivande för leverantörer utanför regionen.
  domain: Life Science / HealthTech – Affärsutveckling och marknadsföring
  oslReference: 31 kap. 16 §
  secrecyRows:
    - reference: Anbudsgivarens sekretessbegäran (avsnitt 1.7.10 b)
      scope: Uppgifter om affärs- eller driftförhållanden som anbudsgivaren begär sekretess för i sitt
        anbud
      justification: Enligt 31 kap. 16 § OSL (2009:400) kan skydd ges för enskilds affärs- eller
        driftförhållanden när denne trätt i affärsförbindelse med en myndighet, om det av särskild
        anledning kan antas att den enskilde lider skada om uppgiften röjs. Anbudsgivaren ska
        specificera vilka uppgifter och vilken skada som skulle uppkomma.
