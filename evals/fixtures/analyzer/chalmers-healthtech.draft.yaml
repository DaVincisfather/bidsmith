  Köparen har även rätt till platsbesök hos leverantören och dess underleverantörer.
  I de fall avvikelse uppdagas ska leverantören, inom överenskommen tidsfrist, vidta åtgärder till 
  förbättring enligt handlingsplan. Om åtgärder inte vidtas inom avtalad tid kommer detta att betraktas 
  som väsentligt avtalsbrott och köparen kan komma att häva avtalet.
  4.31 Befrielsegrunder
  Part är befriad från påföljd för underlåtenhet att fullgöra viss förpliktelse enligt detta avtal. Det gäller 
  om underlåtenheten har sin grund i omständighet som ligger utanför parts kontroll och
  som denne inte skäligen kunde förväntas ha räknat med vid ingåendet av detta avtal och,1. 
  vars följder denne inte heller skäligen kunde ha undvikit eller övervunnit och2. 
  som förhindrar fullgörandet därav (Befrielsegrund).3. 
  Så snart hindret upphört skall förpliktelsen fullgöras på avtalat sätt.
  Såsom befrielsegrund skall anses eldsvåda, krig, mobilisering eller oförutsedda militärinkallelser av 
  motsvarande omfattning, rekvisition, beslag, valutarestriktioner, uppror eller upplopp, knapphet på 
  transportmedel, allmän varuknapphet, inskränkningar i fråga om drivkraft, avtalsenlig konflikt på 
  arbetsmarknaden samt försening av leverans från underleverantör, om förseningen har sin grund i 
  sådan omständighet som avses i denna punkt. Förbehållet om avtalsenlig konflikt på 
  arbetsmarknaden skall inte anses som befrielsegrund om part själv är föremål för eller vidtar sådan 
  konflikt.
  För att få befrielse enligt ovan skall part utan dröjsmål skriftligen meddela den andra parten härom. 
  Skriftligt meddelande skall också lämnas utan dröjsmål vid befrielsegrundens upphörande. 
  Part skall vidta skäliga ansträngningar för att mildra omfattningen och effekten av befrielsegrund och 
  återuppta fullgörandet av de förpliktelser som hindrats så snart det praktiskt kan ske.
  Om befrielsegrund har varat i tre (3) månader äger den part, som inte har åberopat befrielsegrunden, 
  rätt att skriftligen frånträda detta avtal eller del därav.
  4.32 Överlåtelse
  Part får inte helt eller delvis överlåta eller pantsätta sina rättigheter och skyldigheter enligt detta avtal 
  utan den andra partens skriftliga godkännande.
  4.33 Ägarskifte
