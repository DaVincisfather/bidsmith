  4.27 Personal
  Leverantören har fullt arbetsgivaransvar för sin personal. Erbjuden konsult får bytas ut mot 
  annan konsult endast efter köparens skriftliga medgivande.
  4.28 Marknadsföring
  Leverantören får inte utan köparens skriftliga medgivande använda sig av avtalat uppdrag eller 
  köparens varumärke i sin marknadsföring.
  4.29 Immaterialrätt
  Köparen har fullständig upphovs-, ägande- och nyttjanderätt till resultatet av utfört uppdrag, oavsett 
  form. Alla handlingar som är förknippade med resultatet ska överlämnas till köparen och blir dess 
