  F-skattsedel
  Anbudsgivaren ska vara registrerad för F-skatt i Sverige. Detsamma gäller utländska anbudsgivare 
  för samtliga tjänster som utförs åt köparen i Sverige. Köparen kontrollerar att anbudsgivaren 
  uppfyller ovanstående krav.
  Kontrollfråga: Godkänns anbudsgivaren enligt begärd skattekontroll? Besvaras 
  av upphandlare.
  Ja/Nej. Ja krävs
  2.4 Ekonomisk stabilitet
  Anbudsgivaren ska ha en ekonomisk stabilitet. Med ekonomisk stabilitet avses minst rating 40 enligt 
  Creditsafe. Detta kontrolleras av köparen. I de fall lägre rating visas eller om rating saknas, kan 
  anbudsgivare ändå anses uppfylla detta krav om anbudsgivaren lämnar sådan förklaring att det kan 
  anses klarlagt att anbudsgivaren innehar motsvarande ekonomiska stabilitet. Köparen avgör om 
  sådan förklaring anses godkänd. Om det anses nödvändigt kan köparen komma att inhämta 
  ytterligare upplysningar om anbudsgivare och eventuella underleverantörer. Samma 
  kvalificeringskrav tillämpas för utländska anbudsgivare.
  Utländska anbudsgivare ska lämna uppgifter i anbudet som styrker ovanstående krav.
  a. Kontrollfråga: Har anbudsgivaren en ekonomisk stabilitet enligt 
  ovan? Besvaras av upphandlare.
  Ja/Nej. Ja krävs
  b. Har anbudsgivaren en ekonomisk stabilitet motsvarande 40 eller mer och detta ej 
  kan styrkas via Creditsafe lämnas uppgifter nedan som styrker detta.
