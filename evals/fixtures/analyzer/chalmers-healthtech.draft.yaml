  leverantören fått kännedom om felet ska leverantören avhjälpa felet skyndsamt. Om avhjälpande inte 
  kan ske skyndsamt eller om avhjälpande på grund av felets art inte är lämpligt eller relevant, ska 
  leverantören i stället göra en ny leverans inom en för Köparen rimlig tid. Avhjälpande ska ske på 
  leverantörens egen bekostnad.
  Om avhjälpande enligt ovan inte sker kan köparen, efter eget val, göra gällande en eller flera av 
  följande påföljder mot leverantören:
  kräva avhjälpande av felet eller förseningen•
  kräva omleverans•
