  3. KRAVSPECIFIKATION OCH ANBUDSUTVÄRDERING
  3.1 Inledning
  Chalmers Next Labs önskar teckna ramavtal med en (1) leverantör för att driva arbetet med 
  affärsutveckling, marknadsföring och finansiering av verksamheter inom CNL Health Lab. 
  Leverantören skall ha erfarenhet av biomedicinskt företagande och finansiering/fundraising samt 
  erfarenhet av dylikt arbete inom både akademi och industri.
  Beställare är Chalmers Next Labs VD Monica RIngvik.
  Leverantören ska arbeta tillsammans med Chalmers Next Labs, Chalmersforskare inom området 
  samt med externa intressenter inom akademi, sjukvård och industri
  3.2 Orientering
  Chalmers Tekniska Högskola har sedan 2017 ansvarat för det SSF-finansierade forskningscentret 
  FoRmulaEx. funktionell leverans av RNA-baserade läkemedel. De tre akademiska partnerna 
  Chalmers, Karolinska Institutet och Göteborgs universitet utför forskning i nära samarbete med 
  industri såsom AstraZeneca. Centrumet bidrar med den grundläggande kunskap som krävs för att 
  utforma säkra och effektiva läkemedelsleveranser för nästa generations RNA-baserade läkemedel. 
  Detta center etablerades och drev forskning inom ett område som för de flesta blev känt först i och 
  med framtagandet av mRNA-vaccinen under Covid-pandemin.
  Inför avslutningen av FormulaEx fanns en önskan att ta tillvara de resultaten (publikationer, know 
  how, implementering av resultat inom industrin samt patent och avknoppningsbolag) i en ny form. 
  Detta har resulterat i bildandet av Chalmers Precision HealthTech Hub som skall tillhandahålla 
  tjänster, erbjuda kompetens och utrustning för utveckling av lipida nanopartiklar som bärare av 
  mRNA för användning inom cell och genterapi. Verksamheten har etablerats och med stöd av 
  nyttiggörandemedel från SSF-projektet i kombination med extern finansiering, har pilotprojekt 
  initierats som visar på värdet av hubben. Avsikten är att etablera den laborativa verksamheten 
  genom en samlokalisering med OligoNova Hub inom Active Lab på GoCo Health Innovation City i 
  Mölndal.
  En viktig del av verksamheten inom Chalmers Precision HealthTech Hub och vidare inom Health Lab 
  som helhet, är att kunna erbjuda tjänster till externa kunder, från startups till etablerade företag. 
  Detta kommer att kräva en avancerad affärsutveckling, baserad på extremt god kännedom om såväl 
  tekniker och forskningsfält som marknad och behov. Marknadsföring och finansiering av denna 
  verksamhet är sammankopplade.
  Mer information om FoRmulaEx kan hämtas från: https://www.chalmers.se/centrum/formulaex/ och 
  https://www.chalmers.se/aktuellt/nyheter/klartecken-for-ny-life-science-motesplats/.
  3.3 Uppdragets utförande
  Leverantören ska tillhandahålla konsult för att driva arbetet med utveckling och finansiering av 
  Chalmers Precision HealthTech Hub.
  Arbetet kan ske på distans, men med återkommande möten med projektledning och styrgrupp på 
  Chalmers samt med intressenter både regionalt och nationellt.
  Karakteristiskt är att arbetet kräver en kombination av självständigt arbete och stor lyhördhet för 
  både forskare och omvärldens behov, samt ett väl utvecklat nätverk och förmåga att ta nya och 
  relevanta kontakter.
