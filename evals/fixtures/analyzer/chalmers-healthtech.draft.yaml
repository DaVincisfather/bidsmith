  1.7.4 Elektronisk avtalssignering
  Chalmers använder sig av elektronisk avtalssignering via Visma Addo.
  Leverantör/-er som tilldelats avtal erhåller ett mail med en länk till en signeringssida där aktuella 
  dokument finns för signering. Då signeringen är undertecknad av båda parter autogenereras avtalet 
  inklusive signatur i sin helhet och tillsänds båda parter via e-post.
  Leverantörer med skandinavisk tillhörighet signerar via avtalstecknarens bank-ID eller motsvarande i 
  respektive land. Bank-ID motsvarar en vanlig namnteckning och avtalstecknarens privata bank-ID 
  används. Leverantörer utanför Skandinavien signerar avtal via fysisk underskrift på papper.
  Det  är  viktigt  att  anbudsgivaren  ser  till  att  ange  behörig  avtalstecknares  e-postadress,  så  att 
  signeringen  når  korrekt  person  med  fullmakt  att  signera.  Utländska  leverantörer  anger  den  e-
  postadress som de önskar att avtalet sänds till.
  Kontaktuppgifter för avtalstecknare (namn, e-post)
  Fritext
  1.7.5 Dataskyddsförordningen
  Köparen kommer att lagra de personuppgifter som anbudsgivaren (leverantören) lämnar in i sitt 
  anbud. Ändamålet är att affärsförhållandet mellan parterna ska fungera.
  Anbudsgivare ansvarar för att de personuppgifter som inkluderas i ett anbud är godkända för detta 
  ändamål av berörda personer. Att man lämnar in anbudet innebär att man godkänner lagring av 
  personuppgifterna.
  1.7.6 Frågor under anbudstiden
  Frågor under anbudstiden ska ställas via funktionen ”frågor och svar” i TendSign. Funktionen hittar 
  man via annonsen till upphandlingen under ”Frågor och Svar”. Anbudsgivare har skyldighet att själva 
  bevaka eventuella frågor, svar och justeringar i upphandlingen.
  Om anbudsgivaren har synpunkter på delar av upphandlingsdokumentationen eller upplever den 
  som otydlig i något avseende, är det viktigt att anbudsgivaren kontaktar köparen snarast möjligt 
  under anbudstiden för att undvika missförstånd och/eller ge köparen möjlighet att justera underlaget. 
  Anbudsgivaren uppmanas att innan anbudet lämnas in kontrollera om nya uppgifter om 
  upphandlingen har tillkommit. Endast skriftligt kompletterade uppgifter lämnade av köparen under 
  anbudstiden är bindande för både köparen och anbudsgivaren.
  Frågor kommer att besvaras senast sex (6) dagar före anbudstidens slut under förutsättning att de 
  inkommit i skälig tid.
  Sista dag för att ställa frågor är 2026-06-15
  1.7.7 Sista dag för anbudsinlämning
  Anbudet ska vara köparen tillhanda senast 2026-06-24 23:59. 
