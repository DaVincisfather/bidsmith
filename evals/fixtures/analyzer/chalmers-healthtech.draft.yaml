  2.3 Skatter, sociala avgifter och F-skatt
  Enligt 13 kap. 2 § LOU ska en upphandlande myndighet utesluta en anbudsgivare från att delta i en 
  upphandling, om upphandlande myndighet får kännedom om att anbudsgivaren enligt en 
  lagakraftvunnen dom har åsidosatt eller ej fullgjort sina skyldigheter avseende betalning av skatter 
  eller sociala avgifter.
  Skatter och sociala avgifter
  Anbudsgivaren ska vara fri från betydande skulder avseende svenska skatter och sociala avgifter till 
