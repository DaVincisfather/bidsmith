  "Befrielsegrunder" eller på leverantören, är beställaren skyldig att erlägga betalning enligt avtalet 
  som om varan i fråga hade levererats. Leverantören ska då på beställarens risk och bekostnad tillse 
  att varan lagras. Om beställaren så begär, ska leverantören också försäkra varan på beställarens 
  bekostnad.
  4.21 Skadestånd
  Utöver de påföljder som beskrivs i detta avtal har vardera parten rätt till ersättning för direkta skador 
  som denne lider till följd av den andre partens avtalsbrott.
  Om felet beror på grov oaktsamhet eller uppsåt har part även rätt till ersättning för indirekt skada, 
  dock högst till ett belopp motsvarande 25 % av hela avtalets värde.
  4.22 Sekretess/informationshantering
  Leverantören förbinder sig att inte för tredje man avslöja konfidentiell information, vilken leverantören 
  erhåller från köparen eller som framkommer vid genomförandet av leverantörens uppdrag för 
  köparen.
  Leverantören ansvarar för att egen personal har undertecknat sekretessavtal då köparen kräver 
  detta.
  I de fall leverantören ges tillgång till enligt Offentlighets- och sekretesslagen (2009:400) skyddad 
  information ska tillämpliga bestämmelser i nämnda lag beaktas. Leverantören ska informera 
  personal och anlitad underleverantör om gällande sekretess. Sekretess gäller även om avtalet i 
  övrigt upphört att gälla.
  Leverantören får inte till tredje man lämna ut handlingar eller på annat sätt återge uppgifter om 
  köparens verksamhet som kan vara att betrakta som affärs- eller yrkeshemlighet eller som i övrigt rör 
  köparens interna förhållanden, i annan utsträckning än som erfordras för uppdragets genomförande. 
  Brott mot denna bestämmelse föreligger även om uppsåt eller oaktsamhet ej kan påvisas.
  Vid brott mot denna bestämmelse ska leverantören vid anfordran utge vite om 10 000 kronor i varje 
  enskilt fall. Utgivandet av vitet inverkar ej på köparens rätt att göra andra påföljder gällande i 
  anledning av kontraktsbrottet. Brott mot denna bestämmelse föreligger även om uppsåt eller 
  oaktsamhet ej kan påvisas.
  4.23 Personuppgifter och personuppgiftsbiträdesavtal (PUBA)
  Vid behandling av personuppgifter inom ramen för detta uppdrag utgör leverantören 
  personuppgiftsbiträde i förhållande till köparen som är personuppgiftsansvarig. Om köparen hanterar 
  personuppgifter på uppdrag av annan myndighet, med ansvar som personuppgiftsbiträde, ska 
  leverantören i sådant fall utgöra underbiträde i denna del. Om inte annat framgår ska mellan 
  parterna tecknat personuppgiftsbiträdesavtal vara gällande för sådan hantering.
  Leverantören ska i samband med avtalstecknande, eller vid av köparen definierad tidpunkt, lämna in 
  ett undertecknat Personuppgiftsbiträdesavtal enligt bilaga PUBA.  
  Denna bilaga kan komma att uppdateras från köparen. Leverantören ska acceptera denna om sådan 
  ny bilaga tas fram.
  4.24 Hantering och förvaring av handlingar
  Leverantören ska följa köparens regler kring förvarande av handlingar, gallringsregler, sekretess 
  mm. Leverantören ansvarar för samtliga handlingar, underlag och material, såväl i pappersform som 
  i elektronisk form, som hanteras av leverantören. All hantering av handlingar skall ske under 
  förhållanden så att uppgifter om enskild skyddas mot obehörig åtkomst. Leverantören skall hantera 
  och förvara handlingar som innehåller sekretessreglerad text eller annan text med känsliga uppgifter 
