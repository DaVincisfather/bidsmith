  1. ANBUDSINBJUDAN
  1.1 Anbudsinbjudan
  Välkommen att lämna anbud i vår upphandling av konsult för Affärsutveckling och marknadsföring av 
  HealthTech. Uppdragsgivare och avtalstecknare är Chalmers Next Labs AB men upphandlingen 
  administreras av Chalmers Tekniska Högskola AB.
  Upphandlingsdokumentet innehåller följande delar:
  Anbudsinbjudan1. 
  Kvalificering av anbudsgivare2. 
  Kravspecifikation och utvärdering3. 
  Avtalsutkast4. 
  Bilagor till upphandlingsdokumentet:
  Chalmers och e-faktura•
  1.2 Beskrivning av köparen
  Chalmers Next Labs AB
  Chalmers Next Labs AB är ett icke-vinstdrivande helägt bolag i universitetskoncernen där Chalmers 
  bedriver verksamhet präglad av forskningsnära utveckling med stor samhällspåverkande potential. 
  Verksamheten är bred och spänner över allt från "Deep Tech" till avancerat beslutsstöd för 
  samhällsutmaningar. Bolaget utvecklar nyttiggörandet av framstående forskning vid Chalmers.
  Sida 1/22

  1.3 Om upphandlingen
  Chalmers Next Labs AB (CNL) önskar teckna ramavtal med en (1) leverantör för att driva arbetet 
  med affärsutveckling, marknadsföring och finansiering av verksamheter inom CNL Health Lab. 
  Leverantören skall ha erfarenhet av biomedicinskt företagande och finansiering/fundraising samt 
  erfarenhet av dylikt arbete inom både akademi och industri.
  Leverantören skall arbeta tillsammans med Chalmers Next Labs, Chalmersforskare inom området 
  samt med externa intressenter inom akademi, sjukvård och industri.
  Avtalspart är Chalmers Next Labs men upphandling en administreras av Andreas Luiga, Sidecore 
  AB.
  1.4 Avtalstid och giltighet
  Avtalet börjar gälla omedelbart efter avtalstecknande och löper därefter till 2026-12-31. Chalmers har 
  därefter möjlighet att förlänga avtalet vid ett eller flera tillfällen upp till en total avtalstid om fyra (4) år.
  1.5 Avtalsvärde
  Avtalet avser ett ramavtal.
  Uppdragets omfattning beräknas utgöra ca hälften av en heltidstjänst men kan variera betydligt över 
  tid. Takvärde för ramavtalet, inklusive eventuella avtalsförlängningar, 4 500 000 kr.
  1.6 Antal leverantörer
  Avtal kommer att tecknas med en leverantör.
  1.7 Upphandlingsföreskrifter
  1.7.1 Krav på anbudsgivaren och anbudet
  Av anbudet ska framgå att förutsättningarna och kraven i upphandlingsdokumentationen uppfylls.
  Samtliga obligatoriska krav (s.k. ska-krav) måste uppfyllas; om så inte sker kommer anbudet att 
  förkastas. Om anbudsgivaren avstår från att svara på något av de ställda kraven eller frågorna 
  kommer detta att tolkas som att kravet inte kan uppfyllas eller att kravet inte accepteras.
  Reservationer eller alternativa anbud accepteras inte. Endast ett (1) anbud per anbudsgivare 
  accepteras.
  Anbud författas på svenska. Officiella intyg, certifikat, produktblad/produktspecifikationer, betyg och 
  liknande som av sin natur inte är på svenska kan skickas in på annat språk. Text och/eller dokument 
  som är författade på annat språk än svenska ska kunna översättas på anbudsgivarens bekostnad 
  om Chalmers så begär.
  Anbudsgivaren ska vara registrerad med organisationsnummer och juridiskt namn i TendSign. 
  Genom att lämna in anbud bekräftar anbudsgivaren att registrerat bolag är juridisk part i denna 
  upphandling. Om anbud lämnas av ombud ska kontot vara registrerat i aktuell kunds 
  organisationsnummer och juridiska namn.
  Anbudsgivaren uppmanas att noggrant gå igenom sitt anbud innan det lämnas. Det finns mycket 
  begränsade möjligheter att i efterhand förtydliga eller komplettera anbudet.
  Anbudsgivaren har inte rätt till någon ersättning för upprättande av anbud.
  1.7.2 Upphandlingsförfarande
