  1.4 UPPHANDLINGENS AVSLUT

  1.4.1 Underrättelse om tilldelningsbeslut

  Underrättelse om vilken/ vilka Leverantörer som tilldelats avtal och skälen för detta lämnas via 

  TendSign. Tilldelningsbeslutet utgör inte avtalsrättslig accept av anbudet.

  1.4.2 Avbrytande av upphandling

  Om Köparen beslutar att avbryta upphandlingen kommer Leverantör underrättas om beslutet samt 

  skälen för detta.

  1.4.3 Tecknande av avtal

  Efter tilldelningsbeslut tecknas avtal med antagen/ antagna Leverantör/ er. Detta gäller under 

  förutsättning att avtalsspärr inte gäller eller att annat hinder inte föreligger för tecknande av
  avtal. 

  1.5 Elektronisk signering av avtal

  Köparen tillämpar elektroniskt signering av avtal 

  För att kunna utföra elektronisk signering av avtal ska den person som är firmatecknare, behörig 

  företrädare, alternativt den person som innehar fullmakt för aktuellt avtalsundertecknande, för 

  Leverantören inneha en e-legitimation hos utfärdare av e-legitimationer.

  Mobilt BankID rekommenderas då det inte krävs installation och underhåll/uppdatering av 

  säkerhetsprogramvaror på datorn. Mobilt BankID beställs kostnadsfritt genom Internetbank. Läs mer 

  på www.bankid.com. Vid signering elektroniskt kontrolleras automatiskt firmateckningsrätten genom 

  Bolagsverket enligt det angivna organisationsnumret. Som verifierad firmatecknare sker signering 

  helt utan avgift då motparten, den upphandlande myndigheten, står för kostnaden.

  Fullmakt 

  Saknas firmateckningsrätt behöver man en fullmakt. Tjänsten för att registrera, lagra och
  underhålla 

  fullmakten är avgiftsbelagd. Registrera en fullmakt hos ChamberSign om firmateckningsrätt 

  saknas. Fullmaktsmall finns vid https://www.csign.se/dokument.

  Utländskt företag eller där firmatecknare saknar svensk e-legitimation 

  För utländsk Leverantör rekommenderas Truid. Läs mer och registrera konto på How to use Truid

  När signeras avtalet?  

  Avtalet signeras elektroniskt efter att Leverantören fått en signeringsinbjudan per e-post.

  Support 

  Support för tjänsten ges av ChamberSign Sverige AB, via e-post support@csign.se 

  Ytterligare information finns på: www.csign.se

  Ange namn, e-postadress och telefonnummer för firmatecknare eller 

  behörig företrädare som genom fullmakt har rätt att teckna avtal.

