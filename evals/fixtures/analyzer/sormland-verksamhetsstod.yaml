golden:
  title: Ramavtal verksamhetsstöd och administrativa tjänster
  client: Region Sörmland, Region Västmanland och Svealandstrafiken AB
  deadline: 2026-06-26
  summary: "Upphandlingen avser ett ramavtal för kvalificerade konsulttjänster inom regional
    utveckling, uppdelat i tre delområden: analyser/utredningar, projektledning/processledning samt
    stöd för externa medelsansökningar och skrivstöd. Avtal tecknas med upp till fem leverantörer
    per delområde och avrop sker genom förnyad konkurrensutsättning. Det totala beräknade värdet
    uppgår till ca 20 MSEK med ett takbelopp om 25 MSEK exkl. moms."
  background: Region Sörmland och Region Västmanland har ett återkommande behov av externt konsultstöd
    inom regional utveckling. Ramavtalet ska täcka behov av analyser, utredningar, projektledning,
    processledning samt stöd för ansökningar om externa medel. Region Västmanland har ett befintligt
    avtal som beräknas löpa ut 2027-03-31, varför de fullt ut kan avropa från det nya ramavtalet
    från det datumet. Avtalstiden är initialt två år från 2026-07-13 med möjlighet till förlängning
    vid två tillfällen om maximalt 12 månader vardera. Upphandlingen genomförs som öppet förfarande
    enligt LOU och förhandling medges inte.
  diaryNumber: IN-IN25-0354
  requirements:
    - category: Anbudsform
      description: Anbudet ska vara skriftligt och på svenska. Reservationer godtas inte. Alternativa
        utföranden accepteras ej.
      priority: must
    - category: Prissättning
      description: Leverantören ska ange timpriser i SEK exkl. moms för fyra konsultnivåer (junior,
        erfaren, senior, expert) per delområde som anbudet avser. Samtliga konsultnivåer måste
        prissättas för aktuellt delområde.
      priority: must
    - category: Kvalificering – ekonomi
      description: Leverantören ska ha minst 40 poäng enligt Creditsafes ratingskala samt inneha giltig
        ansvarsförsäkring för person- och sakskada.
      priority: must
    - category: Kvalificering – teknisk kapacitet
      description: Leverantören ska ha dokumenterad kompetens och erfarenhet inom regional utveckling,
        offentlig förvaltning och demokratisk styrmodell. God kännedom om hållbar utveckling och
        relevanta sakområden krävs.
      priority: must
    - category: Kvalitetssäkring
      description: Leverantören ska tillämpa dokumenterade kvalitetssäkringsrutiner och ha ett
        systematiskt kvalitetsarbete, alternativt inneha ISO 9001, FR2000 eller motsvarande
        certifikat.
      priority: must
    - category: Miljöledning
      description: Leverantören ska bedriva ett systematiskt och dokumenterat miljöarbete med miljöpolicy,
        identifierade miljöaspekter, mål och rutiner. ISO 14001, EMAS eller FR2000 godtas som bevis.
      priority: must
    - category: Personuppgiftsbiträdesavtal
      description: Leverantören ska acceptera och underteckna bifogat utkast till
        personuppgiftsbiträdesavtal (Bilaga 1).
      priority: must
    - category: Uppförandekod
      description: Leverantören ska följa regionernas uppförandekod för leverantörer (Bilaga 2) avseende
        mänskliga rättigheter, arbetares rättigheter, miljö och affärsetik.
      priority: must
    - category: Sanktioner mot Ryssland
      description: Leverantören och dess underleverantörer får inte vara föremål för EU-sanktioner
        kopplade till Ryssland. Leverantören ska proaktivt bevaka och rapportera eventuella
        förändringar.
      priority: must
    - category: Elektronisk fakturering
      description: Leverantören ska vid avtalsstart kunna skicka e-faktura enligt PEPPOL BIS Billing 3
        eller annat överenskommet format.
      priority: must
    - category: Utvärderingsbilagor
      description: Leverantören ska lämna in specifika utvärderingsbilagor (D1-1 till D1-4, D2-1 till
        D2-4, D3-1 till D3-4) i PDF-format via TendSign för varje delområde som anbudet avser. Max 5
        A4-sidor per bilaga.
      priority: must
    - category: Konsultkompetens
      description: Konsulterna ska ha relevant utbildning, mycket god svenska i tal och skrift, god
        engelska, strukturerat och analytiskt arbetssätt samt kunskap om arbete i politiskt styrda
        organisationer.
      priority: must
    - category: Kapacitet och redundans
      description: Leverantören ska beskriva antal konsulter per nivå, fördelning mot sakområden,
        ungefärlig årskapacitet samt rutiner för bemanning vid hög belastning och konsultbyte.
      priority: must
    - category: Hållbarhet – resor
      description: Konsulterna ska i möjligaste mån använda resesätt med låg klimatpåverkan, exempelvis
        tåg och kollektivtrafik.
      priority: should
    - category: Tillgänglighetsanpassning
      description: När beställaren anger att material ska tillgänglighetsanpassas ska leverantören följa
        WCAG minst nivå AA och använda regionernas mallar och grafiska profil.
      priority: should
    - category: AI-genererade bilder
      description: AI-genererat bildmaterial får bara användas i material som ska följa regionernas
        grafiska profil om beställaren uttryckligen godkänt det.
      priority: should
    - category: Specialistkompetens – avancerade analyser
      description: Leverantören ska vid behov kunna erbjuda avancerad analys- och utvärderingskompetens,
        t.ex. GIS-analyser, trafik- och linjenätsanalyser, avancerade statistiska metoder eller
        effektutvärderingar.
      priority: must
    - category: Certifieringar – projektledning
      description: Eventuella certifieringar kopplade till projektledning eller processledning samt antal
        konsulter som omfattas ska redovisas i Bilaga D3-4 för delområde 3 — redovisningsskyldigheten
        är obligatorisk, certifieringen i sig är meriterande.
      priority: must
