  8.6 SÄRSKILDA VILLKOR

  8.6.1 Tillbörlig aktsamhet för hållbara leveranskedjor

  Avtalsvillkoren om tillbörlig aktsamhet för hållbara leveranskedjor syftar till att säkerställa
  att 

  upphandlade leverantörer har policyer och processer på plats för att identifiera, förhindra,
  begränsa 

  och gottgöra negativ påverkan på människor, miljö och samhälle i den egna verksamheten och i 

  leveranskedjorna.

  Dessa villkor, inklusive förekommande termer och begrepp, bygger på FN:s Global Compact, FN:s 

  vägledande principer för företag och mänskliga rättigheter, OECD:s riktlinjer om tillbörlig
  aktsamhet 

  för ansvarsfullt företagande samt ILO:s trepartsförklaring om multinationella företag och
  socialpolitik.

  På www.hållbarupphandling.se finns en vägledning för leverantörer med närmare anvisningar kring 

  Leverantörens process för tillbörlig aktsamhet och mallar för de processteg som beskrivs nedan.

  8.6.1.1 Leverantörens åtaganden i Uppförandekod för leverantörer

  Leverantören ska fullgöra Avtalet i enlighet med åtagandena i bilaga Uppförandekod för
  leverantörer 

  avseende mänskliga rättigheter, arbetares rättigheter, miljön och affärsetik samt vidta de
  åtgärder 

  som anges i detta avsnitt.

  Åtagandena gäller för all verksamhet med anknytning till det som anskaffas.

  8.6.1.2 Leverantörens process för tillbörlig aktsamhet

  För att säkerställa efterlevnaden av åtagandena i Uppförandekod för leverantörer ska leverantören 

  ha en process för tillbörlig aktsamhet enligt nedan. Processen ska vara dokumenterad och
  tillämpas 

  från avtalsstart. Genom denna process ska leverantören identifiera, förhindra, begränsa och
  gottgöra 

  negativ påverkan på människor, miljö och samhälle i den egna verksamheten och i 

  leveranskedjorna. Detta betyder att:

  Leverantören ska integrera åtagandena i Uppförandekod för leverantörer i policyer och fördela 

  ansvaret för policyer och tillbörlig aktsamhet genom att 

  säkerställa att relevanta policyer, fastställda på högsta ledningsnivå, antas eller 

  revideras så att de överensstämmer med åtagandena i Uppförandekod för 

  leverantörer,

  a. 

  offentliggöra policyerna och kommunicera dem till rättighetshavare som berörs av den 

  egna verksamheten,

  b. 

  säkerställa att styrelsen tar hänsyn till policyerna när den fattar beslut,c. 

  utse en eller flera personer i ledningsfunktion som ansvariga för processen för tillbörlig 

  aktsamhet samt

  d. 

  tilldela ansvar för implementeringen av policyerna till anställda vars beslut mest 

  sannolikt ökar eller minskar riskerna för negativ påverkan. 
   
  e. 

  a. 

