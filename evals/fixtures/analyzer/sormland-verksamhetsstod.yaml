  7. Pris och ersättning

  7.1 Anbudspris

  Leverantören ska lämna timpriser för det eller de delområden som Leverantören lämnar anbud på. 

  Varje delområde prissätts separat. För varje delområde ska Leverantören ange timpris i SEK 

  (exklusive mervärdesskatt) för följande konsultnivåer:

  Junior konsult•

  Erfaren konsult•

  Senior konsult•

  Expert•

  Timpriserna utgör Leverantörens anbudspriser i ramavtalet och är högsta tillåtna timpris vid avrop
  för 

  respektive konsultnivå inom aktuellt delområde, efter eventuella indexjusteringar enligt 

  avtalsvillkoren. Vid avrop får Leverantören lämna samma timpris som i ramavtalet eller ett lägre 

  timpris, men inte ett högre timpris. Lägre timpris vid avrop gäller endast för det aktuella
  avropet.

  Konsult som debiteras enligt en viss konsultnivå ska uppfylla kraven för den nivån enligt avsnitt
  3.2.2 

  Konsultnivåer.

  För utvärdering beräknar Köparen ett utvärderingspris per delområde genom en fast 

  beräkningsmodell där timpriset per konsultnivå multipliceras med ett förutbestämt antal fiktiva 

  utvärderingstimmar. Beräkningsmodellen används endast för jämförelse av anbud och motsvarar 

  inte en beställning eller ett garanterat uttag av timmar.

  Exempel på beräkningsmodell (illustrativt, per delområde):

  Junior konsult: 900 kr per timme x 100 timmar = 90 000 kr•

  Erfaren konsult: 1 200 kr per timme x 150 timmar = 180 000 kr•

  Senior konsult: 1 500 kr per timme x 200 timmar = 300 000 kr•

  Expert: 1 800 kr per timme x 50 timmar = 90 000 kr•

  Utvärderingspris = 90 000 + 180 000 + 300 000 + 90 000 = 660 000 kr (exklusive mervärdesskatt)

  Om Leverantören inte lämnar timpris för någon konsultnivå som ingår i beräkningsmodellen för ett 

  delområde bedöms anbudet som ofullständigt för det delområdet och kommer som huvudregel att 

  förkastas.

  7.1.1 Delområde 1, Analyser, utredningar, undersökningar och utvärderingar

  Anbudspriser ska omfatta komplett leverans av delområde 1 i enlighet med 

  upphandlingsdokumenten samt eventuella förtydliganden, kompletteringar och frågor och svar.

  Leverantören ska ange timpriser i SEK, exklusive mervärdesskatt, för följande konsultnivåer:

  Junior konsult1. 

  Erfaren konsult2. 

  Senior konsult3. 

  Expert4. 

  Samtliga produktrader ska prissättas. Om timpris saknas för någon konsultnivå bedöms anbudet 

  som ofullständigt för delområde 1.

  Timpriserna är Leverantörens anbudspriser i ramavtalet för delområde 1 och utgör högsta tillåtna 

  timpris vid avrop inom delområde 1, efter eventuella indexjusteringar enligt avtalsvillkoren. Vid
  avrop 

  får Leverantören lämna samma timpris eller ett lägre timpris, men inte ett högre timpris.

  Konsult som debiteras på en konsultnivå ska uppfylla nivåkraven enligt avsnitt 3.2.2
  Konsultnivåer.

