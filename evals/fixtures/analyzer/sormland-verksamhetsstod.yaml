  8.4 KOMMERSIELLA VILLKOR

  8.4.1 Pris

  Avtalade priser framgår av Pris och ersättning.

  Samtliga priser är angivna i SEK och är exklusive mervärdesskatt. Ersättningen ska avse hela 

  åtagandet enligt Avtalet.

  Faktureringsavgifter, andra avgifter eller pristillägg får inte utgå från Leverantören eller
  tredje part. 

  Dessa kostnader ska vara inräknade i priset och inte föranleda särskild debitering. Köparen har
  inte 

  någon skyldighet att betala någon avgift eller kostnad utöver vad som uttryckligen framgår av 

  Avtalet.

  8.4.2 Prisjustering

  Indexjustering av priser 

  Priserna ska vara fasta under det första avtalsåret. Därefter får priserna justeras 1 gång per 12-

  månadersperiod med hänsyn till förändring av gällande index. 

  Prisjusteringens storlek begränsas till ett procenttal motsvarande högst 80 procent av gällande 

  indexförändring.

  Överenskommen prisjustering ska gälla under minst 12 månader.

  Priser på tjänsten ska justeras med hänsyn till Statistiska Centralbyråns index, benämnt Labour
  Cost 

  Index för tjänstemän (preliminärt), privat sektor (LCI tjm) efter näringsgren M företag inom
  juridik, 

  ekonomi, vetenskap och teknik SNI 2007).

  Den första prisjusteringen beräknas som skillnaden mellan senaste publicerade index och index 12 

  månader före. Det vill säga förändringen baseras på senaste 12-månadersperioden vid tidpunkten 

  för inkommen begäran om prisjustering. 

  Därefter beräknas prisjustering som förändringen mellan index vid föregående justering till
  senast 

  publicerat index.

  Part som vill justera priset i enlighet med ovanstående regel ska skicka in begäran om
  prisjustering 

  via e-post till kontaktpersonen för avtalet.

