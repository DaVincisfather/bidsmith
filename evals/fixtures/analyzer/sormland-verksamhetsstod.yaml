  Tänk på att ställa frågor i god tid för att möjlighet ska finnas att ställa följdfrågor.

  1.2 KRAV PÅ ANBUDET OCH DESS AVLÄMNANDE

  1.2.1 Anbudets form och innehåll

  Anbudet ska vara skriftligt och på svenska. Enstaka uttryck, myndighetsdokument och produktblad 

  eller liknande accepteras även på andra språk, förutsatt att Leverantören på begäran inom två (2) 

  veckor kan tillhandahålla översättning till svenska alternativt engelska.

  I upphandlingsdokumenten efterfrågas ett antal uppgifter som antingen ska besvaras i anbudet, 

  lämnas in under utvärderingen på begäran eller kontrolleras av Köparen, vilket framgår av 

  upphandlingsdokumentens olika delar.

  Filer som bifogas anbudet ska vara i ett filformat som kan läsas av MS Word respektive Excel alt.
  i 

  PDF- eller JPG-format, om möjligt i bearbetningsbart format.

  Köparen undanber sig broschyrer, standardvillkor och annan övrig information som inte är relevant 

  för upphandlingen.

  Villkor och annan information som bifogats till eller ingår i Leverantörens anbud, och som inte 

  efterfrågats av Köparen, kommer inte att beaktas eller accepteras.

  1.2.2 Reservationer

  Reservationer godtas inte, om anbudet innehåller reservationer kommer dessa inte beaktas. 

  Reservationer avseende krav kan medföra att anbudet förkastas.

  1.2.3 Anbud med alternativa utföranden

  Anbud med alternativa utföranden accepteras ej.

  1.2.4 Ersättning för upprättande av anbud

  Köparen ersätter inte kostnader för upprättande av anbud eller deltagande i upphandlingen.

  1.2.5 Helt eller delat anbud

  Anbud kan lämnas för följande delar:

  Delområde 1 - Analyser, utredningar, undersökningar och utvärderingar.

  Delområde 2 - Projektledning, processledning, processtöd samt metod- och 

  processutveckling.

  Delområde 3 - Stöd för ansökningar om externa medel och skrivstöd.

  Anbud kan antas helt eller delvis.

  Köparen avser att teckna avtal med upp till fem (5) Leverantörer per del.

  Varje del utvärderas och tilldelas var för sig.

  1.2.6 Anbudspris

  Anbudspris ska lämnas i dokument Pris och ersättning.

  Priset ska anges i svenska kronor (SEK) exklusive mervärdesskatt.

  IN-IN25-0354 Ramavtal verksamhetsstöd och 

  administrativa tjänster

  Publicerad 2026-05-12 09:04

  Sida 4/85


  1.2.7 Anbudstidens utgång

  Anbud ska vara inlämnat i TendSign senast: 2026-06-11 23:59

  Anbud som inlämnats efter anbudstidens utgång beaktas inte.

  1.2.8 Anbudsöppning

  Anbudsöppning sker snarast efter anbudstidens utgång. Anbudsöppningen är inte offentlig.

  1.2.9 Anbudets giltighetstid

  Anbudet ska vara bindande t.o.m. 2026-11-02

  Om upphandlingen blir föremål för rättslig prövning ska köparen ha rätt att förlänga anbudens 

  giltighetstid fram till dess att avtal kan tecknas, dock längst med sex (6) månader.

  1.3 VAL AV ANBUD

  1.3.1 Prövning av krav

  Upphandlingsdokumenten med bilagor innehåller krav på Leverantören, anbudet och efterfrågad 

  vara eller tjänst. Anbudet prövas mot vart och ett av dessa krav. Om något av kraven inte
  uppfylls 

  kommer anbudet som huvudregel att förkastas. Kraven ska upprätthållas under avtalstiden.

  Rättelse av fel, förtydligande eller komplettering av ett anbud kan tillåtas om det kan ske med
  hänsyn 

  till likabehandling och öppenhet.

  1.3.2 Kvalificering av leverantör

  Leverantören ska ha den rättsliga och finansiella förmåga, och den tekniska och yrkesmässiga 

  kapacitet som krävs för att utföra de åtaganden som omfattas av avtalet. Detta innebär bland
  annat 

  att Leverantören ska förfoga över nödvändiga personalresurser och tekniska resurser samt ha sådan 

  erfarenhet som behövs för att avtalet ska kunna fullgöras enligt en ändamålsenlig
  kvalitetsstandard.

  Leverantören prövas mot kvalificeringskraven som beskrivs i dokumentet ESPD.

  1.3.3 Utvärdering av anbud

  Av de anbud som uppfyller kraven i upphandlingsdokumenten kommer Köparen att anta de anbud 

  som har det ekonomiskt bästa förhållandet mellan pris och kvalitet.

  Utvärdering och tilldelning sker separat per delområde. Köparen avser att teckna ramavtal med upp 

  till fem (5) Leverantörer per delområde. Ingen rangordning mellan antagna Leverantörer fastställs
  i 

  ramavtalet.

  Onormalt lågt anbud kan komma att förkastas om Leverantören inte på Köparens begäran lämnat en 

  tillfredsställande förklaring till det onormalt låga anbudet.

  1.3.4 Övergripande information om utvärderingen

  Utvärderingen genomförs som en mervärdesmodell där kvalitet ger avdrag på ett beräknat 

  utvärderingspris per delområde. Jämförelsesumman beräknas per delområde som utvärderingspris 

  (enligt 1.3.5) reducerat med kvalitetsavdrag (enligt 1.3.6). Lägst jämförelsesumma antas.

  Pris och kvalitet viktas 50 procent vardera genom att maximal sammanlagd avdragsnivå för kvalitet 

  fastställs till 50 procent av utvärderingspriset per delområde. Detta innebär att kvalitet kan
  reducera 

  utvärderingspriset med maximalt 50 procent.

  IN-IN25-0354 Ramavtal verksamhetsstöd och 

  administrativa tjänster

  Publicerad 2026-05-12 09:04

  Sida 5/85


  De fem (5) anbud som erhåller lägst jämförelsesumma per delområde antas, under förutsättning att 

  anbuden i övrigt är godtagbara. Om färre än fem (5) godtagbara anbud återstår i ett delområde kan 

  ramavtal tecknas med färre Leverantörer.

  Skiljeregel vid lika jämförelsesumma, tillämpas i följande ordning:

  Högre total avdragsprocent (enligt 1.3.6)1. 

  Lägre utvärderingspris (enligt 1.3.5)2. 

  Lottning3. 

  1.3.5 Utvärderingspris per delområde, fast beräkningsmodell

  Utvärderingspris beräknas per delområde enligt en fast beräkningsmodell som anges i dokumentet 

  Pris och ersättning. Beräkningsmodellen utgår från fasta antal timmar per angiven roll eller 

  konsultnivå.

  Utvärderingspris = summa (offererat timpris per angiven roll eller konsultnivå x angivet antal 

  utvärderingstimmar)

  Utvärderingspris är ett av Köparen beräknat pris baserat på Leverantörens offererade timpriser
  och 

  de fasta utvärderingstimmar som anges i Pris och ersättning.

  Utvärderingspriset anges och beräknas i SEK, exklusive mervärdesskatt.

  Om Leverantören inte lämnar pris för någon post som ingår i beräkningsmodellen bedöms anbudet 

  som ofullständigt för aktuellt delområde och kommer som huvudregel att förkastas.

  1.3.6 Kvalitetskriterier, maxavdrag och poängsättning

  Kvalitet bedöms per delområde utifrån kriterierna under respektive delområde.

  Gemensamt för samtliga delområden gäller följande:

  Varje kvalitetskriterium poängsätts på en 3-poängskala (1-3).1. 

  Varje kriterium har ett angivet maxavdrag (i procent av utvärderingspriset).2. 

  Summan av maxavdrag per delområde är 100 procent. Poäng 3 ger 50 procent av respektive 

  kriteriums maxavdrag. Därför kan den sammanlagda avdragsprocenten som mest bli 50 

  procentenheter.

  3. 

  Omräkning av poäng till avdrag per kriterium:

  Poäng 1: 0 procent av kriteriets maxavdrag1. 

  Poäng 2: 25 procent av kriteriets maxavdrag2. 

  Poäng 3: 50 procent av kriteriets maxavdrag3. 

  Beräkning:

  Avdrag för kriterium i (i procentenheter) = maxavdrag i x ((poäng i - 1) / 4)1. 

  Total avdragsprocent (i procentenheter) = summa avdrag för samtliga kvalitetskriterier i 

  delområdet (max 50)

  2. 

  Jämförelsesumma = utvärderingspris x (1 - (total avdragsprocent / 100))3. 

  Med procentenheter avses avdragets storlek i jämförelsen, exempelvis 7,5 procentenheter innebär 

  att utvärderingspriset reduceras med 7,5 procent.

  Total avdragsprocent avser summan av avdragen för samtliga kvalitetskriterier inom aktuellt 

  delområde.

  Beräkningar görs med full precision. Redovisning av belopp kan komma att avrundas till två 

  decimaler.

  IN-IN25-0354 Ramavtal verksamhetsstöd och 

  administrativa tjänster

  Publicerad 2026-05-12 09:04

  Sida 6/85


  Bedömningen görs enbart utifrån Leverantörens anbud och de utvärderingsbilagor som uttryckligen 

  efterfrågas. Uppgifter eller bilagor som inte efterfrågas beaktas inte. Poängsättningen avser 

  kvaliteten i Leverantörens redovisade arbetssätt, erfarenhet och förmåga i förhållande till
  kriteriernas 

  nivåbeskrivningar.

  1.3.6.1 Räkneexempel (illustrativt)

  Utvärderingspris: 1 000 000 SEK.

  Maxavdrag:  

  K1 40 procent,  

  K2 30 procent,  

  K3 10 procent,  

  K4 20 procent.

  Poäng:  

  K1 = 3,  

  K2 = 2,  

  K3 = 1,  

  K4 = 2.

  Avdragsnivå per poäng 

  Poäng 1 ger 0 procent av kriteriets maxavdrag. 

  Poäng 2 ger 25 procent av kriteriets maxavdrag. 

  Poäng 3 ger 50 procent av kriteriets maxavdrag.

  Avdrag per kriterium 

  K1: 50 procent av 40 procent = 20,0 procentenheter. 

  K2: 25 procent av 30 procent = 7,5 procentenheter. 

  K3: 0 procent av 10 procent = 0,0 procentenheter. 

  K4: 25 procent av 20 procent = 5,0 procentenheter.

  Total avdragsprocent 

  20,0 + 7,5 + 0,0 + 5,0 = 32,5 procentenheter.

  Jämförelsesumma 

  Jämförelsesumma = 1 000 000 x (1 - (32,5 / 100)) = 675 000 SEK.

  1.3.7 Utvärderingsbilagor

  Leverantören ska bifoga utvärderingsbilagor för varje delområde som anbudet avser. Underlagen 

  ska vara så konkreta att Köparen kan bedöma kriterierna mot nivåbeskrivningarna för poäng 1-3. 

  Bilagornas innehåll framgår under respektive delområde.

  Utvärderingsbilagor ska lämnas in elektroniskt via upphandlingssystemet (TendSign). Bilagor ska 

  laddas upp i de uppladdningsfält som hör till det delområde som anbudet avser. Leverantören ska 

  endast lämna in bilagor för de delområden som anbud lämnas på. Varje bilaga ska laddas upp i sitt 

  avsedda uppladdningsfält med motsvarande bilagebeteckning (exempelvis “Bilaga D1-1”, “Bilaga 

  D1-2” osv). Bilagor som laddas upp i fel delområde eller i fel uppladdningsfält kan komma att 

  bedömas som saknade.

  Utvärderingsbilagorna ska uppfylla följande:

  Inlämningssätt och placering

  Bilagor ska lämnas via TendSign och laddas upp under rätt delområde.•

  Varje bilaga ska laddas upp i sitt avsedda uppladdningsfält.•

  Uppgifter som lämnas på annan plats än i efterfrågade utvärderingsbilagor, exempelvis i 

  fritextfält eller som övriga bilagor utan koppling till bilagebeteckning, beaktas inte vid 

  utvärderingen.

  •

  IN-IN25-0354 Ramavtal verksamhetsstöd och 

  administrativa tjänster

  Publicerad 2026-05-12 09:04

  Sida 7/85


  Format och filnamn

  Bilagor ska lämnas i PDF-format.•

  Bilagor ska namnges enligt angiven bilagebeteckning (exempelvis D1-1, D1-2, D2-1). Filnamnet 

  ska inledas med bilagebeteckningen.

  •

  Struktur och disposition

  Bilagor ska vara tydligt strukturerade och följa angiven disposition under respektive delområde.•

  Redovisningen ska vara konkret och spårbar samt möjliggöra en entydig bedömning mot 

  nivåbeskrivningarna för poäng 1-3.

  •

  Generella beskrivningar, marknadsföringstexter eller uppgifter utan tydlig koppling till
  efterfrågat 

  innehåll beaktas inte vid utvärderingen.

  •

  Omfång och formalia

  Maxomfång per bilaga är 5 A4-sidor. Detta maxomfång avser redovisande text i bilagan.•

  Text ska vara i A4-format med normal marginalsättning och läsbar textstorlek (minst 11 pt).•

  För bilagor där exempel på mallar, checklistor eller motsvarande efterfrågas får exempel 

  bifogas som separata PDF-filer, med ett sammanlagt maxomfång om 10 A4-sidor per 

  delområde. Innehåll utöver angivet maxomfång beaktas inte vid utvärderingen.

  •

  Konsekvens vid brister

  Om en efterfrågad utvärderingsbilaga saknas, är tom eller inte går att koppla till rätt kriterium 

  bedöms anbudet som ofullständigt för aktuellt delområde och kommer som huvudregel att 

  förkastas.

  •

  Om bilagor inte går att koppla till rätt delområde eller rätt uppladdningsfält kan bilagan
  bedömas 

  som saknad.

  •

  1.3.7.1 Delområde 1, Analyser, utredningar, undersökningar och 

  utvärderingar

  Kriterier och maxavdrag (summa 100 procent):

  K1 Sakområdeskunskap och uppdragsnivå, maxavdrag: 40 procent•

  K2 Metodik och arbetssätt, inklusive relevanta verktyg, maxavdrag: 30 procent•

  K3 Kvalitetssystem och synpunktshantering, maxavdrag: 10 procent•

  K4 Kapacitet, redundans och kontinuitet, maxavdrag: 20 procent•

  Summa maxavdrag: 100 procent

  Utvärderingsbilagor, delområde 1:

  Bilaga D1-1 Referensportfölj (K1) 
   
  Leverantören ska redovisa tre (3) referensuppdrag genomförda under de senaste tre (3) åren, 

  relevanta för delområde 1. Referensuppdragen ska sammantaget visa Leverantörens erfarenhet av 

  uppdrag på relevant nivå och komplexitet. 

  De tre (3) angivna referensuppdragen får inte avse uppdrag som samtliga har utförts åt samma 

  uppdragsgivare. Referensuppdragen ska sammantaget omfatta uppdrag för minst två (2) olika 

  uppdragsgivare.

  För varje referensuppdrag ska följande framgå:

  Uppdragsgivare1. 

