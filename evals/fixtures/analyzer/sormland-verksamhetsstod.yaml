  8.2.2.9 Krav på avropsförfrågan

  När punkt 8.2.2 används ska avropsförfrågan minst ange:

  a) att avropet omfattas av punkt 8.2.2, 

  b) vilken uppdragstyp som avses, 

  c) vilka leveranser som ska tas fram, 

  d) vilket sakområde uppdraget avser, 

  e) vilka tekniska kompetenser som krävs.

  I övrigt gäller de krav på avropsförfrågan som följer av ramavtalet.

  8.2.3 Takvolym/takvärde

  Takvärdet i ramavtalet är 25 000 000 SEK exkl. moms. 

  Om ramavtalets värde överstiger angivet belopp upphör ramavtalet att gälla utan ytterligare 

  bekräftelse från någondera Part. Parterna delar ett ömsesidigt ansvar att underrätta motparten om 

  takvärdet uppnås.

  Takvärdet ska inte ses som ett garanterat värde utan fastställer endast en övre gräns för
  ramavtalet.

  8.3 LEVERANTÖRENS ÅTAGANDE

  8.3.1 Leverantörens åtagande

  Leverantören åtar sig att till Köparen leverera varor och/eller tjänster inom de i Avtalet
  angivna 

  leveranstiderna och i enlighet med villkoren i detta Avtal. Leverantör ska under hela
  avtalsperioden 

  uppfylla kraven som anges i de upphandlingsdokument som legat till grund för upphandlingen.

