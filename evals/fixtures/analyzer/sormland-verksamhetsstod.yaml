  8.4.3 Betalnings- och faktureringsvillkor

  Fakturering ska ske månadsvis i efterskott.

  Om anledning till anmärkning mot leverans eller faktura inte föreligger, sker betalning inom 30
  dagar 

  efter fakturans ankomstdag om inget annat framgår av Avtalet. 

  Faktura får skickas först efter fullgjord och godkänd leverans eller avtalad delleverans.
  Delfakturering 

  godtas inte utan att särskild överenskommelse träffats om detta. 

  Betalning innebär ej godkännande av leverans/uppdrag eller att Köparen avstått från att göra 

  gällande dröjsmål eller fel. Faktura ska vara Köparen tillhanda senast tre (3) månader efter 

  leveransen har slutförts. Senare framställt krav medför inte rätt till ersättning. 
   
  Faktura ska innehålla specifikation om vad fakturan avser, referensinformation som exempelvis 

  Köparens ordernummer och referenskod samt i övrigt för kontraktet tillämpliga uppgifter
  exempelvis 

  kontraktsnummer.  
   
  Dröjsmålsränta utgår enligt räntelagen. Dröjsmålsränta utgår dock inte för fakturor som enligt
  lag 

  eller detta avtal är ofullständiga eller feladresserade.

  Fakturering ska ske månadsvis i efterskott. Betalning sker inom trettio (30) dagar efter
  fakturans 

  ankomstdag och godkänd leverans/uppdrag. Faktura avseende utfört åtagande som sker mot 

  timdebitering ska innehålla en redovisning av vilken person hos Köparen som avropat tjänsten, 

  specifikation av utfört arbete, datum och åtgången tid.

  8.4.4 Elektronisk fakturering

  Leverantören ska senast vid avtalsstart kunna sända elektronisk faktura (E-faktura) enligt
  följande:

  PEPPOL BIS Billing 3•

  alternativt annat överenskommet format•

  eller registrera sina fakturor via den leverantörsportal Köparen anvisar till. Med
  leverantörsportal 

  menas Köparens webbaserade portal som är ansluten till Köparens e-handelssystem och i vilken 

  leverantörer kan logga in för att registrera fakturor.

  Leverantören ska vid avtalsstart kunna kommunicera elektroniskt på något av följande sätt:

  via PEPPOL-nätverket•

  eller annat överenskommet kommunikationssätt•

  För mer information om elektronisk fakturering och för att ta del av ytterligare anvisningar, se 

  Köparens webbplats http://info.edionet.net/du/fakturering/e-faktura

  För mer information om standarder och tekniska format för elektronisk fakturering se
  https://sfti.se/

