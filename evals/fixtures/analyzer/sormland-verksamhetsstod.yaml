  I artikel 58.2 i direktiv 2014/24/EU anges följande kvalificeringskrav:

  Inskrivning i handelsregister

  Leverantören samt åberopat företag/konsortiedeltagare ska vara inskrivna i handelsregister som
  förs 

  i den medlemsstat där företaget är etablerad enligt vad som anges i bilaga XI till direktiv
  2014/24/EU. 

  Dessa är aktiebolags-, handels- eller föreningsregistret. Leverantörer från vissa medlemsstater
  kan 

  behöva uppfylla andra krav som anges i den bilagan.

  Köparen kommer kontrollera krav på registrering genom Creditsafe.

  Ovan företag vars uppgifter inte kan inhämtas av Köparen, ska som kompletterande dokument 

  (d.v.s. på begäran) skicka in handling som styrker att företaget är registrerat i motsvarande
  register. 

  Denna handling ska vara översatt till svenska, engelska, danska eller norska om
  originalhandlingen 

  är upprättat på ett annat språk, och vara högst 3 månader gammal, om inte annat föreskrivs i 

  företagets medlemsland.

