  3.7 Krav på genomförande, dokumentation och leveranser

  Leverantören ska genomföra uppdrag på ett strukturerat och transparent sätt. Detta innebär att 

  leverantören ska säkerställa att konsulterna

  tar fram en enkel uppstartsplan i dialog med beställaren (syfte, mål, avgränsning, arbetssätt, 

  tidplan, kontaktvägar),

  •

  vid behov föreslår och genomför avstämningsmöten under uppdragets gång,•

  löpande informerar beställaren om framdrift, avvikelser och behov av beslut,•

  dokumenterar genomförande, analyser, slutsatser och rekommendationer på ett sätt som gör 

  det möjligt för beställaren att arbeta vidare med materialet,

  •

  levererar överenskomna delrapporter och slutrapporter i de format som efterfrågas, som 

  huvudregel i både redigerbart originalformat (till exempel Word, Excel, PowerPoint, GIS-filer 

  eller motsvarande) och i PDF-format.

  •

  När beställaren anger att material ska tillgänglighetsanpassas ska leverantören leverera filer
  som 

  följer standarden Web Content Accessibility Guidelines (WCAG) minst nivå AA. I sådana fall ska 

  leverantören, i den mån det är möjligt, använda de mallar som Region Sörmland och/eller Region 

  Västmanland tillhandahåller och följa respektive regions grafiska profil. AI-genererade bilder
  eller 

  annat bildmaterial får endast användas i material som ska följa regionernas grafiska profil om 

  beställaren uttryckligen godkänt detta.

  Allt material som tas fram inom ramen för uppdraget ska tillhöra beställaren, det vill säga
  Region 

  Sörmland och/eller Region Västmanland genom den funktion som gör avropet. Med material avses 

  både färdiga leveranser och arbetsmaterial, såsom underlag, analyser, mallar, datafiler och 

  presentationsmaterial som tagits fram inom uppdraget. Beställaren ska ha rätt att fritt använda, 

  vidareutveckla och återanvända materialet i sin verksamhet. Leverantören får inte utan
  beställarens 

  skriftliga medgivande använda materialet i andra uppdrag eller sammanhang.

  3.8 Krav på oberoende och hantering av intressekonflikter

  Leverantören ska vara oberoende i sina analyser, bedömningar och rekommendationer.

  Leverantören får inte utvärdera eller granska arbeten, metoder eller upplägg som leverantören
  själv 

  har tagit fram eller genomfört, om inte detta godkänns av beställaren i det enskilda fallet och 

  särskilda åtgärder vidtas för att hantera intressekonflikter.

  Eventuella intressekonflikter ska omedelbart och skriftligt redovisas för beställaren. Beställaren
  avgör 

  om uppdraget kan genomföras, ska omformas eller om annan leverantör bör anlitas.

  3.9 Resor och hållbarhet (leverantören och konsulterna)

  I uppdrag där resor ingår ska leverantören säkerställa att konsulterna, när det är möjligt,
  använder 

  resesätt med låg klimatpåverkan, exempelvis tåg och annan kollektivtrafik.

  Leverantören ska i genomförandet av uppdrag beakta Region Sörmlands och Region Västmanlands 

  mål och riktlinjer för hållbar utveckling, inklusive klimat- och miljömål samt social hållbarhet.
  I 

  relevanta uppdrag ska leverantören kunna bidra med bedömningar av hållbarhetseffekter och förslag 

  till åtgärder som stärker hållbar utveckling.

