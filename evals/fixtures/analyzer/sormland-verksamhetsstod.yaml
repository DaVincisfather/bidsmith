  8.4.5 Vite felaktig fakturering

  Om Leverantören trots upprepade skriftliga påpekanden (minst två) från Köparen, skickar fakturor 

  och fakturaunderlag/ fakturaformat som avviker från villkoren i avtalet eller fakturerar
  prisändringar 

  som inte är godkända av Köparen utgår ett vite på 10 000 SEK per tillfälle.

  8.5 LEVERANS

  8.5.1 Dröjsmål och påföljder

  Om Leverantören finner det sannolikt att denne inte kan hålla avtalad leveranstid ska
  Leverantören 

  utan dröjsmål skriftligen meddela Köparen detta samt ange orsakerna till förseningen och den 

  tidpunkt då leverans beräknas ske.

  Dröjsmål från Leverantörens sida föreligger när hela eller delar av tjänsten, utan att det beror
  på 

  något förhållande på Köparens sida, inte har genomförts inom den tid som har avtalats eller, om 

  någon tid inte har avtalats, inom den tid som är skälig med hänsyn till vad om är normalt för en
  tjänst 

  av samma art och omfattning.

  Dröjsmål från Leverantörens sida föreligger också när Leverantören inte iakttar en överenskommen 

  tid för påbörjande av tjänsten eller för ett arbetes framskridande.

  Vid dröjsmål från Leverantörens sida får Köparen hålla inne betalning som ännu inte gjorts.
  Köparen 

  har därutöver rätt till vite.

  Köparen har i brådskande fall rätt att anlita annan att helt eller delvis fullfölja Leveransen på 

  Leverantörens bekostnad förutsatt att Köparen därvid förfar med omdöme.

  Leverantören ska ersätta Köparen för direkta skador som har åsamkats Köparen genom dröjsmål 

  från Leverantörens sida.

  8.5.2 Vite vid leveransförsening och utebliven leverans

  Vid dröjsmål från Leverantörens sida har Köparen rätt till vite. Vite ska utgå med 1 procent av
  värdet 

  av den del av tjänsten eller leveransen som till följd av förseningen inte kunnat tas i avsett
  bruk, eller 

  av den del av leveransen som försenats, för varje påbörjad sjudagarsperiod som förseningen varar.

  Det sammanlagda vitet ska dock inte överstiga 10 procent av värdet av den del av tjänsten eller 

  leveransen som omfattas av förseningen.

  Rätt till vite föreligger från och med dagen efter avtalad leveranstidpunkt, eller från den
  tidpunkt då 

  tjänsten enligt avtalet eller avropet senast skulle ha påbörjats eller uppnått avtalad
  deltidpunkt.

  Erläggande av vite inskränker inte Köparens rätt att göra gällande andra påföljder enligt avtalet.

  8.5.3 Fel och brister

  Tjänsten anses felaktig om:

  a) den eller resultatet av den inte uppfyller de krav som ställs i avtalet eller avropet på
  tjänsten eller 

  på resultatet av tjänsten, 

  b) resultatet avviker från sådana uppgifter av betydelse för bedömningen av tjänstens
  beskaffenhet 

  eller ändamålsenlighet som kan antas ha inverkat på avtalet och som i samband med avtalets 

  ingående eller annars vid marknadsföring lämnats av Leverantören eller, 

  c) Leverantören i annat fall än ovan före avtalets ingående underlåtit att upplysa Köparen om ett 

  sådant förhållande rörande tjänstens beskaffenhet eller ändamålsenlighet som Leverantören känt
  till 

  eller bort känna till eller som denne insåg eller borde ha insett vara av betydelse för Köparen.

  Vid fel från Leverantörens sida får Köparen hålla inne betalning som ännu inte gjorts. Köparen
  får 

