  8.6.1.4 Uppföljning av villkoren

  Leverantören ska delta i och samarbeta med Köparens uppföljning av åtagandena i Uppförandekod 

  för leverantörer och processen för tillbörlig aktsamhet. Uppföljningen kan komma att genomföras 

  genom olika metoder såsom dialog, egenrapportering, transparens i leveranskedjorna och revision.

  Dialog: Leverantören ska inom två (2) veckor från Köparens begäran delta i dialog om hur 

  leverantören efterlever sina åtaganden och processen för tillbörlig aktsamhet.

  Egenrapportering: Leverantören ska inom fyra (4) veckor från Köparens begäran skriftligen
  redogöra 

  för sin process för tillbörlig aktsamhet.

  Transparens i leveranskedjorna: Leverantören ska inom fyra (4) veckor från Köparens begäran 

  skriftligen redogöra för vilka underleverantörer leverantören använder för att fullgöra
  kontraktet. 

  Detta inkluderar de juridiska namnen och fysiska adresserna för underleverantörerna (inklusive 

  eventuella leverantörer för sluttillverkning).

  Revision: Leverantören ska inom fyra (4) veckor från Köparens begäran möjliggöra för Köparen att 

  själv eller genom ombud utföra revisioner i Leverantörens egen verksamhet. Leverantören ska också 

  möjliggöra för Köparen att själv eller genom ombud utföra revisioner i eventuella
  underleverantörers 

  verksamhet. Leverantören och eventuella underleverantörer ska i samband med revisioner 

  tillhandahålla den information som Köparen efterfrågar. 

  Leverantören ska stå för kostnaden för de eventuella åter revisioner som krävs för att kontrollera
  att 

  Leverantören har åtgärdat avvikelser.

  Rätt att dela resultat: Köparen har rätt att dela resultat av genomförd uppföljning med andra
  regioner 

  inom regionernas nationella samarbete för hållbar upphandling (Nationella kansliet för hållbar 

  upphandling) i de fall mottagande region redan har ett avtal med Leverantören, som innehåller 

  motsvarande villkor för hållbara leveranskedjor.  

  Köparen har även rätt att dela resultat av genomförd uppföljning med Nationella kansliet för
  hållbar 

  upphandling.
   
  8.6.1.5 Hantering av avvikelser

  Leverantören ska åtgärda avvikelser från åtagandena i Uppförandekod för leverantörer och 

  processen för tillbörlig aktsamhet. Fokus ska vara på förbättringar i Leverantörens verksamhet och
  i 

  leveranskedjorna.

  Åtgärdsplan: Vid avvikelse från åtagandena i Uppförandekod för leverantörer eller processen för 

  tillbörlig aktsamhet ska Leverantören upprätta en tidsatt åtgärdsplan som ska godkännas av 

  Köparen. Leverantören ska upprätta åtgärdsplanen senast två (2) veckor från Köparens meddelande 

  om avvikelsen. Åtgärdsplanen ska stå i proportion till avvikelsernas allvarlighet och ska beskriva
  hur 

  avvikelserna ska åtgärdas inom tidsramen.

  Vite: Om leverantören inte rapporterar, medverkar till uppföljning, underlåter att vidta åtgärder
  eller 

  inte hanterar avvikelser i enlighet med Leverantörens åtaganden och upprättad åtgärdsplan har 

  Köparen rätt att begära vite från Leverantören. Vite utgår med 10 000 SEK, exklusive 

  mervärdesskatt per påbörjad vecka som omständigheterna består. Vitet kan högst utgå under 10 

  veckor per förseningstillfälle.

  Avropsstopp (vid ramavtal): Om leverantören inte rapporterar, medverkar till uppföljning,
