  Ansvarsförsäkring för verksamheten

  Leverantören ska under avtals- och ansvarstiden inneha ansvarsförsäkring omfattande person- och 

  sakskada motsvarande Leverantörens ansvar enligt detta avtal. Leverantören ska även inneha de 

  försäkringar denne är skyldig till enligt lagar och författningar. Leverantören ska på begäran
  uppvisa 

  bevis om gällande försäkring till Köparen.

  Leverantören ansvarar för skada som leverantören, dess personal eller underleverantör genom sitt 

  agerande eller sin underlåtenhet att agera, orsakar Köparen eller tredje man vid genomförandet av 

  leveransen.

  Leverantören är i förhållande till Köparen ansvarig för eventuell skadeståndsskyldighet som
  köparen 

  kan drabbas av med anledning av utförandet av leveransen och leverantören åtar sig att hålla 

  köparen skadelös.

  Leverantören ansvarar för skador som upptäcks under avtalets giltighetstid och därtill en tre (3)
  års-

  period beräknat från dag för avtalsperiodens upphörande, utom i fall av uppsåt eller grov 

  vårdslöshet, då ansvaret gäller till dess att allmän preskription inträder.

