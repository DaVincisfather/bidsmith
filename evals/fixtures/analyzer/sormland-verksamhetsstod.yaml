  Åberopade företag är en juridisk term för att beskriva ett annat företag som åberopas för att
  uppfylla 

  kvalificeringskrav avseende ekonomisk och finansiell ställning eller teknisk och yrkesmässig 

  kapacitet. Om leverantören avser att åberopa annat företags kapacitet ska Leverantören ange 

