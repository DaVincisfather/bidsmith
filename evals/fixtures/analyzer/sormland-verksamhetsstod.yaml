  Svarstiden ska vara tillräcklig med hänsyn till uppdragets art och omfattning. Som utgångspunkt 

  gäller följande:

  enklare avrop: 2 till 5 arbetsdagar,1. 

  normala avrop: 6 till 10 arbetsdagar,2. 

  mer komplexa eller omfattande avrop: 10 till 15 eller fler arbetsdagar.3. 

  Angivna tidsfrister är vägledande och kan anpassas utifrån det enskilda avropets karaktär.

  1.3.8.8 Krav på avropssvar

  Avropssvaret ska lämnas skriftligt och vara komplett vid sista svarsdag. Avropssvaret ska minst 

  innehålla:

  bekräftelse på att uppdraget accepteras enligt ramavtalets villkor, eller enligt punkt 8.2.2 i
  Mall 

  för avtal när detta anges i avropsförfrågan,

  1. 

  erbjuden konsult eller erbjudet team, inklusive namn, roll och konsultnivå,2. 

  CV eller motsvarande kompetensredovisning för erbjudna resurser,3. 

  uppdragsspecifik metod och genomförandeplan, om detta efterfrågas,4. 

  pris eller timpriser enligt vad som anges i avropsförfrågan,5. 

  tidplan och tillgänglighet,6. 

  eventuella referenser eller uppdragsexempel, om detta efterfrågas.7. 

  Om timpriser används i avropet får leverantören lämna samma timpris som i ramavtalet eller ett
  lägre 

  timpris, men inte ett högre timpris. Konsult som offereras på viss konsultnivå ska uppfylla 

  ramavtalets krav för den konsultnivån.

  1.3.8.9 Utvärdering

  Utvärdering får endast ske på grundval av de uppgifter som efterfrågats i avropsförfrågan och 

  inkommit inom svarstiden. Avropssvar som inkommer för sent behöver inte beaktas. Verksamheten 

  ska genomföra utvärderingen objektivt, likabehandlande och i enlighet med den i avropsförfrågan 

  angivna modellen.

  Intervju, presentation eller muntlig genomgång får endast användas om detta uttryckligen angetts
  i 

  avropsförfrågan, inklusive hur sådan del kommer att bedömas eller om den endast används för 

  verifiering.

  1.3.8.10 Tilldelningsbeslut

  Efter genomförd utvärdering ska verksamheten fatta skriftligt tilldelningsbeslut.
  Tilldelningsbeslutet 

  ska minst innehålla:

  vilken leverantör som tilldelas uppdraget,1. 

  skälen för beslutet,2. 

  sammanfattning av utvärderingen,3. 

  pris eller jämförelsegrund för vinnande avropssvar,4. 

  kontaktuppgift för frågor om beslutet.5. 

  1.3.8.11 Formalisering av avrop

  Efter tilldelningsbeslut ska uppdraget formaliseras genom skriftlig beställning, avropsbekräftelse
  eller 

  annan skriftlig överenskommelse enligt Köparens rutin. Separat undertecknat avropsavtal krävs 

  endast om detta anges i avropsförfrågan eller om uppdragets art kräver det.

  1.3.8.12 Uppföljning av ramavtalets takvärde

  Verksamheten ska i samband med varje avrop dokumentera avropets uppskattade och, när det är 

  möjligt, faktiska värde så att uppföljning mot ramavtalets takvärde kan ske löpande.

