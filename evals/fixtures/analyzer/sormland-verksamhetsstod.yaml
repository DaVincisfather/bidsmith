  rapportera de faktiska omständigheterna samt de genomförda och planerade åtgärderna i enlighet 

  med Leverantörens process för tillbörlig aktsamhet till Köparen.

  Allvarliga avvikelser avser tvångsarbete, barnarbete, arbetsförhållanden som medför fara för liv, 

  allvarlig miljöskada, storskalig korruption och attacker på miljö- och människorättsförsvarare.
