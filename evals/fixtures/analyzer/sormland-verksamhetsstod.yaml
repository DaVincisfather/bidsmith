  8.2 AVTALSOMFATTNING

  8.2.1 Beskrivning av uppdraget

  Upphandlingen avser tecknande av ramavtal (benämns vidare Avtal) för konsulttjänster inom 

  regional utveckling för Region Sörmland och Region Västmanland, i enlighet med vad som anges i 

  upphandlingsdokumenten.

  Ramavtalet ska tillgodose ett återkommande behov av kvalificerat konsultstöd hos berörda 

  verksamheter och omfattar i huvudsak följande delområden:

  Delområde 1 - Analyser, utredningar, undersökningar och utvärderingar.

  Delområde 2 - Projektledning, processledning, processtöd samt metod- och 

  processutveckling.

  Delområde 3 - Stöd för ansökningar om externa medel och skrivstöd.

  Uppdragen kan exempelvis avse framtagande av kunskaps- och beslutsunderlag, planerings- och 

  genomförandeunderlag, samverkans- och utvecklingsprocesser, process- och 

  verksamhetsutveckling, kompetensutvecklingsinsatser samt, där det är relevant, administrativt
  stöd 

  kopplat till dessa uppdrag (t.ex. insamling och sammanställning av underlag, mötesdokumentation 

  och koordinering).

  För vissa särskilt definierade tekniska avrop inom ramen för delområde 1 och, i förekommande
  fall, 

