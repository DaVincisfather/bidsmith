  Del III: Skäl för uteslutning

  Är leverantören en juridisk person, ska leverantören uteslutas om en person som ingår i
  företagets 

  förvaltnings-, lednings- eller kontrollorgan har dömts för vissa brott. Detsamma gäller om den
  som 

  har dömts för brottet är behörig att företräda, fatta beslut om eller kontrollera företaget. 

  För leverantörer som är etablerade i länder där det är möjligt att få utdrag ur brottsregistret
  eller en 

  likvärdig handling som visar att det inte finns sådana omständigheter som utgör skäl för
  uteslutning 

  ska Leverantören på begäran inkomma med ett sådant intyg. Denna handling ska vara översatt till 

