  1. Administrativa föreskrifter

  1.1 ALLMÄN ORIENTERING

  1.1.1 Upphandlande myndighet

  Region Sörmland, Org.nr. 232100-0032  

  Region Västmanland, Org.nr. 232100-0172 

  Svealandstrafiken AB, Org.nr. 556555-3350

  I upphandlingsdokumenten kallade Köpare.  

  Anbudsgivare benämns i upphandlingsdokumenten som Leverantör.

  1.1.2 Omfattning

  Upphandlingen avser tecknande av ramavtal (benämns vidare Avtal) för konsulttjänster inom 

  regional utveckling för Region Sörmland och Region Västmanland, i enlighet med vad som anges i 

  upphandlingsdokumenten.

  Ramavtalet ska tillgodose ett återkommande behov av kvalificerat konsultstöd hos berörda 

  verksamheter och omfattar i huvudsak följande delområden:

  Delområde 1 - Analyser, utredningar, undersökningar och utvärderingar.

  Delområde 2 - Projektledning, processledning, processtöd samt metod- och 

  processutveckling.

  Delområde 3 - Stöd för ansökningar om externa medel och skrivstöd.

  Uppdragen kan exempelvis avse framtagande av kunskaps- och beslutsunderlag, planerings- och 

  Sida 1/85


  genomförandeunderlag, samverkans- och utvecklingsprocesser, process- och 

  verksamhetsutveckling, kompetensutvecklingsinsatser samt, där det är relevant, administrativt
  stöd 

  kopplat till dessa uppdrag (t.ex. insamling och sammanställning av underlag, mötesdokumentation 

  och koordinering).

  För vissa särskilt definierade tekniska avrop inom ramen för delområde 1 och, i förekommande
  fall, 

  delområde 2, kan ABK 09 komma att tillämpas i stället för Inköp Sörmland Västmanlands allmänna 

  villkor för tjänster enligt vad som anges i punkt 8.2.2 i Mall för avtal och i avropsreglerna.

  1.1.3 Upphandlingsförfarande

  Öppet förfarande enligt Lag (2016:1145) om offentlig upphandling (LOU). Upphandlingsformen 

  medger inte förhandling.

  1.1.4 Förutsättningar för upphandlingens genomförande

  Upphandlingen slutförs, och avtal tecknas, under förutsättning att inkomna anbud inte överstiger 

  budgeterade medel samt att inga politiska beslut fattas, eller andra omständigheter inträffar,
  som 

  väsentligen ändrar förutsättningar för upphandlingens fullföljande.

  1.1.5 Förteckning över upphandlingsdokument

  Upphandlingsdokumenten består av följande handlingar:

  Strukturerade dokument i TendSign: 

  -  Administrativa föreskrifter (detta dokument) 

  - European Single Procurement Document (ESPD)  

  - Kravspecifikation - övergripande 

  - Kravspecifikation - delområde 1 

  - Kravspecifikation - delområde 2 

  - Kravspecifikation - delområde 3 

  - Pris och ersättning 

  - Mall för avtal 

  - Sanktioner mot Ryssland 

  - Inköp Sörmland Västmanland Allmänna villkor Tjänster Ver. 2021-04

  Bifogade bilagor: 

  Bilaga 1 - Utkast till Personuppgiftsbiträdesavtal (PuB avtal) 

  Bilaga 2 - Uppförandekod

  Avtalets innehåll fastställs slutgiltigt utifrån upphandlingsdokumenten och antaget anbud.

  1.1.6 Avtalstid

  Avtalets startdatum: 2026-07-13

  Avtalets slutdatum: 2028-07-12

  Möjlighet till förlängning vid två (2) tillfällen, om maximalt tolv (12) månader i taget med
  oförändrade 

  villkor.

  Avtalsförlängning ska påkallas av Köparen senast tre (3) månader innan avtalsslut. Om förlängning 

  ej sker upphör Avtalet att gälla vid Avtalets slut, utan krav på särskild uppsägning. 

  Avtalstiden kan komma att senareläggas till följd av överprövningar eller fördröjningar i 

  upphandlingsprocessen. 

  1.1.6.1 Avropsberättigade och tidpunkt för avrop

  Region Sörmland och Region Västmanland är avropsberättigade enligt ramavtalet.

  IN-IN25-0354 Ramavtal verksamhetsstöd och 

  administrativa tjänster

  Publicerad 2026-05-12 09:04

  Sida 2/85


  Region Sörmland får avropa från ramavtalet från och med ramavtalets ikraftträdande.

  Region Västmanland får avropa från ramavtalet från och med 2027-03-31, då Region Västmanlands 

  nuvarande avtal inom området beräknas upphöra.

  Fram till detta datum ska Region Västmanland inte avropa från ramavtalet för sådana behov som 

  omfattas av Region Västmanlands befintliga avtal. Om ett behov inte omfattas av det befintliga 

  avtalet får Region Västmanland avropa från detta ramavtal, under förutsättning att avropet i
  övrigt 

  sker enligt ramavtalets villkor.

  1.1.7 Volymuppgifter

  Det totala värdet av efterfrågade tjänster under aktuell avtalsperiod inklusive eventuell/a
  option/-er 

  beräknas uppgå till ca 20 000 000 SEK.

  Uppgifterna baseras på föregående års inköpsvolymer samt en uppskattning av kommande behov. 

  Någon garanti att erhålla viss volym ges inte.

  1.1.8 Takvolym

  Takvärdet i ramavtalet är 25 000 000 SEK exkl. moms. 

  Om ramavtalets värde överstiger angivet belopp upphör ramavtalet att gälla utan ytterligare 

  bekräftelse från någondera part. Parterna delar ett ömsesidigt ansvar att underrätta motparten om 

  takvärdet uppnås.

  Takvärdet ska inte ses som ett garanterat värde utan fastställer endast en övre gräns för
  ramavtalet.

  1.1.9 Elektronisk upphandling

  Upphandlingen handläggs via upphandlingssystemet TendSign. I systemet finns möjlighet att t.ex. 

  ladda upp filer och svara på frågor.

  Observera att det kan finnas krav i upphandlingsdokumenten som inte är direkt kopplade till någon 

  funktion i systemet. Kontrollera alltid upphandlingsdokumenten innan anbudet skickas in.

  Kommunikationen under upphandlingen, inklusive underrättelse om tilldelningsbeslut, sker via den 

  registrerade användarens e-postadress i Tendsign. Leverantören uppmanas därför att kontrollera
  att 

  rätt e-postadress är angiven och säkerställa att denna e-postadress bevakas löpande.

  Support 

  Tekniska frågor om systemet ställs till TendSign support per e-post: 

  tendsignsupport@mercell.com.

  För support eller tillgång till frågor och svar om anbudsgivning: 

  https://upphandlingsverktyg.mercell.se/tendsign-support

  1.1.10 Information, frågor och kompletteringar under anbudstiden

  Frågor eller synpunkter avseende upphandlingsdokumenten ska ställas via funktionen ”Frågor och 

  svar” i TendSign.

  Leverantör har skyldighet att bevaka eventuella frågor och svar i upphandlingen. Endast skriftlig 

  uppgift lämnad via TendSign under anbudstiden är bindande för både Köpare och Leverantör.

  Sista dag för att ställa frågor är: 2026-06-03

  Köparen publicerar eventuella frågor, svar och förändringar av upphandlingsdokumenten senast 6 

  dagar före anbudstidens utgång.

  IN-IN25-0354 Ramavtal verksamhetsstöd och 

