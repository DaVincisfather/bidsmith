  3.4 Krav på konsulter (generella)

  Följande krav gäller för de konsulter som bemannar uppdrag inom ramavtalet, oavsett delområde 

  och konsultnivå:

  Konsulterna ska ha relevant utbildning för den roll de åtar sig.•

  Konsulterna ska ha mycket god förmåga att uttrycka sig på svenska i tal och skrift samt god 

  förmåga att kommunicera på engelska i tal och skrift när uppdraget kräver det.

  •

  Konsulterna ska kunna arbeta strukturerat, analytiskt och självständigt samt samverka och 

  koordinera tillsammans med beställarens organisation och externa aktörer.

  •

  Konsulterna ska ha kunskap om förutsättningarna för arbete i politiskt styrda organisationer.•

  Konsulterna ska kunna använda och ha tillgång till relevanta digitala verktyg och databaser i 

  uppdragen, inklusive digitala mötes- och samverkansplattformar samt, där det är lämpligt, AI-

  baserade arbetssätt för analys, strukturering och sammanställning.

  •

  De konsulter som föreslås för ett visst uppdrag ska sammantaget ha omfattande och 

  dokumenterad kunskap om det sakområde som avropet avser.

  •

  Vid uppdrag som rör till exempel ansökningar om externa medel eller arbete inom arbetsmarknads- 

  och kompetensförsörjningsområdet ska berörda konsulter dessutom ha:

  god kännedom om relevanta program och finansieringsmöjligheter,•

  kunskap och erfarenhet av att arbeta med de aktörer som uppdraget kräver samverkan med,•

  etablerade kontakter hos relevanta myndigheter och känna till deras organisation (till exempel 

  Tillväxtverket, ESF-rådet och Arbetsförmedlingen),

  •

  dokumenterad erfarenhet av samverkan med arbetsmarknadsaktörer.•

  För Senior-konsult och Expert-nivå gäller därutöver att:

  konsulten ska ha dokumenterad erfarenhet av arbete i politiskt styrda organisationer,•

  konsulten ska ha vana att leda komplexa uppdrag samt samverkans- och 

  koordineringsprocesser,

  •

  konsulten ska kunna agera strategisk rådgivare till beställaren.•

  Vid avrop kommer beställaren att ange vilken konsultnivå som krävs för uppdraget samt om 

  särskilda krav gäller, till exempel avseende antal års erfarenhet inom visst sakområde.

  3.5 Specifika kompetensområden (krav på leverantören)

  Leverantören ska sammantaget ha kompetens inom ett eller flera av de specifika sakområden som 

  anges i avsnitt 3.5.1–3.5.4. Beställaren avgör vid avrop vilka sakområden som är nödvändiga för
  det 

  aktuella uppdraget, och kan efterfråga kompetens inom ett eller flera områden samtidigt.

  Leverantören ska i sitt anbud kortfattat beskriva inom vilka av dessa sakområden företaget har 

  dokumenterad kompetens och erfarenhet, samt hur denna kompetens är organiserad (till exempel 

  genom särskilda team, specialister eller nyckelpersoner).

