  8.6.2 Miljökrav

  8.6.2.1 Systematiskt miljöarbete

  Leverantören ska vid, avtalsstart och under hela avtalsperioden, bedriva ett systematiskt och 

  dokumenterat miljöarbete som minst omfattar de delar av verksamheten som har anknytning till 

  upphandlingsföremålen.

  Det systematiska miljöarbetet ska minst innehålla:

  en miljöpolicy som är antagen av ledningen och som innehåller åtagande om miljöhänsyn, 

  lagefterlevnad och ständig förbättring,

  a. 

  en redovisning och aktuell prioritering av verksamhetens betydande miljöaspekter och 

  miljörisker,

  b. 

  mål för att minska verksamhetens negativa miljöpåverkan som utgår från betydande 

  miljöaspekter och risker. Målen ska vara ansvarsfördelade, tidsbestämda och följas upp 

  årligen,

  c. 

  en rutin för hur ställda miljökrav säkerställs och, om tillämpligt, hur de vidareförmedlas i 

  leveranskedjan.

  d. 

  Dokumentation som styrker att kravet uppfylls kan begäras in på anmodan av Köparen eller dess 

  ombud. Dokumentation som visar att ett systematiskt miljöarbete bedrivs ska vara märkt med datum 

  och verksamhetens namn, vara giltig under hela avtalstiden.

  Verifikat 

  Giltigt certifikat enligt ISO 14001 eller EMAS (EC 1221/2009) eller FR2000 godtas som bevis för
  att 

  villkoren efterlevs. Diplom enligt Svensk Miljöbas godtas under förutsättning att det
  kompletteras 

  med bevis avseende punkt d. ovan om specifika miljökrav ställts.

  8.7 ÖVRIGA VILLKOR

  8.7.1 Förtida uppsägning av Avtalet

  Köparen har rätt att med skriftligt meddelande säga upp Avtalet till upphörande när  
   
  a) Leverantören är i dröjsmål med betalning av skatter och avgifter till staten eller till en
  kommun, 

  försätts i konkurs, inleder ackordförhandlingar, träder i likvidation eller på annat sätt kan
  antas vara 

  på obestånd, 

  b) Leverantören ändrar bolagsform, förändrar ägarstrukturen eller genomför andra väsentliga 

