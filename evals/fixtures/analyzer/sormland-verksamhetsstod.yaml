  1.

  Delområde 3 – Stöd för ansökningar om externa medel och skrivstöd 

  Omfattar kvalificerat stöd i att identifiera och mobilisera finansieringsmöjligheter, utveckla 

  projektidéer, mobilisera relevanta aktörer och hitta projektpartners, ta fram och kvalitetssäkra 

  ansökningar om externa medel (till exempel EU- och nationella program) samt genomföra annat 

  nödvändigt förarbete inför en ansökan. Delområdet omfattar även skrivstöd såsom framtagande av 

  rapporter, beslutsunderlag, strategidokument och annan dokumentation. Det omfattar också 

  utbildningssatsningar och kompetenshöjande insatser, inklusive utbildning i att skriva
  ansökningar 

  om externa medel, för personal inom delområdet och för de olika sakområden inom regional 

  utveckling som ramavtalet omfattar.

  3.2.2 Konsultnivåer

  Ramavtalet omfattar flera konsultnivåer. Nedan anges övergripande definitioner som ligger till
  grund 

  för de krav som ställs i efterföljande avsnitt.

  Junior konsult 

  Konsult med relevant eftergymnasial utbildning eller motsvarande och kortare yrkeserfarenhet inom 

  området (normalt 0–3 år). Arbetar i huvudsak under handledning av mer erfaren konsult och 

  ansvarar främst för avgränsade deluppgifter, underlag och analyser.

  Erfaren konsult 

  Konsult med relevant akademisk utbildning och flera års dokumenterad yrkeserfarenhet inom 

  området (normalt minst 3 år). Kan självständigt planera och genomföra utrednings- eller 

  utvecklingsuppdrag, leda delar av projekt, ansvara för dialog med beställare inom sitt delområde 

  samt ta fram väl underbyggda analyser och beslutsunderlag.

  Senior konsult 

  Konsult med omfattande och mångårig erfarenhet av kvalificerade uppdrag inom området (normalt 

  minst 8 år), inklusive dokumenterad erfarenhet av att leda komplexa uppdrag, processer och projekt
  i 

  politiskt styrda organisationer. Kan axla huvudansvar för uppdrag, leda större projektgrupper och 

  samverkansprocesser samt fungera som strategisk rådgivare till beställaren och ledning.

  Expert 

  Konsult med särskilt djup kompetens inom ett specifikt område eller metod (till exempel avancerad 

  trafikmodellering, GIS, särskilda analys- eller utvärderingsmetoder eller EU-finansiering).
  Anlitas när 

  uppdraget kräver fördjupad expertis utöver vad som normalt ryms inom rollen som Senior konsult.

  3.3 Generella krav på leverantörens kompetens och erfarenhet

  Leverantören ska som organisation sammantaget ha dokumenterad kompetens och erfarenhet som 

  motsvarar de behov som framgår av denna kravspecifikation och övriga upphandlingsdokument. 

  Kraven gäller under hela avtalstiden och omfattar både egna konsulter och eventuella 

  underkonsulter.

  Leverantören ska som lägsta nivå

  ha god kännedom om regional utveckling, det regionala utvecklingsuppdraget och de 

  sakområden som innefattas i detta, inklusive generella förutsättningar för lokal och regional 

  utveckling (till exempel transport- och digital infrastruktur samt energifrågor),

  •

  ha grundläggande kunskap om hållbar utveckling och hållbar omställning samt hur social, 

  ekologisk och ekonomisk hållbarhet kan integreras i regionalt utvecklingsarbete,

  •

  ha förståelse för hur offentlig verksamhet fungerar, inklusive ansvarsfördelning mellan stat, 

  region och kommun,

  •

  ha kunskap om den demokratiska styrmodellen och erfarenhet av arbete i politiskt styrda 

  organisationer,

  •

  ha erfarenhet av uppdrag där analys, strategi- och policyutveckling använts som underlag för 

  beslut, planering och uppföljning.

  •

