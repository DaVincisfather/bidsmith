  3. Kravspecifikation - övergripande

  3.1 Inledning och omfattning

  Denna kravspecifikation gäller ramavtal för konsulttjänster inom regional utveckling för Region 

  Sörmland och Region Västmanland. Kraven avser de leverantörer och konsulter som ska kunna 

  genomföra uppdrag inom något eller flera av följande delområden:

  Delområde 1 – Analyser, utredningar, undersökningar och utvärderingar.

  Delområde 2 – Projektledning, processledning, processtöd samt metod- och 

  processutveckling.

  Delområde 3 – Stöd för ansökningar om externa medel och skrivstöd.

  Ramavtalet är indelat i tre delområden. Leverantör får lämna anbud på ett eller flera delområden. 

  Utvärdering och tilldelning sker separat per delområde. För varje delområde avses att teckna 

  ramavtal med flera leverantörer (antal och utvärderingsmodell framgår av Administrativa
  föreskrifter). 

  Avrop från ramavtalet sker genom förnyad konkurrensutsättning (FKU) mellan de leverantörer som 

  tilldelats ramavtal inom berört delområde, i enlighet med Administrativa föreskrifter och Mall för
  avtal. 

  I samband med FKU preciserar beställaren bland annat vilka roller och konsultnivåer som 

  efterfrågas, krav på CV och eventuella referensuppdrag samt uppdragsspecifik metodik, 

  genomförande och leveranser.

  Uppdrag kan i praktiken innehålla inslag från flera delområden, till exempel både analys och 

  processledning. Beställaren anger vid avrop vilket delområde som utgör uppdragets huvudsakliga 

  inriktning och kan vid behov efterfråga kompetens från flera delområden inom samma uppdrag.

  Uppdragen kan omfatta ett brett spann av sakområden, exempelvis infrastruktur och
  kollektivtrafik, 

  samhällsplanering, näringsliv och innovation, arbetsmarknad, kompetensförsörjning, kultur,
  fritid, 

  utbildning, folkhälsa, klimat- och energiomställning samt andra frågor kopplade till regional 

  utveckling.

  Kraven i denna kravspecifikation kompletterar övriga delar av upphandlingsdokumenten (bland annat 

  Administrativa föreskrifter, Pris och ersättning samt Mall för avtal). Vid varje enskilt avrop
  anges 

  vilket eller vilka delområden uppdraget avser samt vilka specifika krav som gäller för det
  aktuella 

  uppdraget.

  3.2 Definitioner

  Nedan definieras de begrepp som är centrala för denna kravspecifikation.

  3.2.1 Delområden

  Delområde 1 – Analyser, utredningar, undersökningar och utvärderingar 

  Omfattar framtagande av kunskaps- och beslutsunderlag, exempelvis analyser, kartläggningar, 

  förstudier, undersökningar, omvärldsbevakning, uppföljningar och utvärderingar, inklusive 

  effektutvärderingar, konsekvensanalyser och målgruppsanalyser. Delområdet omfattar även 

  framtagande av planeringsunderlag, styrdokument och andra underlag för politiska beslut och 

  tjänstepersonsberedning inom bland annat areella näringar, cirkularitet och övriga sakområden 

  kopplade till det regionala utvecklingsuppdraget.

  Delområde 2 – Projektledning, processledning, processtöd samt metod- och 

  processutveckling 

  Omfattar ledning och stöd i genomförande och utveckling av projekt, program och processer, 

  inklusive planering, genomförande och löpande samordning av utvecklingsinsatser, 

  samverkansprocesser, dialog- och workshopprocesser samt kartläggning och utveckling av 

  arbetssätt, roller, ansvar och flöden. Tyngdpunkten ligger på genomförande, förändringsledning
  och 

  processtöd, medan mer renodlade analyser och utvärderingar huvudsakligen omfattas av delområde 

