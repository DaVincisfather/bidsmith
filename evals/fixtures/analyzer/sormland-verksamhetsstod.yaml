  9.4 Särskilda kontraktsvillkor avseende sanktioner beslutade av EU

  Vänligen notera att avtalskrav kopplade till sanktioner beslutade av EU innebär bland annat att 

  Avtalet kan komma att sägas upp i förtid eller att Leverantören kan bli skyldig att byta ut 

  underleverantörer under avtalstiden.

  Leverantören åtar sig att genom ett systematiskt och proaktivt arbete hålla sig informerad om 

  relevanta internationella sanktioner som kan få påverkan på Leverantörens rätt eller möjlighet 

  att leverera i enlighet med Ramavtalet eller få betalt i enlighet med det. 
   
  •

  Leverantören åtar sig att omedelbart informera Köparen om denne direkt eller indirekt (genom 

  till exempel ägarkopplingar eller representation) blir föremål för sanktioner beslutade av EU. 

  Detsamma gäller om någon av Leverantörens underleverantörer, oavsett led i leveranskedjan, 

  som nyttjas för tillhandahållande av varor/tjänster i enlighet med Avtalet till ett värde av
  minst 

  7% av Avtalets värde för Leverantören, blir föremål för sanktioner beslutade av EU. 

  Upplysningsskyldigheten gäller oavsett om sanktionerna innebär att Köparen på grund av 

  sanktionerna per automatik inte längre får rätt att köpa varor eller tjänster från Leverantören 

  (inklusive dennes underleverantörer, oavsett led i leveranskedjan) eller erlägga betalning, 

  skadestånd osv i enlighet med Avtalet. 
   
  •

  Om Leverantören direkt eller indirekt blir föremål för sanktioner beslutade av EU som innebär 

  att Köparen inte längre (under viss period eller tills vidare) har rätt att nyttja Avtalet eller
  erlägga 

  betalning, skadestånd, osv i enlighet med det, har Köparen rätt att säga upp Avtalet till 

  omedelbart upphörande eller, om Köparen så hellre vill, till den senare tidpunkt som Köparen 

  beslutar. 
   
  •

  Om någon av Leverantörens underleverantör (oavsett led i leveranskedjan) som direkt eller 

  indirekt nyttjas för leverans i enlighet med Avtalet till ett värde om minst 10% av Avtalets
  värde 

  för Leverantören, blir föremål för sanktion beslutad av EU som innebär att Köparen inte längre 

  får nyttja Avtalet eller erlägga betalning i enlighet med det, åligger det Leverantören att utan 

  dröjsmål, och alltid senast till tidpunkten då sanktionen träder i kraft, ersätta relevant 

  underleverantör med ett annat lämpligt företag. Om det är fråga om ett företag vars kapacitet 

  åberopats i den upphandling som föregick ingåendet av Avtalet, måste det företag som sätts i 

  underleverantörens ställe uppfylla alla relevanta krav som ställdes i upphandlingen och 

  Köparens godkännande av den nya underleverantören inhämtas. 
   
  •

  Leverantören är skyldig att utreda och ge Köparen alla de upplysningar som behövs, inklusive •

