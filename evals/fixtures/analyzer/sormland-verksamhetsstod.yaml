  1.3.8 Avropsordning och genomförande av avrop

  1.3.8.1 Avropsform

  Samtliga avrop från detta ramavtal ska ske genom förnyad konkurrensutsättning inom det delområde 

  som det aktuella uppdraget tillhör. Avrop får endast göras från de leverantörer som har antagits
  inom 

  det aktuella delområdet.

  1.3.8.2 Utgångspunkter för avrop

  Avrop ska avse uppdrag som omfattas av ramavtalets omfattning och aktuellt delområde. Avrop får 

  inte innehålla villkor, krav eller kommersiella förutsättningar som väsentligen avviker från
  ramavtalet. 

  Verksamheten får vid behov precisera och komplettera uppdragets innehåll, omfattning, 

  leveransform, tidplan, bemanning, informationssäkerhetskrav, personuppgiftshantering, plats för 

  utförande, leveransadress, rapportering och andra uppdragsspecifika förutsättningar, under 

  förutsättning att detta sker inom ramen för ramavtalet och övriga upphandlingsdokument.

  För avrop som omfattas av punkt 8.2.2 i Mall för avtal ska detta uttryckligen anges i
  avropsförfrågan. 

  I sådant fall gäller ABK 09 i stället för Inköp Sörmland Västmanlands allmänna villkor för
  tjänster, 

  med de undantag som framgår av punkt 8.2.2 i Mall för avtal.

  1.3.8.3 Utskick av avropsförfrågan

  Avropsförfrågan ska skickas skriftligt och samtidigt till samtliga antagna leverantörer inom
  relevant 

  delområde, till den e-postadress eller kontaktfunktion som leverantören angett för order, avrop
  eller 

  leveransfrågor. Samtliga leverantörer ska få samma information vid samma tidpunkt.

  1.3.8.4 Avropsmall

  Avropsmallen ska minst innehålla följande uppgifter:

