  1.7 OFFENTLIGHET OCH SEKRETESS

  Under upphandlingsprocessen gäller absolut sekretess fram till dess att tilldelningsbeslut har 

  meddelats eller att upphandlingen av annan anledning har avslutats.

  Inkomna anbud blir därefter allmän handling. Leverantör som begär sekretess för delar av sitt
  anbud 

  bör upprätta en sekretessbegäran i separat bilaga och där specificera vilka uppgifter som 

  Leverantören vill sekretessbelägga samt ange vilken skada Leverantören kan lida om uppgifterna
  blir 

  offentliga.

  På Köparens begäran ska Leverantör inom tre (3) arbetsdagar inkomma med maskad kopia av 

  den/de delar av anbudet som sekretessen avser.

  Innan utlämnande av anbud sker gör Köparen en egen sekretessprövning.

  Lagstiftning: Offentlighet- och sekretesslagen (2009:400)

  Innan en Leverantör väljer att lämna anbud bör följande beaktas avseende Köparens hantering av 

  antagen leverantörs priser.

  Upphandlade varor, tjänster och priser kan komma att redovisas på köparens hemsida och intranät 

  och införs normalt i köparens e-handelssystem om detta används som beställningsverktyg. 

  Även om specifika priser efter sekretessprövning omfattas av sekretess kommer den totala 

  utvärderingssumman att framgå av tilldelningsbeslutet.

  a. Begärs sekretess för delar av anbud? Ange Ja eller Nej.  

  Ja/Nej

