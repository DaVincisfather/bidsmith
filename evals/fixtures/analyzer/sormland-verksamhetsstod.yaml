  I artikel 62.2 i direktiv 2014/24/EU anges följande kvalificeringskrav:

  Kvalitetssäkringsstandarder

  Leverantören ska tillämpa dokumenterade kvalitetssäkringsrutiner som säkerställer att uppdrag 

  utförs på ett sådant sätt att den överenskomna omfattningen och kvaliteten uppnås och
  upprätthålls. 

  Kvalitetssäkringsarbetet ska bedrivas med stöd av hjälpmedel och/eller rutiner som gör det möjligt
  att 

  följa upp uppdraget och mäta de resultat som uppnås mot uppsatta mål.

  Om Leverantören har ett kvalitetsledningssystem enligt ISO 9001, FR 2000 eller motsvarande, ska 

  en kopia på giltigt certifikat lämnas på  begäran.

