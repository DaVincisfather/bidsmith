  inklusive myndighetsföreskrift samt i övrigt iaktta etiska normer och god sed. Myndigheters
  allmänna 

  råd eller liknande ska beaktas. Nödvändiga tillstånd ska finnas.

  8.3.2 Personal

  Leverantören förbinder sig att utföra sina åtaganden med för ändamålet erforderligt antal och 

  lämplig, personal med erforderliga kvalifikationer och kompetenser för sitt åtagande.

  Har Köparen och Leverantören avtalat om att viss personal ska användas vid fullgörande av 

  leverans får denna personal inte bytas ut mot annan utan Köparens skriftliga godkännande. 

  Leverantören svarar själv för alla kostnader och tidsåtgång för byte av personal.

  Leverantören ska utan dröjsmål byta ut person, som Köparen av sakliga skäl finner olämplig att 

  genomföra uppdraget.

