  9. Sanktioner mot Ryssland

  9.1 Sanktioner mot Ryssland i samband med invasionen av Ukraina

  EU har infört sanktioner mot Ryssland i samband med invasionen av Ukraina.

  Sanktionerna innebär bland annat att ryska medborgare och företag inte längre får delta i
  offentliga 

  upphandlingar i EU.

  9.2 Bakgrund till införda sanktioner

  Med anledning av, Rådets förordning (EU) 2022/576 av den 8 april 2022 om ändring av förordning 

  (EU) nr 833/2014 om restriktiva åtgärder mot bakgrund av Rysslands åtgärder som destabiliserar 

  situationen i Ukraina, uppmärksammas Leverantör på att Köparen är bunden av, och kommer att 

  inskärpa, sanktionerna.

  Sanktionerna gäller för vissa fysiska och juridiska personer med kopplingar till Ryssland och
  innebär 

  bland annat att det från och med 9 april 2022 är förbjudet att tilldela avtal i en offentlig
  upphandling 

  samt från och med 11 oktober samma år erhålla fullgörande av kontrakt, från dessa utpekade 

  aktörer.

  För detaljerad information gällande omfattningen av, och föremålen för, sanktionerna 

  vänligen se information som ges ut av ansvariga svenska myndigheter.

  9.3 Förutsättningar för upphandlingens genomförande

  Leverantör ska utan dröjsmål upplysa Köparen om Leverantörens rättsliga status, 

  ägarförhållanden eller representation före tilldelningsbeslut förändras på ett sådant sätt att 

  tilldelning av kontrakt till denne inte längre är möjligt med beaktande av sanktionerna beslutade 

  av EU.

  •

  Leverantör ska fullt ut samarbeta i frågor som rör tillämpligheten av sanktioner beslutade av EU 

  och tillhandahålla den utredning och de upplysningar som är nödvändiga i detta avseende.

  •

  9.3.1 Sanktioner vid ryskt ägande

  Med beaktande av sanktioner beslutade av EU är upphandlande myndigheter förbjudna att tilldela 

  offentliga kontrakt som omfattas av bland annat det EU-rättsliga upphandlingsdirektiv som ligger
  till 

  grund för LOU, till eller i förhållande till:

  a) ryska medborgare eller fysiska eller juridiska personer som är etablerade i Ryssland,

  b) juridiska personer, enheter eller organ vars äganderätter till mer än 50 % direkt eller
  indirekt ägs 

  av enhet som avses i led a, eller

  c) fysiska eller juridiska personer som agerar för, eller på uppdrag av, en enhet som avses i a)
  eller 

  b),

  inbegripet, om de står för mer än 10 % av kontraktets värde, underleverantörer, leverantörer
  eller 

  enheter vars kapacitet utnyttjas i den mening som avses i LOU. 
   
  Förbudet avser inte bara Leverantören utan även alla eventuella företag vars kapacitet i 

  Upphandlingen åberopas i kvalificeringshänseende (jfr. avsnitt om Åberopande av annans kapacitet) 

  liksom övriga underleverantörer (inklusive underleverantörer till dessa, osv. nedåt i
  leveranskedjan) 

  som avses att nyttjas för leverans i enlighet med Avtalet.

  Av EU beslutade sanktioner medför även att Köparen är förbjuden att köpa vissa varor/tjänster och 

  erlägga betalning till vissa fysiska och juridiska personer.

