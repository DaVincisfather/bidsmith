  under förutsättning att detta sker inom ramen för ramavtalet och övriga upphandlingsdokument.

  1.3.8.5 Tillåtna tilldelningskriterier vid avrop

  Tilldelning ska ske till det ekonomiskt mest fördelaktiga avropssvaret. Avropsförfrågan ska ange
  vilka 

  kriterier som kommer att tillämpas i det enskilda avropet samt deras viktning. Följande kriterier
  får 

  användas, var för sig eller i kombination:

  pris,1. 

  uppdragsförståelse och metod för genomförande,2. 

  relevant kompetens och erfarenhet hos erbjuden konsult eller erbjudet team,3. 

  kapacitet, tillgänglighet, redundans och leveranssäkerhet,4. 

  kvalitetssäkring, dokumentation, versionshantering och synpunktshantering,5. 

  för delområde 3 även erfarenhet av relevanta finansieringsprogram, ansökningsprocesser och 

  skrivuppdrag.

  6. 

  Avropsförfrågan ska tydligt ange hur varje kriterium kommer att bedömas. Kriterier som inte har 

  angetts i avropsförfrågan får inte beaktas vid utvärderingen.

  1.3.8.6 Frågor och svar under avropet

  Frågor från leverantörerna ska ställas skriftligt till den kontaktperson som anges i
  avropsförfrågan. 

  Samtliga frågor av betydelse för avropet, samt svar på dessa, ska kommuniceras skriftligt till 

  samtliga leverantörer som mottagit avropsförfrågan. Förtydliganden, rättelser eller
  kompletteringar 

  ska lämnas på samma sätt. Om ett förtydligande är av sådan betydelse att leverantörernas
  möjlighet 

  att lämna konkurrenskraftiga avropssvar påverkas, ska svarstiden förlängas.

  1.3.8.7 Tidsfrister

