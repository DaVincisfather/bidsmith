  3.5.1 Innovation, näringsliv och arbetsmarknad

  Exempel på efterfrågad kompetens:

  innovation, innovationsprocesser och innovationsledning•

  regional och lokal näringslivsutveckling, konkurrenskraft, företagsklimat och företagsstöd•

  smart specialisering, omställning i näringslivet, klusterutveckling och innovationsmiljöer•

  arbetsmarknad, kompetensförsörjning, matchning och omställningsfrågor•

  besöksnäring, platsutveckling, platsmarknadsföring, landsbygdsutveckling och attraktivitet•

  livsmedelsfrågor och livsmedelssystem i ett regionalt utvecklingsperspektiv•

  areella näringar, inklusive jord- och skogsbruk, i relation till regional utveckling.•

  3.5.2 Folkhälsa och utbildning

  Exempel på efterfrågad kompetens:

  folkhälsa och folkhälsorelaterade analys-, utrednings- och utvecklingsfrågor•

  jämlikhet i hälsa och social hållbarhet•

  folkhälsovetenskaplig kompetens (till exempel högskoleutbildning inom folkhälsovetenskap eller 

  likvärdig kompetens)

  •

  utbildningsfrågor ur ett regionalt utvecklingsperspektiv, inklusive samverkan mellan 

  utbildningssystem, arbetsmarknad, folkbildning och näringsliv

  •

  analys och utveckling av insatser och strukturer som stärker kompetensförsörjning och livslångt 

  lärande ur ett regionalt utvecklingsperspektiv.

  •

  3.5.3 Trafik, infrastruktur, samhällsplanering och energi

  Exempel på efterfrågad kompetens:

  klimat- och energiomställning, energieffektivisering och klimatanpassning•

  transportinfrastruktur, trafikplanering, kollektivtrafik och mobilitet•

  infrastruktur som förutsättning för regional utveckling•

  trafik- och linjenätsanalyser samt körtidsanalyser och bedömning av olika trafiklösningar•

  samhällsplanering och rumslig planering, gärna med erfarenhet av GIS som planerings- och 

  analysverktyg

  •

  samverkan mellan fysisk planering, transportplanering, näringslivsutveckling och regional 

  utveckling.

  •

  3.5.4 Kultur, friluftsliv och regionala livsmiljöfrågor

  Exempel på efterfrågad kompetens:

  Kulturområdena inom kultursamverkansmodellen, kulturens roll i samhället, kulturpolitik och 

  kulturens koppling till andra sakområden inom regional utveckling.

  •

  Gestaltad livsmiljö, friluftsliv, rekreativa miljöer•

  Naturvård, naturreservat och naturskyddsområden samt naturbruk•

  3.6 Krav på leverantörens kapacitet och omfattning

  Leverantören ska ha kapacitet att genomföra både mindre och större uppdrag inom ramavtalet, från 

  kortare insatser till mer omfattande uppdrag som löper över längre tid.

  Leverantören ska i sitt anbud beskriva:

  antal konsulter per konsultnivå (junior, erfaren, senior, specialist) som normalt kan avsättas
  för 

