  8.7.5 Ansvar för skada

  Leverantören ansvarar för direkt skada som Leverantören, dess personal eller Underleverantör 

  genom sitt agerande eller sin underlåtenhet att agera, orsakar Köparen eller tredje man vid 

  genomförandet av leveransen. 
   
  Leverantören är i förhållande till Köparen ansvarig för eventuell skadeståndsskyldighet som
  Köparen 

  kan drabbas av med anledning av utförandet av leveransen och Leverantören åtar sig att hålla 

  Köparen skadelös.

  Leverantören ansvarar för skador som upptäcks under avtalets giltighetstid och därtill en tre (3)
  års-

  period beräknat från dag för avtalsperiodens upphörande. Leverantörens ansvar för skada är 

  begränsad till maxersättning 20 % av Kontraktssumman. Därefter ska Köparen ha möjlighet till att 

  häva avtalet i enlighet med klausul Hävning av avtal. 

  Ansvarsbegränsning enligt tredje stycket gäller inte om uppsåt eller grov vårdslöshet 

  föreligger. Ansvarsbegränsning omfattar inte intrång i tredje parts immateriella rättigheter,
  viten, 

  prisavdrag, räntor eller personuppgiftsincidenter. Vid uppsåt eller grov vårdslöshet står
  Leverantören 

  ansvarig även för indirekt skada. 

  8.7.6 Ansvarsförsäkring

  Leverantören ska under avtals- och ansvarstiden inneha ansvarsförsäkring omfattande person- och 

  sakskada motsvarande Leverantörens ansvar enligt detta avtal. Leverantören ska även inneha de 

  försäkringar denne är skyldig till enligt lagar och författningar. Leverantören ska på anmodan
  uppvisa 

  bevis om gällande försäkring till Köparen.

  8.7.7 Force majeure

  Part befrias från sina åtaganden enligt detta avtal om fullgörandet förhindras eller oskäligt
  betungas 

  på grund av omständighet utanför Partens kontroll som Parten skäligen inte kunnat förutse vid 

  avtalets tecknande och vars följder Parten inte heller skäligen kunde ha undvikit, förutsett
  eller 

  övervunnit, vid bedömning av denna bestämmelse tas hänsyn till det agerande som Leverantören 

  valt efter det att skadan uppstått, och om den då iakttagit allt för att minimera eller motverka 

  uppkommen skada.

  Befrielsegrunden medför framflyttning av tidpunkt för prestation och befrielse från påföljder.
  Som 

  händelser utanför Partens kontroll anses eldsvåda, krig, mobilisering, terroristhandling,
  oförutsedd 

  militärinkallelse, rekvisition, beslag, uppror, upplopp eller andra liknande händelser om
  händelsen 

  drabbar Part eller Underleverantör. Beror dröjsmålet på någon som Part anlitat för att helt eller
  delvis 

  fullgöra köpet, är Parten fri från ansvar endast om också den som Parten har anlitat skulle vara
  fri 

  enligt första stycket.

  Den Part som avser åberopa ovan beskriven omständighet ska omedelbart och skriftligen underrätta 

  motparten om detta. Så snart den åberopade omständigheten upphört ska Parten skriftligen 

  underrätta motparten samt omedelbart återuppta fullgörandet av avtalad prestation. Om uppdragets 

  fullgörande till väsentlig del förhindras för längre tid än tio (10) veckor på grund av ovan viss
  angiven 

  omständighet äger Köparen, utan ersättningsskyldighet, skriftligen häva avtalet med omedelbar 

  verkan.

  8.7.8 Avstående

  Parts underlåtenhet att vid ett eller flera tillfällen göra gällande rättighet enligt detta avtal
  eller påtala 

  visst förhållande hänförligt till avtalet innebär inte att Part avstått från rätten att vid senare
