  estimatedScope: Ramavtal med avtalstid 2026-07-13 till 2028-07-12, med möjlighet till förlängning
    vid 2 tillfällen om max 12 månader vardera (totalt max 4 år). Beräknat värde ca 20 MSEK,
    takbelopp 25 MSEK exkl. moms. Avrop sker via förnyad konkurrensutsättning. Upp till 5
    leverantörer per delområde. Timdebitering per konsultnivå (junior, erfaren, senior, expert).
  redFlags:
    - Sista anbudsdag enligt avsnitt 1.2.7 anges som 2026-06-11 23:59, medan upphandlingsdokumentets
      rubrik anger 2026-06-26 23:59 – möjlig felskrivning eller intern inkonsekvens som bör
      klargöras via frågor och svar.
    - Ingen garanti ges på volym – takbeloppet på 25 MSEK är en övre gräns, inte ett garanterat
      uttag.
    - Region Västmanland kan inte avropa fullt ut förrän 2027-03-31, vilket kan påverka faktiskt
      volymutfall under avtalets första period.
    - Utvärderingen baseras enbart på skriftliga bilagor – strikta formkrav (PDF, max 5 sidor, rätt
      uppladdningsfält) kan leda till förkastning vid tekniska missar.
    - Ingen rangordning fastställs mellan antagna leverantörer – volymen per leverantör är helt
      beroende av utfall i enskilda FKU-avrop och kan bli ojämnt fördelad.
    - ABK 09 kan tillämpas vid tekniska avrop inom delområde 1 och 2, vilket innebär ett alternativt
