  åberopade företag i anbudet.

  Observera att åberopade företag ska uppfylla uteslutningsgrunderna 13 kap. 1-3 §§ LOU. 

  Leverantören kan enligt 14 kap. 7 § LOU i vissa fall ha rätt att byta ut ett åberopat företag. 
                   
  Ekonomisk och finansiell ställning           

  Leverantör som avser att åberopa annat företags ekonomiska och finansiella ställning ska senast 

  inom fem (5) arbetsdagar efter begäran (under utvärderingen) inkomma med lånelöfte, 

  moderbolagsgaranti, bankgaranti, referens till bank eller annan finansiär eller motsvarande som 

  styrker att det åberopade företaget uppfyller kraven på ekonomisk och finansiell ställning alt.
  senast 

  vid kontraktstecknandet förfogar över tillräcklig finansiering för att kunna genomföra den
  angivna 

  beskrivningen av sin kapacitet. 
              
  Teknisk och yrkesmässig kapacitet            

  Leverantör som avser att åberopa annat företags tekniska och yrkesmässiga kapacitet ska senast 

  fem (5) arbetsdagar efter begäran (under utvärderingen) inkomma med ett åtagande (t.ex. intyg, 

  avtal eller koncerngaranti) som intygar Leverantörens tillgång till det åberopade företagets
  kapacitet. 

  Det ska framgå vilka delar av uppdraget åtagande avser.

  Om leverantören åberopar annans kapacitet eller lämnar ett gemensamt anbud och har behov att 

  skapa flera egenförsäkran, kan man skapa flera formulär genom Tendsign. Här kan man söka fram 

  leverantörer i TendSign eller registrera nya direkt i gränssnittet. Därefter väljer man 

  vilka leverantören avser att åberopa kapacitet ifrån. Detta görs till de företag vars kapacitet
  åberopas 

  eller om man lämnar gemensamt anbud. För dessa kan man sedan importera tidigare använda 

  ESPD-XML-filer eller fylla i ESPD-svar direkt i TendSign.

