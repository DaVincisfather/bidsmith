  Anbudspresentation 

  Beställaren avser att bjuda in fyra (4) anbudsgivare på anbudspresentation såvida så 

  många har inkommit med anbud. 
   
  Presentationen beräknas att ske på Regionhälsans kontor eller via Teams 2-4 veckor 

  efter anbudsöppning under normala arbetstider 8-17. Lokalen vid 

  presentationstillfället tillhandahåller dator med möjlighet för koppling till nätverk och 

  bildskärm. 
   
  Ingen ersättning utgår vid dessa tillfällen. 
   
  Presentation får ta max 90 minuter. Presentationen avbryts av Regionhälsan om 

  anbudsgivaren ej avslutar på avsatt tid. Vid intervjun ska anbudsgivaren representeras 

  av kontaktperson samt presumtiva konsulter för kommande uppdrag dessa ska vara 

  aktiva under presentationen. Det är av stor vikt att anbudsgivaren på ett tydligt, 

  kortfattat och kärnfullt sätt kan beskriva och konkretisera innehållet vid sin 

  presentation. Mängden information är inte det primära utan 

  kvaliteten på det anbudsgivaren vill få fram. 
   
  Presentationsmötet ska innehålla nedanstående punkter: 

  - Kontaktpersoner 

  - Presentera kortfattat samtliga personer samt roller i de olika uppdragen. 

  - Presentation av anbud 

  - Tid för Regionhälsan att ställa frågor 

