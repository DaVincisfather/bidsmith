  5.9.9 Force Majeure

  Part är befriad från påföljd för underlåtenhet att fullgöra viss förpliktelse enligt detta avtal
  om 

  underlåtenheten har sin grund i omständighet (”Befrielsegrund”), som ligger utanför parts
  kontroll 

  och som förhindrar fullgörandet därav. Så snart hindret upphört ska förpliktelsen fullgöras på
  avtalat 

  sätt.
   
  Såsom befrielsegrund ska anses eldsvåda, krig, mobilisering eller oförutsedda militärinkallelser
  av 

  motsvarande omfattning, rekvisition, beslag, valutarestriktioner, uppror eller upplopp, knapphet
  på 

  transportmedel, allmän varuknapphet, inskränkningar i fråga om drivkraft, avtalsenlig konflikt på 

  arbetsmarknaden samt försening av leverans från underleverantör, om förseningen har sin grund i 

  sådan omständighet som avses i denna punkt.
   
  Förbehållet om avtalsenlig konflikt på arbetsmarknaden ska inte anses som befrielsegrund om part 

  själv är föremål för eller vidtar sådan konflikt.
   
  För att få befrielse enligt ovan ska part utan dröjsmål skriftligen meddela den andra parten
  härom. 

  Skriftligt meddelande ska också lämnas utan dröjsmål vid befrielsegrundens upphörande.

