  3. Hållbarhetskrav

  3.1 Hållbar utveckling inom Region Örebro län

  Region Örebro län har höga ambitioner inom hållbarhetsområdet och ska agera som en ansvarsfull 

  offentlig aktör. Regionens verksamhet ska bidra till välfärd och livskvalitet samtidigt som hänsyn
  tas 

  till kommande generationers möjligheter att tillgodose sina behov.
   
  Program för hållbar utveckling 2026–2030 

  Program för hållbar utveckling 2026–2030 pekar ut Region Örebro läns gemensamma väg mot en 

  mer hållbar framtid. Det beskriver hur Regionen som organisation omsätter de globala målen i 

  Agenda 2030, de nationella miljömålen, folkhälsomålen samt mål i den regionala 

  utvecklingsstrategin (RUS) till konkret handling i våra verksamheter.

  Programmet anger att Region Örebro län, inom ramen för gällande lagstiftning, använder 

  upphandling som ett strategiskt verktyg för hållbar utveckling. Genom livscykelbaserade krav, 

  exempelvis lång livslängd, energieffektivitet, reparerbarhet och återvinningsmöjlighet kan
  negativ 

  påverkan på människor och miljö förebyggas. I tillämpliga fall ska upphandling även beakta
  sociala 

  hänsyn i syfte att främja sysselsättning för personer som står långt från arbetsmarknaden.

  3.2 Strategi för övergång till mer cirkulär ekonomi

  Strategi för övergång till en cirkulär ekonomi 

  Region Örebro län har en strategi för övergång till cirkulär ekonomi (beslutad av Regionstyrelsen 

  2025-01-29) där ett fokusområde är Upphandling och inköp. Det finns en stor potential att genom 

  offentlig upphandling bidra till resurseffektivitet, återvinning och cirkulära affärsmodeller.
  Region 

  Örebro län ska därför, i enlighet med strategin, vid upphandling av produkter och tjänster:

  Efterfråga produkter med längre livslängd som går att reparera och modernisera.•

  Efterfråga att fossila råvaror ersätts av biobaserade råvaror, utan att biologisk mångfald och 

  övriga ekosystemtjänster påverkas negativt.

  •

  Efterfråga material (framför allt plast) som är fri från miljö- och hälsoskadliga ämnen och som 

  kan återvinnas på säkra, effektiva och ansvarsfulla sätt.

  •

  Beakta möjlighet att upphandla renoverat och återvunnet.•

  Beakta möjligheten att upphandla en funktion/tjänst i stället för en produkt för att underlätta 

  cirkulära flöden, till exempel leasing i stället för köp.

  •

  3.3 Arbetsmiljö

  Anlitad leverantör ska följa arbetsmiljölagen (1977:1160), arbetstidslagen (1982:673) 

  och bedriva ett systematiskt arbetsmiljöarbete enligt Arbetsmiljöverkets föreskrifter 

  AFS 2023:1, samt följa andra gällande föreskrifter som är tillämpliga för uppdraget. 

  3.4 Energi- och klimatstrategi för Örebro län

  Örebro läns energi- och klimatstrategi  2025-2029 pekar ut riktningen för arbetet med den gröna 

  omställningen i länet. Strategin utgår från en övergripande vision och det övergripande målet att 

  Örebro län inte har några nettonollutsläpp av växthusgaser år 2045. Därtill finns mål inom tre 

  insatsområden:

  Transporter•

  Energi•

  Ett cirkulärt samhälle.•

  Samtliga mål går i linje med nationella, europeiska och globala mål. Utifrån energi- och 

  klimatstrategin kan handlingsplaner tas fram med konkreta åtgärder som bidrar till att nå målen. 

  Insatsområden transporter, energi och cirkularitet är områden där alla behöver bidra för att vi
  ska 

  25RS8852 Utredning av kränkande särbehandlingPublicerad 2026-05-25 11:03

  Sida 23/44


  kunna uppfylla mål på global nivå, EU-nivå och nationell nivå. Insatsområdena är valda utifrån att
  de 

  har stor klimatpåverkan i länet. Energi- och klimatstrategi kopplar till Region Örebro läns
  regionala 

  utvecklingsstrategi (RUS) och interna hållbarhetsprogram samt till andra regionala styrdokument
  för 

  Länsstyrelsen i Örebro län och Region Örebro län.

  Strategin fungerar också som plattform för området ”minskad klimatpåverkan” i det regionala 

  miljömålsarbetet. Örebro läns energi- och klimatstrategi sätter mål för ett samlat klimatarbete i
  länet 

  och lägger grund för handlingsplaner, insatser och fortsatt samverkan för länets aktörer.

  3.5 Uppförandekod för leverantörer

  Uppförandekoden kommer vid avtalstecknande att implementeras under avtalsvillkoret Tillbörlig 

  aktsamhet för hållbara leveranskedjor. Det är därför viktigt att samtliga anbudsgivare sätter sig
  in i 

  vad Uppförandekoden innebär. 

  1. Mänskliga rättigheter 

  Alla internationellt erkända mänskliga rättigheter, så som de uttrycks i FN:s allmänna förklaring
  om 

  de mänskliga rättigheterna, den internationella konventionen om medborgerliga och politiska 

  rättigheter, den internationella konventionen om ekonomiska, sociala och kulturella rättigheter
  samt 

  International Labour Organization:s ("ILO") deklaration om grundläggande principer och
  rättigheter 

  i arbetslivet, ska respekteras.

  2. Arbetares rättigheter

  2.1 Föreningsfriheten och rätten till kollektiva förhandlingar respekteras

  a) Arbetstagare, utan åtskillnad, har rätt att gå med i eller bilda fackföreningar efter eget val
  samt att 

  förhandla kollektivt.  

  b) Arbetsgivare intar en öppen inställning till fackföreningars aktiviteter och deras
  organisatoriska 

  verksamhet.  

  c) Arbetstagarrepresentanter diskrimineras inte och har möjlighet att utföra sina representativa 

  funktioner på arbetsplatsen.  

  d) Där rätten till föreningsfrihet och kollektiva förhandlingar är begränsad enligt lag
  underlättar och 

  hindrar inte arbetsgivare utvecklingen av parallella medel för oberoende och fri förening samt 

  förhandlingar.

  2.2 Anställningen är fritt vald

  a) Det finns inget tvångsarbete, träldom eller ofrivilligt fängelsearbete.  

  b) Arbetstagare är inte skyldiga att lämna ”depositioner" eller sina identitetshandlingar hos sin 

  arbetsgivare och är fria att lämna sin arbetsgivare efter rimlig uppsägningstid.

  2.3 Barnarbete får inte användas 
   
  a) Det får inte förekomma någon nyrekrytering av barnarbete. Barnarbete är varje form av
  aktivitet 

  eller arbete som är skadligt för den intellektuella, fysiska, sociala och moraliska utvecklingen
  hos 

  personer under 18 år och som undergräver deras utbildning, hindrar dem från att gå i skolan,
  tvingar 

  dem att överge skolgången för tidigt eller kräver att de arbetar och studerar samtidigt.  

  b) Arbetsgivaren utvecklar eller deltar i och bidrar till policyer och program som föreskriver
  transition 

  av varje barn som befinns utföra barnarbete, för att göra det möjligt för honom eller henne att
  delta i 

  och förbli i utbildning tills han eller hon inte längre är ett barn. 

  c) En arbetstagare under 18 år kan dock ha rätt att arbeta om han eller hon uppfyller
  ålderskraven 

  för den aktuella typen av arbete: 

  • För allmänt arbete är minimiåldern 15 år. 

  • För icke-farligt arbete får minimiåldern tillfälligt fastställas till 14 år i länder där
  skolavslutningsåldern 

  är lägre än 15 år.  

  d) Personer under 18 år får inte vara anställda nattetid eller under farliga förhållanden.

  2.4 Ingen diskriminering utövas och ingen omänsklig behandling är tillåten 
   
  25RS8852 Utredning av kränkande särbehandlingPublicerad 2026-05-25 11:03

  Sida 24/44


  a) Det finns ingen diskriminering vid anställning, ersättning, tillgång till utbildning,
  befordran, 

  uppsägning eller pensionering på grund av ras, kast, nationellt ursprung, religion, ålder, 

  funktionshinder, kön, civilstånd, sexuell läggning, fackligt medlemskap eller politisk
  tillhörighet. 

  b) Fysiska övergrepp eller disciplin, hot om fysiska övergrepp, sexuella eller andra trakasserier
  och 

  verbala övergrepp eller andra former av hot ska vara förbjudna.

  2.5 Arbetsförhållandena är säkra och hygieniska 
   
  a) En säker och hygienisk arbetsmiljö ska tillhandahållas, med beaktande av kunskapen om 

  branschen och om eventuella särskilda faror. Lämpliga åtgärder ska vidtas för att förebygga
  olyckor 

  och hälsoskador som uppstår till följd av, har samband med eller inträffar i arbetet, genom att
  så 

  långt det är praktiskt möjligt minimera orsakerna till de faror som är förenade med
  arbetsmiljön.  

  b) Arbetstagare ska få regelbunden och registrerad hälso- och säkerhetsutbildning, och sådan 

  utbildning ska upprepas för nya eller omplacerade arbetstagare.  

  c) Tillgång till rena toaletter och dricksvatten samt i förekommande fall sanitära anordningar
  för 

  lagring av livsmedel ska tillhandahållas.  

  d) Inkvartering, om sådan tillhandahålls, ska vara ren, säker och tillgodose arbetstagarnas 

  grundläggande behov.  

  e) Ansvaret för hälsa och säkerhet ska tilldelas en företrädare för den högsta ledningen.

  2.6 Levnadslöner främjas 
   
  a) Löner och förmåner som betalas ut för en normal arbetsvecka uppfyller åtminstone nationella 

  rättsliga standarder eller branschriktmärkesstandarder, beroende på vilken som är högst. Under
  alla 
   
  omständigheter bör lönerna alltid vara tillräckliga för att tillgodose grundläggande behov och för
  att 

  ge viss diskretionär inkomst.  

  b) Alla arbetstagare ska få skriftlig och begriplig information om sina anställningsvillkor
  avseende lön 

  innan de börjar arbeta och om löneuppgifterna för den berörda löneperioden varje gång de får
  betalt. 

  c) Löneavdrag som en disciplinär åtgärd ska inte tillåtas och inte heller ska avdrag från löner
  som 

  inte föreskrivs i nationell lagstiftning tillåtas utan den berörda arbetstagarens uttryckliga
  tillstånd. Alla 

  disciplinära åtgärder bör registreras.

  2.7 Arbetstiden är inte oskälig 
   
  a) Arbetstiden ska följa nationella lagar, kollektivavtal och bestämmelserna i b till f nedan,
  beroende 

  på vilket som ger det större skyddet för arbetstagare.  

  b) Arbetstiden, exklusive övertid, ska fastställas i avtal och får inte överstiga 48 timmar per
  vecka.  

  c) All övertid ska vara frivillig. Övertid ska användas på ett ansvarsfullt sätt, med beaktande
  av 

  omfattning, frekvens och arbetade timmar för enskilda arbetstagare och arbetskraften som helhet. 

  Den får inte användas för att ersätta reguljär anställning. Övertid ska alltid kompenseras med en 

  premie som rekommenderas vara minst 125 % av den ordinarie lönen.  

  d) Det totala antalet arbetade timmar under en sjudagarsperiod får inte överstiga 60 timmar, utom 

  när det omfattas av punkt e nedan.  

  e) Arbetstiden får överstiga 60 timmar under en sjudagarsperiod endast i undantagsfall om
  samtliga 

  följande villkor är uppfyllda: 

  • detta är tillåtet enligt nationell lagstiftning;  

  • detta är tillåtet enligt ett kollektivavtal som fritt förhandlats fram med en
  arbetstagarorganisation 

  som representerar en betydande del av arbetskraften;  

  • lämpliga skyddsåtgärder vidtas för att skydda arbetstagarnas hälsa och säkerhet;  

  • arbetsgivaren kan visa att exceptionella omständigheter föreligger, såsom oväntade 

  produktionstoppar, olyckor eller nödsituationer.  

  f) Arbetstagarna ska ges minst en ledig dag under varje sjudagarsperiod eller, om det är tillåtet
  enligt 

  nationell lagstiftning, två dagar ledigt under varje 14-dagarsperiod.

  2.8 Reguljär anställning tillhandahålls 
   
  a) I största möjliga utsträckning ska det arbete som utförs ske på grundval av ett erkänt 

  anställningsförhållande som etablerats genom nationell lagstiftning och praxis.  

  25RS8852 Utredning av kränkande särbehandlingPublicerad 2026-05-25 11:03

  Sida 25/44


  b) Skyldigheter gentemot arbetstagare enligt lagar och andra författningar om arbete eller social 

  trygghet som följer av det reguljära anställningsförhållandet ska inte undvikas genom användning
  av 

  ”labour-only contracting”, underleverantörer eller hemarbete, eller genom lärlingssystem där det
  inte 

  finns någon verklig avsikt att förmedla färdigheter eller tillhandahålla reguljär anställning.
  Inte heller 

  ska sådana skyldigheter undvikas genom överanvändning av tidsbegränsade anställningskontrakt.

  3. Miljön

  3.1 Klimat- och miljöpåverkan 
   
  a) Nationell miljölagstiftning följs.  

  b) Klimatåtgärder som bidrar till att uppnå nationella och internationella klimatmål främjas. 

  c) Användningen av jungfruliga råvaror minskas genom kontinuerlig optimering av 

  råvaruanvändningen, ökad återvinning och återanvändning av råmaterial, minimering av avfall och 

  genom erbjudanden och lösningar i linje med en cirkulär ekonomi. 

  d) Inga råvaror används från arter som är listade i CITES eller som akut hotade, hotade eller
  sårbara 

  på IUCN:s rödlista över hotade arter. 

  e) Kemikalieanvändningen kontrolleras eller utvärderas. Där så är tillämpligt utförs substitution 

  och/eller implementering av alternativa processer, för att minska farorna för hälsa och miljö och 

  förbättra resurseffektiviteten.  

  f) Avfall lagras, hanteras, transporteras och bortskaffas på ett sätt som skyddar arbetstagares
  hälsa, 

  personer i omgivande samhällen och miljön.  

  g) Strategier för effektiv vattenanvändning främjas där så är tillämpligt. 

  h) Utsläpp som utgör en fara för hälsa och miljö minskas eller elimineras. 
   
  3.2 Miljörättigheter 
   
  a) Alla folk har rätt till självbestämmande och att fritt förfoga över sina naturrikedomar och 

  naturresurser. Ett folk får inte i något fall berövas sina möjligheter till försörjning.  

  b) Olovlig avhysning eller övertagande av mark, skog eller vatten får inte förekomma. 

  c) Ursprungsbefolkningars rätt till mark, territorier och naturresurser som de traditionellt har
  ägt, 

  ockuperat eller på annat sätt använt eller förvärvat respekteras, inklusive rätten till fritt och
  informerat 

  förhandssamtycke. 

  d) Rätten till en säker, ren, hälsosam och hållbar miljö respekteras. Denna rättighet är en
  integrerad 

  del av det fulla åtnjutandet av rätten till liv, hälsa, mat, vatten och sanitet.

  4. Affärsetik

  4.1 Korruption, konkurrensbegränsande beteende och beskattning 
   
  a) Ingen inblandning i mutbrott, förskingring, handel med inflytande, missbruk av
  tjänsteställning, 

  olagligt berikande, tvätt av vinning av brott, häleri eller hindrande av rättvisan förekommer.  

  b) Inga avtal ingås som syftar till att snedvrida konkurrensen eller missbruka en dominerande 

  ställning.  

  c) Skatteupplägg avstås om det är osäkert om arrangemanget ligger inom lagens ram. Detsamma 

  gäller skatteplanering som utnyttjar brister i skatteregler för att på konstgjord väg flytta
  vinster till 

  länder med låg eller ingen skatt.  

  d) Arbetstagare får regelbunden och registrerad utbildning i affärsetik, och sådan utbildning ska 

  upprepas för nya eller omplacerade arbetstagare. 

  Allvarliga avvikelser 

  Tvångsarbete, barnarbete, arbetsförhållanden som medför fara för liv, allvarlig miljöskada,
  storskalig 

  korruption och attacker på miljö- och människorättsförsvarare är allvarliga avvikelser. 

  Allvarlig miljöskada definieras som skada som orsakas av förorenande verksamhet som har en 

  allvarlig negativ påverkan på människor, vattenområden eller grundvatten, arter och livsmiljöer. 

  Storskalig korruption definieras som inblandning i mutbrott, förskingring, handel med inflytande, 

  missbruk av tjänsteställning, olagligt berikande, tvätt av vinning av brott, häleri eller
  hindrande av 

  rättvisan:  

  a) som en del av ett upplägg som involverar en offentlig tjänsteman på hög nivå, och  

  b) som leder till eller är avsett att leda till:  

