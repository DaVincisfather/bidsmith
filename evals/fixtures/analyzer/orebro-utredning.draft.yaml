  2.1 Uteslutning av anbudsgivare

  En upphandlande myndighet ska utesluta en anbudsgivare från att delta i en offentlig upphandling 

  om myndigheten får kännedom om att anbudsgivaren enligt en lagakraftvunnen dom är dömd för 

  brott enligt 13 kap 1 § LOU (deltagande i kriminell organisation, bestickning, bedrägeri,
  penningtvätt, 

  terroristbrott eller människohandel).    
   
  Är anbudsgivaren en juridisk person ska anbudsgivaren uteslutas om en person som ingår i 

  anbudsgivarensförvaltnings-, lednings- eller kontrollorgan har dömts för brott enligt ovan.
  Detsamma 

  gäller om den som har dömts för brottet är behörig att företräda, fatta beslut om eller
  kontrollera 

  anbudsgivaren.
   
  En anbudsgivare får i enlighet med 13 kap 3 § LOU uteslutas från att delta i en upphandling om

  leverantören har åsidosatt tillämpliga miljö-, social- eller arbetsrättsliga skyldigheter,1. 

  myndigheten kan visa att leverantören gjort sig skyldig till något allvarligt fel i
  yrkesutövningen 

  som gör att leverantörens redbarhet kan ifrågasättas,

  2. 

  myndigheten har tillräckligt sannolika indikationer på att leverantören har ingått 

  överenskommelser med andra leverantörer som syftar till att snedvrida konkurrensen

  3. 

  leverantören har visat allvarliga eller ihållande brister i fullgörandet av något väsentligt krav
  i 

  ett tidigare kontrakt

  4. 

  myndigheten inte kan undvika en snedvridning av konkurrensen eller inte kan garantera en 

  likabehandling av leverantörerna på grund av jäv

  5. 

  myndigheten genom andra mindre ingripande åtgärder än uteslutning av leverantören inte kan 

  avhjälpa en snedvridning av konkurrensen på grund av ett sådant tidigare deltagande från 

  leverantörens sida som avses i  4 kap 8 § LOU,

  6. 

  leverantören i allvarlig omfattning lämnat oriktiga uppgifter, undanhållit information eller inte 

  ingivit begärda kompletteringar, eller

  7. 

  leverantören otillbörligt har försökt att påverka den upphandlande myndighetens 

  beslutsprocess

  8. 

  Anbudsgivaren intygar att det inte föreligger belastning enligt LOU 

  13 kap 1 § eller 3 §.

