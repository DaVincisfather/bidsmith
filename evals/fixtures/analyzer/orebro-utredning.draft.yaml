  Avbeställning av uppdrag 

  Beställaren ska kunna avbeställa beställning/avrop innan uppdraget startar. Ersättning utgår då 

  enligt följande: 

  - Avbeställning 3 veckor innan uppdragsstart, ingen ersättning utgår 

  - Avbeställning 2 veckor eller mindre innan uppdragsstart, utgår ersättning om 10 % av 

  uppdragsvärdet eller i överenskommelse med beställaren. 

  - Avbeställning under pågående uppdrag, utgår ersättning för nedlagt arbete i överenskommelse 

  med beställaren.

  Avbrytande av uppdrag 

  Beställaren ska kunna avbryta ett pågående uppdrag om något av nedan skäl föreligger:

  Beställaren bedömer att anlitad konsult ej innehar för uppdraget rätt kompetens, inte utför
  uppdraget 

  fackmannamässigt eller inte gör det som förväntas av denne.

  Uppsägningstid är då en (1) arbetsdag beräknat från tiden för då beställaren skriftligt meddelar 

  leverantören om avbrytandet av uppdraget.

