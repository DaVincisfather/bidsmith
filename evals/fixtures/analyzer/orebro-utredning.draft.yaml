  2.6 Tillgång till andra företags kapacitet

  En leverantör får för ett visst kontrakt åberopa andra företags kapacitet för att uppfylla krav
  som 

  avser ekonomisk och finansiell ställning eller teknisk och yrkesmässig kapacitet enligt 14 kap. 6
  § 

  LOU.

  Att åberopa ett annat företags kapacitet för att uppfylla kvalificeringskrav är inte detsamma som
  att 

  använda företaget som underleverantör. Åberopande av kapacitet handlar om att styrka 

  anbudsgivarens ekonomiska, tekniska och yrkesmässiga kapacitet att fullgöra kontraktet. Om 

  leverantören avser att använda sig av ett företag för fullgörande av kontraktet ska detta företag 

  anges som underleverantör

  Observera att det är inte tillåtet att åberopa kapacitet för att styrka uppfyllande av olika 

  ledningssystem inom exempelvis kvalitet, miljö och informationssäkerhet.

  Anbudsgivaren ska vid åberopande ange: 

  • det åberopade företagets namn och organisationsnummer, samt 

  • vad åtagande omfattar.

  På begäran ska anbudsgivaren inkomma med ett skriftligt åtagande från leverantören vars kapacitet 

  åberopas. Det är leverantören som ska visa att den kommer att kunna förfoga över de nödvändiga 

  resurserna när kontraktet ska fullgöras.

  Om anbudsgivaren har för avsikt att åberopa annat företags kapacitet 

  ska namn, organisationsnummer samt vad åtagandet omfattar 

  redogöras för. Avser inte anbudsgivaren åberopa annans kapacitet - 

  skriv "Ej aktuellt".

