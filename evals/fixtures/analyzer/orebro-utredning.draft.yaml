  1.6.2 Förtydligande och komplettering av upphandlingsdokumentet (Frågor 

  och svar)

  All kommunikation med anbudsgivare sker via TendSign.     
       
  Regionen ser det som mycket angeläget att ansvarig handläggare kontaktas, på ett så tidigt
  stadium 

  som möjligt, om anbudsgivaren uppfattar att information av betydelse för att ta fram ett korrekt
  och 

  fullständigt anbud saknas eller om det finns risk för att missförstånd kan uppstå. Detta gäller
  även 

  om upphandlingsdokumentet upplevs som otydligt eller om något eller några av de ställda kraven är 

  orimliga, onormalt kostnadsdrivande eller konkurrensbegränsande i något avseende.
   
  Begäran om förtydligande/komplettering ska vara skriftlig för att undvika missförstånd och lämnas
  via 

  TendSign under "Frågor och svar". Frågor ska vara Regionen tillhanda senast  2026-08-13 
   
  För snabbare svar rekommenderas att frågorna skickas in separat då TendSign ej kan hantera 

  delsvar. 
   
  Under vecka 14 till finns inga möjligheter att svara på frågor.
   
  Svar lämnas av Regionen via TendSign senast sex (6) dagar innan sista anbudsdag.
   
  Anbudsgivaren kan endast åberopa de förtydliganden/kompletterande upplysningar som erhållits 

  skriftligen från ansvarig handläggare.
   
  Tänk på att till följd av HFD 2022 ref. 4 I och II bör anbudsgivare påpeka upplevda brister i 

  upphandlingsdokumenten redan under anbudstiden för att ha möjlighet att åberopa dessa brister vid 

  en eventuell överprövning. Se nedan länk:
   
  hfd-2022-ref.-4-i-och-ii.pdf (domstol.se)

  1.6.3 Helt eller delat anbud

  Anbud ska lämnas för hela leveransen av aktuella tjänster. Ramavtal kommer att tecknas med tre 

  leverantör, såvida så många anbudsgivare kvalificeras och lämnar anbud. Rangordning  kommer att 

  tillämpas.
   
  Avrop sker fortlöpande under avtalstiden enligt fastställd rangordning.
   
  Ingen garanti lämnas om avrop av viss volym eller till vissa värden. Regionen ska ha rätt att
  anta 

  lämnade anbud i dess helhet eller i delar.

  1.6.4 Reservationer

  Reservationer godtas inte. Om ett anbud innehåller reservationer kommer dessa inte att 

  beaktas. Reservationer avseende obligatoriska krav kan medföra att anbudet förkastas.

  25RS8852 Utredning av kränkande särbehandlingPublicerad 2026-05-25 11:03

