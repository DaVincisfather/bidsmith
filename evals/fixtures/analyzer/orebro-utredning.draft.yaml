  2.3 Anbudsgivarens ekonomiska ställning

  Anbudsgivaren ska ha en stabil ekonomisk bas och ha tillgång till resurser som svarar mot
  anbudets 

  omfattning och innehåll. I prövningen av anbudet kommer anbudsgivarens finansiella och 

  ekonomiska ställning att bedömas efter Creditsafe AB:s rating. Anbudsgivaren ska ha en 

  ratingpoäng med minst 40 poäng på en skala från 0 till 100. En poängangivelse med minst 40 poäng 

  innebär att anbudsgivaren är kreditvärdig. För mer information om Creditsafes rating, gå in på 

  www.creditsafe.se

  Regionen kommer att kontrollera uppgifterna vid handläggningen av anbudsgivarens anbud.

  Anbudsgivare som inte uppnår angiven kravgräns enligt Creditsafe AB ska på begäran och inom 

  tre(3) arbetsdagar inkomma med dokumentation som styrker att anbudsgivaren vid 

  anbudslämnandet har en stabil ekonomisk ställning och har tillgång till resurser som svarar mot 

  anbudets omfattning och innehåll. Om Regionen inte kan verifiera denna information kan anbudet 

  komma att förkastas. 
   
  Anbudsgivare får även åberopa annans kapacitet för att styrka krav på ekonomisk ställning, se
  punkt 

  Tillgång till andra företags kapacitet nedan.

