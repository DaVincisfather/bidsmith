  5.9.13 Intrång i upphovsrätten och patent

  Leverantören åtar sig att på egen bekostnad försvara Regionen om krav riktas eller talan förs mot 

  denne om intrång i patent, upphovsrätt eller annan rätt på grund av användning av levererade 

  produkter för avsett ändamål. Leverantören åtar sig vidare att ersätta köparen för de skadestånd
  och 

  ersättningar som denne genom förlikning eller dom kan bli skyldig att utge. Leverantörens
  åtagande 

  gäller under förutsättning att leverantören får bestämma över försvaret mot sådan talan och får
  föra 

  förhandlingar om uppgörelse eller förlikning.  
    
  Om det fastställs att intrång har skett ska leverantören på egen bekostnad antingen:  

  · tillförsäkra Regionen rätt att fortsätta använda produkterna  

  · ersätta produkten med en annan produkt vars användning inte innebär intrång  

  · ändra produkten så att intrång inte föreligger  

  · återta produkten och kreditera Regionen ett belopp som motsvarar produktens värde med  

  hänsyn till den tid som produkten använts och normal avskrivningstid.  
    
  Innebär intrånget väsentlig olägenhet för Regionen har denne rätt att genom skriftligt meddelande
  till 

  leverantören häva Avtalet i sin helhet.

