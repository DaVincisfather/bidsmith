  Information om sanktionerna

  EU har beslutat om sanktioner mot Ryssland till följd av Rysslands aggression mot Ukraina. Dessa 

  sanktioner påverkar upphandlande organisationer och offentliga upphandlingar enligt nedan:

  Ett förbud har införts mot att göra betalningar med mera till vissa uppräknade personer och 

  organisationer

  •

  Ett förbud har införts mot att importera, köpa och transportera vissa uppräknade varor•

  Ett förbud har införts mot att tilldela och fullgöra offentliga kontrakt med ryska aktörer•

  Regionen är genom sanktionerna förbjuden att direkt eller indirekt göra betalningar till sådana 

  aktörer som finns upptagna på sanktionslistorna, och som därmed omfattas av dessa sanktioner. 

  Den upphandlande organisationen får heller inte importera sådana varor och tjänster som omfattas 

  av aktuella sanktioner. Krav rörande affärer kopplade till sanktionerna, som exempelvis
  skadestånd, 

  får inte beviljas. 

  Den upphandlande organisationen får inte heller tilldela kontrakt till eller i förhållande till
  en 

  Leverantör som tillhör någon av följande kategorier:

  a) ryska medborgare eller fysiska eller juridiska personer som är etablerade i Ryssland

  b) juridiska personer, enheter eller organ vars äganderätter till mer än 50 % direkt eller
  indirekt ägs 

  av någon som avses i a)

  c) fysiska eller juridiska personer, enheter eller organ som agerar för, eller på uppdrag av, en
  enhet 

