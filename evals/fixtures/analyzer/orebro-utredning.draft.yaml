  i 

  Örebro.

  5.9.12 Sekretess

  Offentlighets- och sekretesslagen 2009:400 ("OSL") reglerar frågor om sekretess och
  tystnadsplikt. 

  För leverantören och dennes personal gäller samma sekretess som för hälso- och sjukvårdspersonal 

  anställd av Regionen.
   
  Leverantören förbinder sig att inte röja eller utnyttja Regionens uppgifter, vad det än må vara 

  (person-, ekonomiska, kommersiella uppgifter etc.), som kan komma till Leverantörens kännedom. 

  Leverantören innefattar alla personer som leverantören på något sätt involverar för att fullgöra
  sina 

  åtaganden mot Regionen och andra personer som på något sätt kan komma i kontakt med 

  uppgifterna.
   
  Anvisad personal som anlitas av Regionen ska omfattas av OSL:s regler. Leverantören förbinder sig 

  även att i förekommande fall se till att av leverantören anlitad under- respektive medleverantör
  gör 

  motsvarande åtagande.
   
  Leverantören ansvarar för att leverantörens anställda eller av leverantören anlitad under-
  respektive 

  medleverantör, som ska utföra arbetet, ska upplysas om tystnadsplikt och skriva på 

  tystnadsförbindelse. Dessa förbindelser ska på anmodan av Regionen kunna uppvisas av 

  leverantören.
   
  Leverantören ansvarar för att gällande föreskrifter om tystnadsplikt avseende uppgifter om
  enskilds 

  hälsotillstånd eller andra personliga förhållanden iakttas. Samma gäller ekonomiska uppgifter med 

  anknytning till uppdraget, för vilka sekretess gäller i Regionens verksamhet.
   
  Uppkommer direkt skada för Regionen på grund av brister i handhavandet av sekretesskyddade 

  uppgifter och skadestånd utdöms, äger Regionen rätt att avkräva leverantören motsvarande 

  ersättning. Bedöms den inträffade skadan såsom grov ska detta utgöra grund för Regionen att häva 

  Avtalet.
   
  Sekretess omfattar även anställda utöver anlitad personal då dessa kan behöva hantera namn och 

  personnummer på den person som tjänsten avser.

