  1.7.1 Prövning av anbud

  Prövning av anbud kommer att ske enligt följande ordning:

  Uteslutning av anbudsgivare 1. 

  Kvalificering av anbudsgivare 2. 

  Prövning av obligatoriska krav på kontraktsföremålet3. 

  Utvärdering av det ekonomisk mest fördelaktiga anbudet4. 

  Prövning och utvärdering kommer att genomföras med utgångspunkt från de uppgifter som 

  anbudsgivaren redovisat i sitt anbud.

  5. 

  Kvalificeringen och utvärderingen kan komma att göras i omvänd ordning, vilket innebär att endast 

  vinnande anbud prövas i samtliga steg. Regionen förbehåller sig även rätten att endast pröva
  det/de 

  anbud som har en teoretisk chans att utifrån angivna tilldelningskriterier tilldelas
  kontrakt/ramavtal.

  1.7.2 Kvalificering av anbudsgivare

  Anbudsgivaren kan för att styrka uppfyllande av kvalificeringskraven välja mellan att skicka in 

  efterfrågade dokument som anges under avsnitt Kvalificering av anbudsgivare alternativt intyga
  detta 

  genom att fylla i och skicka in ett ESPD-dokument med anbudet.

  Notera att Regionen, under utvärderingen kommer kontrollera att anbudsgivare som skickat in en 

  ESPD uppfyller samtliga kvalificeringskrav. Anbudsgivaren ska på Regionens anmodan inkomma 

  med samtliga efterfrågade dokument inom tre (3) arbetsdagar.

  ESPD-dokument för ifyllnad tillhandahålls av Regionen via följande länk: För dig som vill bli 

  leverantör • regionorebrolan.se

  1.7.3 Obligatoriska krav

  Upphandlingsdokumentet med bilagor innehåller ett antal krav som är obligatoriska.
  Förutsättningen 

  för att ett anbud ska kunna prövas, utvärderas och antas är att dessa krav är uppfyllda. Kraven
  avser 

  såväl krav på anbudsgivare och anbudet som på efterfrågad vara och/eller tjänst.  
    
  Kvalificerade anbudsgivare prövas avseende redovisade krav på anbudet. Anbud som inte uppfyller 

  krav på anbudet kommer att förkastas och går inte vidare till utvärdering av efterfrågade 

  varor/tjänster.

  1.7.4 Kontroll av kravuppfyllelse

  Efter anbudsöppning genomförs prövning och utvärdering av de anbud som inkommit i rätt tid. 

  Prövningen och utvärderingen kommer att genomföras med utgångspunkt i de uppgifter som 

  anbudsgivaren har redovisat i sitt anbud.

  Först prövas om det av anbuden framgår att anbudsgivande företag (eventuellt tillsammans med 

  företag vars kapacitet åberopas) uppfyller de krav som ställts på anbudsgivaren samt att 

  anbudsgivaren inte är föremål för uteslutningsgrunder. De anbud som klarar denna prövning 

  genomgår därefter en prövning av att de ställda kraven på kontraktsföremålet är uppfyllda. I
  denna 

  prövning ingår kontroll av att anbudsgivaren accepterar avtalsvillkoren utan reservationer och
  har 

  lämnat priser i enlighet med angivna förutsättningar.

  Vid prövningen av inkomna anbud kan Regionen komma att kontrollera uppgifter som anbudsgivaren 

  lämnat i anbudet. Kontrollerna kan även innebära att Regionen kontaktar i anbudet redovisade 

  referenser. I det fall kontroll visar att felaktiga uppgifter har lämnats, kan detta leda till att
  anbudet 

  förkastas. Anbudsgivaren kommer även att uteslutas om i anbudet angivna nyckelperson/-er inte 

  anses inneha efterfrågade kvalifikationer. 

  Bland de anbud som därefter kvarstår kommer Regionen att anta det anbud som är det ekonomiskt 

  mest fördelaktiga enligt den utvärderingsmodell som beskrivs i Upphandlingsdokumentet.

