  1.4 Upphandlingsförfarande

  Öppet förfarande enligt lag (2016:1145) om offentlig upphandling ("LOU"). Upphandlingsformen 

  medger inte förhandling, varför det är av stor vikt att alla krav och villkor enligt 

  detta upphandlingsdokument följs och att bästa villkor lämnas i anbudet.

  1.5 Regionernas gemensamma eskaleringstrappa

  Regionernas Nationella Eskaleringstrappa beskriver regionernas gemensamma arbetssätt och 

  aktiviteter gällande leverantörsrelaterade avvikelser. Mer information om regionernas nationella 

  eskaleringstrappa finns på Ledningsnätverket för regionernas upphandlings (LfU) Hemsida

  1.6 Anbudet

  1.6.1 Anbudets form och innehåll

  Hela anbudsförfarandet genomförs, om inget annat anges, på svenska och anbudet ska lämnas 

  elektroniskt via TendSign. Enstaka svar eller dokument accepteras även på engelska, förutsatt att 

  anbudsgivaren, på begäran samt på egen bekostnad, inom en (1) vecka, kan tillhandahålla en 

  översättning till svenska.

  Inkomna anbud i annan form eller språk kommer att förkastas. Anbudet ska innehålla svar på alla 

  frågor. Svaren ska lämnas på angiven plats i upphandlingsdokumentet så som svarsalternativen 

  anges. Om hänvisning till annat dokument görs är det viktigt att detta tydligt framgår. Anbud kan 

  komma att förkastas om svaren är ofullständiga eller saknas.

  Bilagor ska namnges så att Regionen på ett enkelt sätt kan identifiera innehållet. Bilagor ska 

  biläggas det elektroniska anbudet (som bifogade filer). Filer som bifogas anbudet ska vara i ett 

  filformat som kan läsas av MS Word respektive Excel alt. i PDF- eller JPG-format. Vänligen håll 

  filnamnen korta eftersom långa filnamn kan leda till tekniska svårigheter vid nedladdning eller 

  komprimering.

  Bifogade bilagor som inte har efterfrågat format eller är behäftade med lösenord ska lämnas in i
  rätt 

  format alternativt olåsta inom tre (3) dagar från det att Regionen begär detta. Regionen
  förbehåller 

  sig rätten att förkasta anbud där Regionens förfrågan inte hörsammas inom uppsatt tidsram. 

  25RS8852 Utredning av kränkande särbehandlingPublicerad 2026-05-25 11:03

  Sida 5/44


