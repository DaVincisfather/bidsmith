  1.6.5 Pris

  Anbudsgivaren ska ange priser enligt nedan.

  Priserna ska anges i svenska kronor (SEK) exklusive mervärdeskatt och inkludera 

  eventuella kostnader för resor, restid, logi, traktamente  administration och dylikt.

  Inga övriga kostnader eller avgifter får tillkomma.

  Priserna avser timpris på utförare av tjänster enligt prismatris där SEK/timma anges 

  timpris, vid SEK/tillfälle anges totalpris.

  Om pris saknas eller är ofullständigt ifylld avseende prisuppgifter kommer anbudet att 

  förkastas.

  Priser anges netto med samtliga åtaganden inberäknade, exklusive mervärdesskatt. 

  Paketpris, kombinerade anbud, stafflade priser eller differentierade priser på grund 

  av delat anbud godtas ej.

  Avgifter som inte överenskommits skriftligen accepteras inte. 
   
