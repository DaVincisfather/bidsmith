  Enheter som omfattas av detta avtal har rätt att avropa/beställa och leverantören ska ta emot 

  beställningar fram till avtalsperiodens utgång för leverans inom den angivna leveranstiden.  
    
  Ordererkännande med leveransbesked skickas omgående alt. på anmodan till beställande 

  enhet.

  •

  Leverantören förbinder sig till att besvara avrop inom 48 timmar (ordinarie arbetstid 08.00-

  17:00) om de kan åta sig uppdraget.

  •

  Om svar uteblir har beställaren rätt att fråga nästa leverantör i rangordningen.•

  Vid avrop enligt rangordning har beställaren rätt att frångå rangordningen:•
   
  1. Om leverantören inte svarar inom utsatt tid. 
   
  2. Om pågående uppdrag med den leverantör som enligt rangordningen ska tillfrågas är försenad i 

  förhållande till fastställd tidplan och leverantören inte kan påvisa att denna försening beror på 

  omständigheter som beställaren orsakat, har beställaren rätt att frångå rangordningen avseende 

  denne leverantör till dess att nämnda försenade uppdrag är slutfört med godkänt resultat. 
   
  3. Om kvalitetsbrister i utförandet, brister avseende fackmässighet eller avvikelser från vad som 

  fastställts vid avrop förekommit i en pågående uppdrag eller avslutat uppdrag och dessa 

  brister/avvikelser inte kan anses obetydliga för beställaren, har beställaren rätt att vid avrop
  frångå 

  rangordningen avseende denne leverantör fram till dess att nämnda uppdrag är slutfört med godkänt 

  resultat. 
   
  4. Om leverantören vid två upprepade tillfällen (inom en ettårsperiod) uppvisat påtagliga brister
  enligt 

  punkt 2 och 3 ovan. Alternativt om leverantören på något annat sätt inte sköter uppdraget enligt
  detta 

  avtal riskerar denne förändrad rangordning permanent.

  Innan rangordning kan ändras kommer beställaren skriftligen varna leverantören att denna kommer 

  att placeras sist i rangordning och resterande leverantörer kommer att flyttas ett steg upp i 

  rangordning.

