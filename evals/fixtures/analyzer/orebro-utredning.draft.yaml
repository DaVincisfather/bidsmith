  1. Administrativa föreskrifter

  1.1 Inbjudan till upphandling
   
  Region Örebro län bjuder in anbudsgivare att lämna anbud för att tillgodose behovet av
  kvalificerade 

  konsulter för oberoende utredningar av kränkande särbehandling.

  Regionhälsan är en central resurs inom Region Örebro län med fokus på arbetsmiljö, företagshälsa 

  och specialiserade vårdinsatser. Uppdraget är att stärka både medarbetare och chefer genom att 

  skapa friska, hållbara arbetsplatser och förebygga ohälsa.

  Regionhälsan erbjuder bland annat:

  Företagshälsovård: Medicinska kontroller, arbetsmiljöutbildningar samt professionellt stöd vid 

  konflikter och kriser.

  •

  Arbetsmiljö- och hälsostöd: Specialister inom arbetsmiljö och hälsofrämjande arbete som bidrar 

  till tryggare och mer hållbara organisationer.

  •

  Arbetslivsinriktad rehabilitering: Stöd till medarbetare med sjukskrivning eller nedsatt 

  arbetsförmåga.

  •

  Tolkförmedling: En regionövergripande tjänst som säkerställer kvalitetssäkrad kommunikation.•

  Utbildningar och chefsstöd: Ledarskapsutbildningar, arbetsmiljöinsatser och riktat stöd för att 

  minska korttidsfrånvaro.

  •

  Genom denna upphandling söker Region Örebro län kompetenta och oberoende utredare som kan 

  bidra till en trygg arbetsmiljö genom professionella, objektiva utredningar av kränkande 

  särbehandling.

  1.2 Ordlista/definitioner

  Anbudsgivare: Den som lämnar anbud. 

  Sida 1/44


  Anbudsprövning: Prövning av anbud enligt de krav och kriterier som angetts i 

  upphandlingsdokumenten, det vill säga uteslutning av anbudsgivare (13 kap. LOU), kvalificering av 

  anbudsgivare (14 kap. LOU) och tilldelning av kontrakt (16 kap. LOU).

  Avrop: Tilldelning av kontrakt från ett ramavtal. Se även beställning.

  Avtalsansvarig: Den eller de personer som innehar ansvaret för ramavtalet

  Beställare: Den avropande enheten i verksamheten som utfärdar begäran om leverans av en vara 

  eller tjänst.

  Beställning: En begäran om leverans av en vara eller tjänst. Beställning är den del i 

  inköpsprocessen som följer efter att kontrakt tilldelats en leverantör.

  Egenförsäkran – ESPD: Egenförsäkran är ett standardiserat dokument och utgör ett preliminärt 

  bevis för att en anbudsgivare uppfyller kvalificeringskrav och därför inte ska uteslutas (15 kap.
  1 § 

  LOU).

  Leverantör: Den som tilldelas kontraktet och därigenom tillhandahåller varan eller tjänster eller
  utför 

  byggentreprenader. Med leverantör avses också grupper av leverantörer (1 kap. 16 § LOU).

  LOU: Lag (2016:1145) om offentlig upphandling.

  Regionen: Den upphandlande myndigheten. 

  Underleverantör: Det företag som anbudsgivaren anlitar för att genomföra hela eller delar av 

  uppdraget. 

  1.3 Upphandlingens omfattning

  1.3.1 Definitioner kränkande särbehandling

  I definitionen för kränkande särbehandling ingår diskriminering, trakasserier, sexuella 

  trakasserier och repressalier. 

  1.3.2 Omfattning och syfte

  Denna upphandling avser Utredning av kränkande särbehandling.
   
  Upphandlingens syfte och mål är att säkerställa Regionhälsans tillgång till opartisk 

  utredningskompetens för ärenden som berör kränkande särbehandling.
   
  Regionhälsan ser en fördel med externa resurser med expertis inom området som kan 

  genomföra utredningen för att garantera opartiskhet, då det kan uppfattas som mest 

  neutralt.
   
  Beskrivning av objektet finns i Krav på tjänsten och Mall för upphandlingskontrakt. Det 

  totala värdet för ingående tjänster i denna upphandling under aktuell avtalsperiod inkl. 

  option beräknas uppgå till ca 4 000 000 kr baserat på 2022-2025  års inköpsvolymer. 

  Det uppskattade värdet ska inte ses som en garanti för kommande avrop, varken till 

  värde eller volym.
   
  Takvärdet i ramavtalet är 6 000 000 SEK exkl. moms. Om ramavtalets värde överstiger 

  angivet belopp upphör ramavtalet att gälla utan ytterligare bekräftelse från någondera 

  25RS8852 Utredning av kränkande särbehandlingPublicerad 2026-05-25 11:03

  Sida 2/44


  part. Regionen och leverantören delar ett ömsesidigt ansvar att underrätta motparten 

  om takvärdet uppnås.

  Takvärdet ska inte ses som en garanterad volym utan fastställer endast en övre gräns 

  för ramavtalet

  1.3.3 Upphandlingsobjekt

  Regionhälsan i Örebro söker en samarbetspartner inom kränkande särbehandling 

  avseende följande områden: 
   
  Förbedömning: leverantören utför självständigt förbedömningar åt beställaren. 
   
  Utredning: leverantören utför självständigt utredningar åt beställaren. Utredningen 

  ska visa om en kränkande särbehandling ägt rum eller ej, i det fall det förekommit 

  kränkande särbehandling ska leverantören beskriva orsakerna. 
   
  Rådgivning:  dvs telefonrådgivning eller rådgivning på plats i utredningar som 

  regionhälsans avtalskunder genomför i egen regi. Rådgivning avseende ex 

  metodfrågor samt analys av resultat och förslag till åtgärder. 
   
  Utbildning:  kompetenshöjande insatser, i första hand till chefer och HR-

  organisationen hos Regionhälsans avtalskunder. Minst innehållande: Förslag på 

  förebyggandeåtgärder/insatser, Styrande lagar, Författningar, Förordningar och 

  Föreskrifter inom området, offentlighet och sekretess.
   
  Regionhälsans avtalskunder är: 

  Hallsbergs kommun 

  Kumla kommun 

  Laxå kommun 

  Lekebergs kommun 

  Lindesbergs kommun

  Ljusnarsbergs kommuns 

  Nora kommun 

  Region Örebro län 
   
  Avtalskunderna kommer att nyttja detta ramavtal genom Regionhälsan och beskrivs 

  som part i upphandlingsdokument.

  1.3.4 Upphandlande myndighet

  Upphandlande myndighet är Region Örebro län ("Regionen"), organisationsnummer 

  232100-0164.
   
  Regionen ansvarar för hälso- och sjukvård, tandvård, infrastruktur, kultur, 

  näringslivsutveckling och flera andra områden som är viktiga för dig och 

  Örebroregionens utveckling. Drygt 10 000 personer arbetar inom Regionens 

  förvaltningar, vilket gör oss till en av länets största arbetsgivare. Tillsammans skapar vi 

  25RS8852 Utredning av kränkande särbehandlingPublicerad 2026-05-25 11:03

  Sida 3/44


  ett bättre liv.
   
  Region Örebro län har sex stycken förvaltningar med var sina förvaltningschefer. Dessa 

  är underställda regiondirektören som också är chef över ett regionkansli med 

  stabsuppgifter.

  För mer information om Regionen gå in på www.regionorebrolan.se.

  1.3.5 Typ av kontrakt

  Ramavtal enligt Mall för upphandlingskontrakt avseende perioden  Avtalets startdatum  –  Avtalets 

  slutdatum med option för köparen om förlängning med sammanlagt 24 månader. Optionen om att 

  förlänga Avtalet kan nyttjas vid ett eller två tillfällen. Förlängningsoption är 12 månader.
   
  Beräknad avtalsperiod är preliminär och avtalets start- och slutdatum kan komma att flyttas fram 

  med motsvarande tid som eventuella förseningar medför, exempelvis om upphandling överprövas. 

  Avtalsstart kan då som längst flyttas till den dag då anbudets giltighetstid löper ut enligt vad
  som 

  anges under punkten Anbudets giltighetstid.   
     
  Avtalet ska gälla för Region Örebro län genom regionhälsan Örebro. Under avtalsperioden 

  tillkommande avtalskunder ska omfattas av ramavtalet.
   
  Nedan bolag skall kunna använda avtalet och skall fatta likalydande tilldelningsbeslut. Region 

  Örebro län kommer teckna avtalet och nedan parter kommer att avropa från avtalet.
   
  Hallsbergs kommun, 212000-1926

  Kumla kommun, 212000-1975 

  Laxå kommun, 212000-1918 

  Lekebergs kommun, 212000-2981 

  Lindesbergs kommun, 212000-2015

  Ljusnarsbergs kommuns, 212000-1959 

  Nora kommun, 212000-2007
   

   
  Uppskattad inköpsvolym per år beräknas till cirka 1 000 000 SEK, den totala inköpsvolymen för
  hela 

  avtalsperioden inklusive optioner beräknas till 4 000 000 SEK. Tecknat kontrakt innebär inte
  några 

  garantier från Regionen avseende inköpsvolymer.

  Med anledning av rättspraxis ska den upphandlande myndigheten som formalia ange det maximala 

  kontraktsvärdet som ramavtalet kan tillåtas omfatta. Det maximala värdet i den här upphandlingen 

  bestäms till 6 000 000 SEK. 
   
  Takvolymen ska inte ses som en garanterad volym utan fastställer endast en övre gräns för 

  ramavtalet.
   
  Ramavtal kommer att tecknas med tre leverantör, såvida så många anbudsgivare kvalificeras och 

  lämnar anbud.
   
  Avrop sker fortlöpande under avtalstiden. Rangordning  kommer att tillämpas.
   
  Beställarna äger parallellt med detta avtal rätt att vända sig till andra aktörer i de fall de
  anser att 

  situationen som ska utredas så kräver.
   
