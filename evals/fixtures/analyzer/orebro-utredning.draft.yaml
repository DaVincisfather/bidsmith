  5.9.4 Inköp på lika villkor

  Anbudsgivare som har dokumentationsskyldigheter enligt 3 kap 13 § DL ska senast 3 månader efter 

  avtalsstart skicka in dokumentation av sitt arbete med aktiva åtgärder enligt diskrimineringslag 

  (2008:567) ("DL") 3 kap 4-10 §§.

  Bilagor i dokumentationen ska namnges så att Regionen på ett enkelt sätt kan identifiera
  innehållet 

  och numreras enligt nedan 1-7.

  Dokumentationen ska innehålla 

  1. en redogörelse för alla delar av arbetet som det beskrivs i 2 och 3 §§ och som avser de
  områden 

  som anges i 5 §, 

  2. en redogörelse för de åtgärder som vidtas och planeras enligt 6 och 7 §§, 

  3. en redovisning av resultatet av kartläggningen och analysen enligt 8-10 §§, 

  4. en redovisning av vilka lönejusteringar och andra åtgärder som behöver vidtas för att åtgärda 

  förekommande löneskillnader som har direkt eller indirekt samband med kön, 

  5. en kostnadsberäkning och en tidsplanering utifrån målsättningen att de lönejusteringar som 

  behöver vidtas ska genomföras så snart som möjligt och senast inom tre år, 

  6. en redovisning och utvärdering av hur föregående års planerade åtgärder har genomförts, och 

  7. en redogörelse för hur samverkansskyldigheten enligt 11 § fullgörs.

  Leverantören är skyldig att informera Regionen för det fall arbetsgivarens antal sysselsatta 

  arbetstagare ökar så att sådan skyldighet som avses enligt 3 kap 13 § inträder. Ovanstående 

  skyldighet att insända dokumentation äger då tillämpning.

