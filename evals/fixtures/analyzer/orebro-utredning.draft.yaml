  för ramavtalet

  5.2 Avtalsform

  Avtal sluts genom ett ramavtal dvs. ett skriftligt avtal som undertecknas av parterna för senare
  avrop. 

  Andra kommersiella villkor som leverantören bifogat till anbudet ska inte beaktas.

  5.3 Avtalstid

  Avtalet gäller  2026-10-01 -  2028-09-30 med option för Regionen om förlängning med 24 månader 

  dock med maximalt tolv (12) månader i taget.   
    
  För det fall Regionen inte säger upp Avtalet 3 månader före avtalsperiodens utgång förlängs
  avtalet i 

  enlighet med option ovan.

  Vid avtalsperiodens slutliga utgång upphör avtalet att gälla utan uppsägning. 

