  3.6 Barnens rättigheter

  Den 1 januari 2020 blev FN:s konvention om barnets rättigheter (barnkonventionen) lag. Att 

  barnkonventionen blir svensk lag är ett sätt att tydliggöra och understryka att
  ett  barnrättsbaserat 

  synsätt ska prägla all offentlig verksamhet. Barnkonventionen består av 54 artiklar och
  innehåller 

  fyra grundprinciper:

  artikel 2 – icke-diskriminering: alla barn har samma rättigheter och lika värde•

  artikel 3 – barnets bästa ska beaktas vid alla beslut som rör barn•

  artikel 6 – alla barn har rätt till liv och utveckling•

  artikel 12 – barn har rätt att uttrycka sina åsikter och få dem respekterade i frågor som berör 

  dem

  •

  I varje upphandling som Region Örebro län genomför som rör barn ska barns perspektiv och 

  rättigheter tas med i planering och utförande. Detta avser till exempel byggnader som barn ska 

  vistas i, tjänster som ska hanteras av barn eller produkter som används av barn. 

  En bedömning har gjorts i behovsfasen inför upphandlingen om tjänster i denna upphandling rör 

  barn. Resultatet av bedömningen var att denna upphandling inte omfattar tjänster som direkt 

  påverkar barn.

