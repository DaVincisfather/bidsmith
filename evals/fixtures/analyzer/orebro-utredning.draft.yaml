  2.5 Teknisk och yrkesmässig kapacitet

  Anbudsgivaren ska förfoga över nödvändiga personalresurser som behövs för att utföra/genomföra 

  efterfrågat uppdrag. Anbudsgivaren ska, på förfrågan från Regionen, visa att kravet uppfylls
  genom 

  att bifoga en redogörelse där det framgår vilka personal- och tekniska resurser som anbudsgivaren 

