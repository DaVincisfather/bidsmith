  1.7.6 Utvärdering

  Utvärderingen sker efter värderingsprincipen ”bästa förhållandet mellan pris och 

  kvalitet” med hänsyn tagen till nedanstående kriterier. Kriterierna är definierade nedan 

  samt viktade i förhållande till varandra. 
   
  Det anbud med lägst utvärderingspris bedöms som ekonomisk mest fördelaktigt.

  utvärderingspris = offererat pris - avdrag per utvärderingskriterie kvalitet  
   
  Pris 

  Offererat pris multipliceras med angivna volymer i prismatrisen. 
   
  Kvalitet 

  Med kvalitet menas bedömd förmåga att genomföra uppdraget på det för köparen 

  mest fördelaktiga sättet.

  Kvaliteten räknas ut genom en referensgrupps bedömning och poängsättning av 

  kriterierna med angiven bedömningsskala.

  Bedömningen görs utifrån de beskrivningar (Arbetsprov) som anbudsgivaren lämnat.

