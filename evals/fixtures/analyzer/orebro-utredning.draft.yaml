  1 Leverantörens åtaganden i Uppförandekod för leverantörer 

  1.1 Leverantören ska fullgöra kontraktet i enlighet med åtagandena under avsnitt Uppförandekod 

  för leverantörer avseende mänskliga rättigheter, arbetares rättigheter, miljön och affärsetik
  samt 

  vidta de åtgärder som anges i detta kapitel/avtalsavsnitt. 

  1.2 Åtagandena gäller för all verksamhet med anknytning till det som anskaffas.

  2. Leverantörens process för tillbörlig aktsamhet

  2.1 För att säkerställa efterlevnaden av åtagandena i avsnitt Uppförandekod för leverantörer i
  punkt 

  1 ska leverantören ha en process för tillbörlig aktsamhet enligt punkt 2.2- 2.8. Processen ska
  vara 

  dokumenterad och tillämpas från kontraktsstart/annan tid som bestäms av Regionen. Genom denna 

  process ska leverantören identifiera, förhindra, begränsa och gottgöra negativ påverkan på 

  människor, miljö och samhälle i den egna verksamheten och i leveranskedjorna.

  Detta betyder att:  
   
  2.2 Leverantören ska integrera åtagandena i avsnitt Uppförandekod för leverantörer i policyer och 

  fördela ansvaret för policyer och tillbörlig aktsamhet genom att: 

  a) säkerställa att relevanta policyer, fastställda på högsta ledningsnivå, antas eller revideras
  så att 

  de överensstämmer med åtagandena i avsnitt Uppförandekod för leverantörer,  

  b) offentliggöra policyerna och kommunicera dem till rättighetshavare som berörs av den egna 

  verksamheten,  

  c) säkerställa att styrelsen tar hänsyn till policyerna när den fattar beslut, 

  d) utse en eller flera personer i ledningsfunktion som ansvariga för processen för tillbörlig
  aktsamhet 

  samt  

  e) tilldela ansvar för implementeringen av policyerna till anställda vars beslut mest sannolikt
  ökar 

  eller minskar riskerna för negativ påverkan.

  2.3 Leverantören ska identifiera och bedöma faktisk och potentiell negativ påverkan genom att 

  a) identifiera riskleverantörer,  

  b) kartlägga leveranskedjorna för riskleverantörer,  

  c) regelbundet undersöka riskerna för negativ påverkan i den egna verksamheten och i 

  leveranskedjorna för riskleverantörer,  

  d) samråda på ett meningsfullt sätt med rättighetshavare eller deras företrädare och hämta 

  information från trovärdiga och oberoende källor om samråd inte är möjligt i leveranskedjorna för 

  riskleverantörer,  

  e) uppmärksamma negativ påverkan på individer från grupper och befolkningar som har en ökad risk 

  för sårbarhet eller marginalisering, inklusive miljö- och människorättsförsvarare samt  

  f) prioritera de mest betydande riskerna utifrån sannolikhet och allvarlighet.

  2.4 Leverantören ska förhindra och begränsa faktisk och potentiell negativ påverkan som 

  leverantören orsakar eller bidrar till genom att  

  a) upphöra med aktiviteter som orsakar eller bidrar till negativ påverkan i den egna verksamheten 

  eller i leveranskedjorna,  

  b) upprätta åtgärdsplaner i meningsfulla samråd med berörda rättighetshavare eller deras 

  företrädare, med särskilt fokus på de mest betydande riskerna som har identifierats, samt  

  c) främja inköpsmetoder som inte försvårar för underleverantörer att efterleva åtagandena i
  avsnitt 

  Uppförandekod för leverantörer.

  2.5 Leverantören ska använda sitt inflytande för att förhindra och begränsa faktisk och
  potentiell 

  negativ påverkan kopplad till leverantörens verksamhet genom att: 

  a) bedöma riskleverantörer utifrån åtagandena i avsnitt Uppförandekod för leverantörer och 

  processen för 

  tillbörlig aktsamhet med särskilt fokus på de mest betydande riskerna som har identifierats,  

  b) upprätta åtgärdsplaner för riskleverantörer, med särskilt fokus på de mest betydande riskerna
  som 

  har identifierats,  

  c) skriftligen vidareförmedla åtagandena i avsnitt Uppförandekod för leverantörer (punkt 1) och 

  processen för tillbörlig aktsamhet (punkt 2) till riskleverantörer,  

  d) ålägga riskleverantörer att redogöra för leveranskedjorna i enlighet med kravet på transparens
  i 

  leveranskedjorna (punkt 4.4) samt  

