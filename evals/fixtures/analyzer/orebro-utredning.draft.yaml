  1.6.7 Anbudets giltighetstid

  Anbudet ska vara bindande till och med  2026-12-31 .  
     
  Om upphandlingen blir föremål för rättslig prövning ska Regionen ha rätt att förlänga anbudens 

  giltighetstid fram till dess att upphandlingskontrakt kan tecknas, dock i högst sex månader efter 

  angiven giltighetstid. Förlängning därutöver är endast möjlig efter ömsesidig överenskommelse 

  mellan parterna.

  Krav avseende anbudets giltighetstid accepteras.

  Ja/Nej. Ja krävs
   
  Leverantörskommentar tillåten

  Generell del (7)

  1.6.8 Sekretess

  Upphandlingen följer i sin helhet reglerna i Offentlighets- och Sekretesslagen.
   
  Enligt 19 kap 3 § andra stycket offentlighets- och sekretesslagen (2009:400) ("OSL") gäller
  absolut 

  sekretess till dess att tilldelningsbeslut har fattats i upphandlingen eller upphandlingen på
  annat sätt 

  avslutats.
   
  Efter att upphandlingen avslutats omfattas anbuden av offentlighetsprincipen som framgår av 

  Tryckfrihetsförordningens (1949:105) 2 kap 1 §. Principen innebär, i detta sammanhang, att kopia
  på 

  insända anbud ska lämnas ut om någon begär detta. Sekretessbeläggning till skydd för den enskilde 

  anbudsgivaren sker endast i undantagsfall om det av särskild anledning kan antas att den enskilde 

  lider skada om uppgiften röjs. Sekretessens omfattning begränsas i normalfallet dock till enstaka 

  meningar eller stycken. Observera att uppgifter som rör utvärderingskriterierna endast
  undantagsvis 

  är av sådan karaktär att de kan sekretessbeläggas. Regionen gör en självständig sekretessprövning.
   
  Observera att upphandlade varor, tjänster och priser kan komma att redovisas på Regionens 

  hemsida och intranät och införs normalt i Regionens e-handelssystem om detta används som 

  beställningsverktyg.
   
  Anbudsgivaren bör vid önskad sekretess lägga stor vikt på en utförlig sekretessbegäran då 

  Regionen inte har en skyldighet att hämta in kompletteringar av inlämnad sekretessbegäran. 

  Anbudsgivaren behöver därför noggrant beskriva vilka dokument, sidor samt stycken som det 

  önskas sekretess för.

  a. Önskar anbudsgivaren begära sekretess kring uppgift i anbudet? 

  Svara ja eller nej. 

  Ja/Nej

