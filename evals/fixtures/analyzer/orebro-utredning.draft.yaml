  2.2 Skatter och socialförsäkringsavgifter

  Anbudsgivare ska uppfylla i Sverige eller i hemlandet lagenligt ställda krav avseende sina 

  registrerings-, skatte- och avgiftsskyldigheter.
   
  Regionen kontrollerar att anbudsgivarna är registrerade hos Bolagsverket, innehar F/FA-skattsedel 

  samt har betalat föreskrivna skatter och sociala avgifter. Detta kontrolleras via Skatteverket.
   
  Ovanstående förfarande är endast tillämpbart i Sverige. Utländsk leverantör ska insända 

  dokumentation, som intyg på att denna fullgjort i hemlandet föreskrivna registreringar och
  betalningar 

  av skatter och avgifter. Dessa intyg eller motsvarande ska vara på svenska eller engelska och
  inte 

  vara äldre än tre månader räknat från sista anbudsdag. 
   
  En upphandlande myndighet ska utesluta en leverantör från att delta i en upphandling, om 

  myndigheten genom kontroll enligt 15 kap LOU eller på annat sätt får kännedom om att leverantören 

  inte har fullgjort sina skyldigheter avseende betalning av skatter eller socialförsäkringsavgifter
  i det 

  egna landet eller i det land där upphandlingen sker, och detta har fastställts genom ett bindande 

  domstolsavgörande eller myndighetsbeslut som har fått laga kraft.
      
