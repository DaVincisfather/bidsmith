  e) säkerställa möjligheten att tillfälligt stoppa leveranser från en underleverantör medan 

  förebyggande och begränsande åtgärder vidtas samt, vid allvarliga avvikelser som inte åtgärdas, 

  möjligheten att säga upp avtal med berörd underleverantör.

  2.6 Leverantören ska följa upp åtgärderna för att förhindra och begränsa faktisk och potentiell 

  negativ påverkan genom att: 

  a) följa upp upprättade åtgärdsplaner för den egna verksamheten och för riskleverantörer, med 

  särskilt fokus på de mest betydande riskerna som har identifierats,  

  b) samråda på ett meningsfullt sätt med rättighetshavare som berörs av den egna verksamheten, 

  eller deras företrädare, och i den mån det går i leveranskedjorna för riskleverantörer, samt  

  c) hantera avvikelser.

  2.7 Leverantören ska möjliggöra för intressenter såsom rättighetshavare, deras företrädare och 

  miljö- och människorättsförsvarare att framföra klagomål om de har farhågor om faktisk eller 

  potentiell negativ påverkan i leverantörens verksamhet eller i leveranskedjorna. Leverantören ska 

  hantera de klagomål som framförs.

  2.8 Leverantören ska, om leverantören har orsakat eller bidragit till faktisk negativ påverkan, 

  tillhandahålla gottgörelse genom att: 

  a) i den mån det går återställa drabbade rättighetshavare till den situation de skulle befinna sig
  i om 

  den negativa påverkan inte hade inträffat och möjliggöra en gottgörelse som står i proportion
  till 

  betydelsen och omfattningen av den negativa påverkan,  

  b) samråda på ett meningsfullt sätt med drabbade rättighetshavare eller deras företrädare om 

  lämplig gottgörelse samt  

  c) utvärdera om drabbade rättighetshavare är tillfredsställda med processen och resultatet

  3. Leverantörens rapporteringsskyldighet

  3.1 Om leverantören har skälig anledning att anta att det förekommer eller har förekommit en 

  allvarlig avvikelse i den egna verksamheten eller i leveranskedjorna ska leverantören inom två
  (2) 

  veckor rapportera de faktiska omständigheterna samt de genomförda och planerade åtgärderna till 

  Regionen i enlighet med punkt 2.2-2.8. 
   
  3.2 Allvarliga avvikelser avser tvångsarbete, barnarbete, arbetsförhållanden som medför fara för
  liv, 

  allvarlig miljöskada, storskalig korruption och attacker på miljö- och människorättsförsvarare.
  De 

  allvarliga avvikelserna definieras under avsnitt Uppförandekod för leverantörer.

  4. Uppföljning av de särskilda kontraktsvillkoren

  4.1 Leverantören ska delta i och samarbeta med den upphandlande organisationens uppföljning av 

  åtagandena under avsnitt Uppförandekod för leverantörer och under leverantörens process för 

  tillbörlig verksamhet. Uppföljningen kan komma att genomföras genom olika metoder såsom dialog, 

  egenrapportering, transparens i leveranskedjorna och revision.

  4.2 Dialog: Leverantören ska inom två (2) veckor från Regionens begäran delta i dialog om hur 

  leverantören efterlever sina åtaganden och processen för tillbörlig aktsamhet.

  4.3 Egenrapportering: Leverantören ska inom fyra (4) veckor från Regionens begäran skriftligen 

  redogöra för sin process för tillbörlig aktsamhet.

  4.4 Transparens i leveranskedjorna: Leverantören ska inom fyra (4) veckor från den upphandlande 

  organisationens begäran skriftligen redogöra för vilka underleverantörer leverantören använder
  för 

  att fullgöra kontraktet. Detta inkluderar de juridiska namnen och fysiska adresserna för: 

  • sluttillverkningsanläggningar för produkten/produkterna/sortimentet 

  • tillverkningsanläggningar ett (1) led bortom sluttillverkning av
  produkten/produkterna/sortimentet 

  • tillverkningsanläggningar för komponenten/komponenterna i produkten/produkterna/sortimentet 

  • smältverk/raffinörer för det tenn, volfram, tantal och guld (3TG), kobolt och glimmer som
  används i 

  produkten/produkterna/sortimentet 

  • ursprunget för råvaran som används i produkten/produkterna/sortimentet 

  • utvinningsanläggningar för råvaran som används i produkten/produkterna/sortimentet 

