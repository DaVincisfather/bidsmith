  5.7 Kvalitet och utförande

  5.7.1 Funktion, utförande och kvalitet

  Levererade tjänster enligt Avtalet ska till funktion, utförande och kvalitet helt överensstämma
  med de 

  specifikationer, anbudsprover och broschyrer, som Regionen fått i samband med upphandlingen.

  5.7.2 Tjänsteavvikelser

  Leverantören är skyldig att, förutom skyldighet enligt lag, skriftligen meddela Regionens 

  kontaktperson samt avropande enhet om avtalad tjänst varit utsatt för allvarligt tillbud eller
  avvikelse.

  Leverantören skall då skyndsamt inkomma med sådan information.

  5.7.3 Säker digitala kommunikation

  Region Örebro län skall använda säker digital kommunikation för digitala möten med leverantörer.

