  4.5 Revision

  4.5.1 Leverantören ska inom fyra (4) veckor från Regionens begäran möjliggöra för Regionen att 

  själv eller genom ombud utföra revisioner i leverantörens egen verksamhet. Leverantören ska också 

  möjliggöra för Regionen att själv eller genom ombud utföra revisioner i eventuella
  underleverantörers 

  verksamhet. Leverantören och eventuella underleverantörer ska i samband med revisioner 

  tillhandahålla den information som Regionen efterfrågar.

  4.5.2 Leverantören ska stå för kostnaden för de eventuella åter revisioner som krävs för att 

  kontrollera att leverantören har åtgärdat avvikelser.

  4.6 Rätt att dela resultat: Regionen har rätt att dela resultat av genomförd uppföljning med
  andra 

  regioner inom regionernas nationella samarbete för hållbar upphandling (Nationella kansliet för 

  hållbar upphandling) i de fall mottagande region redan har ett avtal med leverantören, som
  innehåller 

  motsvarande villkor för hållbara leveranskedjor.

  5. Hantering av avvikelser från kontraktsvillkoret

  5.1 Leverantören ska åtgärda avvikelser från åtagandena under punkten Uppförandekod för 

  leverantörer och processen för tillbörlig aktsamhet. Fokus ska vara på förbättringar i
  leverantörens 

  verksamhet och i leveranskedjorna. 
   
  5.2 Åtgärdsplan 

  Vid avvikelse från åtagandena under avsnitt Uppförandekod för leverantörer  eller under punkt 2 

  processen för tillbörlig aktsamhet ska leverantören upprätta en tidsatt åtgärdsplan som ska 

  godkännas av Regionen. Leverantören ska upprätta åtgärdsplanen senast två (2) veckor från 

  Regionens meddelande om avvikelsen. Åtgärdsplanen ska stå i proportion till avvikelsernas 

  allvarlighet och ska beskriva hur avvikelserna ska åtgärdas inom tidsramen. 
   
  5.3 Vite 

  Om leverantören inte rapporterar i enlighet med punkt 3, inte medverkar till uppföljning i
  enlighet med 

  punkt 4, underlåter att vidta åtgärder enligt punkterna 5.1 – 5.2 eller inte hanterar avvikelser
  i 

  enlighet med upprättad åtgärdsplan har regionen rätt att begära vite från leverantören.  
   
  Vite utgår med 10 000 SEK per påbörjad vecka som omständigheterna består. Vitet kan högst utgå 

  under 12 veckor.

