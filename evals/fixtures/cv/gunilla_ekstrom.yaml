cv_text: >-
  GUNILLA EKSTRÖM

  Senior utredare – kränkande särbehandling och arbetsmiljö


  PROFIL

  Gunilla Ekström är en av branschens mer erfarna utredare med 17 års samlad erfarenhet av
  arbetsmiljöfrågor, HR-utredningar och arbetsrättsligt stöd inom offentlig sektor. Hon är
  specialiserad på utredningar av kränkande särbehandling och arbetsmiljöutredningar i regioner och
  kommuner, och arbetar konsekvent enligt etablerad faktaundersökningsmetodik för att säkerställa
  rättssäkra, opartiska och väldokumenterade processer. Gunilla har en gedigen förankring i
  arbetsmiljörätt, inklusive Arbetsmiljöverkets föreskrifter om organisatorisk och social
  arbetsmiljö (AFS 2015:4), och kombinerar detta med skicklig intervjumetodik för att inhämta och
  värdera vittnesuppgifter i känsliga personalärenden. Hon anlitas ofta som oberoende part i
  komplexa och infekterade ärenden där förtroende, integritet och noggrannhet är avgörande. Gunilla
  kommunicerar obehindrat på både svenska och engelska, vilket underlättar i uppdrag med
  internationella inslag eller flerspråkig personal.


  KOMPETENSER

  - Utredningsmetodik och faktaundersökning enligt vedertagen modell för opartiska
  personalutredningar

  - Utredning av kränkande särbehandling och trakasserier på arbetsplatsen

  - Arbetsmiljörätt, med särskild inriktning på organisatorisk och social arbetsmiljö (OSA, AFS
  2015:4)

  - Intervjumetodik för utredningssamtal med inblandade parter och vittnen

  - HR och arbetsrätt, inklusive arbetsrättsligt stöd till chefer och HR-funktioner

  - Bred erfarenhet av offentlig sektor, särskilt regioner och kommuner

  - Svenska (modersmål)

  - Engelska (flytande, i tal och skrift)


  UPPDRAG I URVAL


  Oberoende utredare, Region Fjällmark, 2023–2024

  Gunilla anlitades som oberoende utredare för att genomföra en faktaundersökning av kränkande
  särbehandling inom en klinikledning. Uppdraget innefattade planering och genomförande av
  strukturerade intervjuer med berörda medarbetare och chefer, insamling och granskning av skriftlig
  dokumentation samt sammanställning av en objektiv utredningsrapport med bedömning och
  rekommendationer till regionens ledning. Fokus låg på att säkerställa en rättssäker process i
  enlighet med gällande arbetsmiljölagstiftning och regionens riktlinjer.


  Utredare, Region Bergslagen, 2019–2022

  Under tre år genomförde Gunilla en omfattande arbetsmiljökartläggning av en av regionens
  förvaltningar. Arbetet omfattade kartläggning av den organisatoriska och sociala arbetsmiljön
  utifrån AFS 2015:4, intervjuer med medarbetare på olika nivåer, analys av arbetsbelastning,
  ledarskap och samarbetsklimat samt framtagande av åtgärdsförslag för att stärka det systematiska
  arbetsmiljöarbetet i förvaltningen.


  HR-utredare, Vänersta kommun, 2012–2019

  Gunilla arbetade under sju år som HR-utredare med ansvar för HR-utredningar och arbetsrättsligt
  stöd till kommunens verksamheter. Rollen innefattade utredning av personalärenden, rådgivning till
  chefer i arbetsrättsliga frågor, medverkan vid förhandlingar samt kvalitetssäkring av
  utredningsprocesser i linje med kommunens riktlinjer och gällande lagstiftning. Denna period lade
  grunden för hennes senare specialisering inom faktaundersökningsmetodik och utredningar av
  kränkande särbehandling.


  SPRÅK

  - Svenska: modersmål

  - Engelska: flytande


  ÖVRIGT

  Gunilla har genom hela sin karriär arbetat uteslutande inom offentlig sektor, med regioner och
  kommuner som primära uppdragsgivare, och har därigenom djup förståelse för de särskilda krav på
  opartiskhet, transparens och dokumentation som gäller i denna sektor.
