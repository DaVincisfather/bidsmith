cv_text: >-
  CV – Elin Marklund


  Senior affärsutvecklare | Life Science & Healthtech


  Profil

  Elin Marklund är en senior affärsutvecklare med elva års erfarenhet av kommersialisering och
  innovationsstöd i forskningsnära miljöer inom life science och healthtech. Elin har en gedigen
  bakgrund av att driva affärsutveckling från tidig idé till marknadsredo produkt, och har arbetat
  både med etablerade bolag och med forskare och startups i tidiga skeden. Hon kombinerar
  strategiskt affärsmodelltänkande med praktisk erfarenhet av marknadsanalys och IP-strategi, och
  trivs i gränslandet mellan akademi, sjukvård och näringsliv. Elin är van att stötta bolag genom
  hela kommersialiseringsresan – från att identifiera marknadspotential och forma en hållbar
  affärsmodell till att bygga skydd kring innovationen och lansera på marknaden. Hon är flytande i
  svenska (modersmål) och engelska och arbetar obehindrat i internationella sammanhang.sveveveckling
  och samarbeten.


  Kompetenser

  - Affärsutveckling och kommersialisering av produkter och tjänster inom life science och
  healthtech

  - Affärsmodellering – utveckling och validering av hållbara affärsmodeller för forskningsnära
  bolag

  - Marknadsanalys – kartläggning av marknader, konkurrenter och kommersiella möjligheter

  - IP-strategi – rådgivning kring immaterialrättsligt skydd och strategisk hantering av
  innovationer

  - God vana att arbeta med forskare, startups och etablerade bolag i skärningspunkten
  akademi–näringsliv

  - Svenska (modersmål) och engelska (flytande) i tal och skrift


  Uppdrag i urval


  Affärsrådgivare, Mellansvenska tekniska högskolans innovationskontor (offentlig sektor), 2019–2024

  Elin arbetade som affärsrådgivare på innovationskontoret vid Mellansvenska tekniska högskolan, med
  fokus på att stötta forskningsnära healthtech-bolag i tidiga skeden. I rollen gav hon löpande
  affärsrådgivning till forskare och nystartade bolag kring kommersialisering av forskningsresultat,
  hjälpte team att formulera och testa affärsmodeller samt genomförde marknadsanalyser för att
  bedöma kommersiell potential. Ett återkommande inslag i uppdraget var rådgivning kring
  IP-strategi, för att säkerställa att innovationer skyddades på rätt sätt inför fortsatt
  kommersialisering och extern finansiering.


  Affärsutvecklingschef, Cura Diagnostics AB (privat sektor), 2017–2019

  Som affärsutvecklingschef på Cura Diagnostics AB ansvarade Elin för go-to-market-arbetet kring
  bolagets diagnostikplattform. Hon ledde arbetet med att forma och vidareutveckla affärsmodellen
  för plattformen, genomförde marknadsanalyser för att identifiera prioriterade segment och kunder,
  samt drev det kommersiella lanseringsarbetet i nära samarbete med produkt- och
  forskningsavdelningarna. Uppdraget innebar även löpande dialog med potentiella partners och kunder
  inom life science-sektorn, både i Sverige och internationellt.


  Affärscoach, Inkubatorn Spira (privat sektor), 2015–2017

  Hos inkubatorn Spira arbetade Elin som affärscoach med fokus på att stötta tidiga startups inom
  bland annat life science och healthtech. Hon coachade bolag i frågor rörande affärsutveckling och
  affärsmodellering, bistod i ansökningsprocesser för verifieringsmedel samt gav rådgivning kring
  IP-strategi för att hjälpa bolagen säkra sina innovationer i ett tidigt skede. Rollen innebar ett
  nära samarbete med grundare för att stärka deras kommersiella förmåga och förbereda dem för
  fortsatt tillväxt och extern finansiering.


  Språk

  - Svenska – modersmål

  - Engelska – flytande, i tal och skrift


  Övrigt

  Elin har genom sina uppdrag byggt en bred erfarenhet av hela innovationskedjan inom life science
  och healthtech – från forskningsnära idé till kommersiell produkt – och är van att navigera såväl
  offentlig innovationsstödsverksamhet som kommersiell affärsutveckling i privat sektor.
