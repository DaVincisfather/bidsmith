cv_text: >-
  CECILIA BERG

  Senior konsult – Digital transformation & Change Management


  PROFIL

  Cecilia Berg är en senior konsult med åtta års samlad erfarenhet av digital transformation inom
  privat sektor. Hon har byggt en gedigen bakgrund i att leda komplexa förändringsresor där
  verksamhet, teknik och människor möts, och hon har en särskild förmåga att driva
  förändringsledning parallellt med digitala initiativ så att organisationer faktiskt tar till sig
  nya arbetssätt. Cecilia arbetar strukturerat, är van att leverera i uppdrag med högt tempo och
  trivs bäst i roller där hon får kombinera strategiskt ledarskap med praktiskt genomförande. Hon
  kommunicerar obehindrat på svenska, som är hennes modersmål, och behärskar även engelska flytande
  i tal och skrift, vilket gör henne väl rustad för uppdrag i internationella och multinationella
  miljöer.


  KOMPETENSER

  - Digital transformation – erfarenhet av att driva och leda storskaliga digitaliseringsinitiativ i
  privat sektor

  - Change management – metodisk förändringsledning för att säkerställa att digitala satsningar får
  genomslag i organisationen

  - Djup förståelse för privat sektors förutsättningar, styrmodeller och affärslogik

  - Svenska (modersmål) och engelska (flytande) – god kommunikativ förmåga i internationella
  sammanhang


  UPPDRAG I URVAL


  Volvo Cars – DX-lead

  2020–2024, privat sektor

  Cecilia axlade rollen som DX-lead på Volvo Cars under fyra år och hade det övergripande
  ledaransvaret för fyra parallella workstreams inom bolagets digitala transformationsprogram. I
  rollen ansvarade hon för att sätta riktning och prioritering över de fyra spåren, säkerställa
  samordning mellan olika delprojekt samt driva förändringsledning för att förankra nya digitala
  arbetssätt i verksamheten. Uppdraget krävde en kombination av strategisk styrning och operativ
  uppföljning, där Cecilia löpande balanserade tekniska leveranser mot organisationens förmåga att
  ta emot förändring.


  IKEA – Digitaliseringskonsult

  2018–2020, privat sektor

  Som digitaliseringskonsult hos IKEA arbetade Cecilia med en omfattande e-handelsanalys som låg
  till grund för bolagets fortsatta digitala satsningar. Hon kartlade och analyserade digitala
  kundresor och e-handelsflöden, identifierade förbättringsområden och tog fram rekommendationer som
  stöttade IKEA:s fortsatta digitala transformation inom privat sektor. Uppdraget gav Cecilia en
  solid grund i att koppla samman digital analys med förändringsarbete i en stor, komplex
  organisation.


  SPRÅK

  - Svenska – modersmål

  - Engelska – flytande


  ÖVRIGT

  Cecilia har genom sina uppdrag byggt en bred erfarenhet av digital transformation och change
  management i privat sektor, med särskilt fokus på att leda tvärfunktionella initiativ och
  säkerställa att digitala förändringar verkligen implementeras och ger effekt i verksamheten.
