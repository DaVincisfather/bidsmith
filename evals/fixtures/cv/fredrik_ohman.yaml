id: fredrik_ohman
golden:
  competency_count: 7
cv_text: >-
  CV – Fredrik Öhman


  Profil

  Fredrik Öhman är förändringsledare och projektledare med sex års erfarenhet av uppdrag inom
  offentlig förvaltning. Han har byggt sin karriär kring avropsuppdrag mot myndigheter och regioner
  via ramavtal, och har en god förståelse för de krav på struktur, transparens och kvalitet som
  ramavtalsavrop innebär. Fredrik trivs i rollen som brobyggare mellan verksamhet och projekt, och
  han har en fallenhet för att leda workshops där olika intressenter ska enas kring gemensamma
  lösningar. Han talar svenska som modersmål och har god engelska, vilket underlättar i uppdrag med
  internationella inslag eller engelskspråkig dokumentation.


  Kompetenser

  - Förändringsledning – att driva och förankra verksamhetsförändringar hos både medarbetare och
  ledning

  - Projektledning – planering, styrning och uppföljning av projekt inom offentlig sektor

  - Ramavtalsavrop – erfarenhet av att arbeta inom ramarna för offentliga ramavtal och
  avropsprocesser

  - Offentlig förvaltning – god insikt i myndigheters och regioners arbetssätt och styrning

  - Workshopfacilitering – att leda workshops och möten för att samla in krav, skapa samsyn och
  driva beslut framåt

  - Svenska (modersmål)

  - Engelska (god nivå)


  Uppdrag


  Projektledare, Myndigheten för samhällsutveckling (2022–2024)

  Fredrik anlitades via ramavtalsavrop för att leda ett verksamhetsstödsuppdrag åt myndigheten. I
  rollen som projektledare ansvarade han för planering, resursallokering och löpande avstämningar
  med både beställare och leverantörer. Uppdraget innebar täta kontakter med olika delar av
  verksamheten, och Fredrik la stor vikt vid tydlig kommunikation och strukturerad uppföljning för
  att säkerställa att leveranserna höll både tidplan och kvalitet.


  Förändringsledare, Region Fjällmark (2021–2022)

  I samband med att Region Fjällmark skulle införa ett nytt ärendehanteringssystem tog Fredrik
  rollen som förändringsledare. Han arbetade nära verksamheten för att identifiera vilka arbetssätt
  som behövde anpassas, och höll i flera workshops med medarbetare och chefer för att förankra det
  nya systemet och de nya rutinerna. Fokus låg på att minska motstånd mot förändring och skapa
  förutsättningar för en smidig övergång, bland annat genom tydlig kommunikation och stöttande
  utbildningsinsatser.


  Processkonsult, Statens service- och förvaltningsnämnd (2020–2021)

  Fredrik anlitades för att kartlägga och förenkla nämndens administrativa ärendeflöden. Genom
  intervjuer, processkartläggning och ett antal facilitatorledda workshops med berörda handläggare
  identifierade han flaskhalsar och onödigt komplicerade steg i flödena. Resultatet blev ett antal
  konkreta förslag till förenklingar som förbättrade handläggningstiderna och minskade den
  administrativa bördan för medarbetarna.


  Anställningar

  2020–pågående: Konsult, uppdrag inom offentlig sektor via olika konsult- och ramavtalsuppdrag


  Språk

  - Svenska: Modersmål

  - Engelska: God nivå, både i tal och skrift


  Övrigt

  Fredrik har genom sina uppdrag skaffat sig en gedigen erfarenhet av hur offentlig förvaltning
  fungerar i praktiken, från myndighetsnivå till regional verksamhet. Han är van vid att navigera de
  särskilda krav som gäller vid avrop mot ramavtal, och kombinerar detta med ett strukturerat
  arbetssätt inom både förändrings- och projektledning.
