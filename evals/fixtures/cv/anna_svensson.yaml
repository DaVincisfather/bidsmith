id: anna_svensson
golden:
  competency_count: 7
cv_text: >-
  CV – Anna Svensson


  Profil

  Senior management consultant med tolv års erfarenhet av digital transformation, med särskilt djup
  kompetens inom offentlig sektor. Anna har under sin karriär lett komplexa förändringsresor där
  verksamhet, teknik och organisation möts, och hon kombinerar strategisk förmåga med hands-on
  erfarenhet av att driva stora molnmigrationsprojekt i offentlig förvaltning. Hon arbetar
  strukturerat enligt agila ramverk som SAFe och Scrum, och trivs i rollen som lead konsult där hon
  både sätter riktning och stöttar team i det dagliga genomförandet. Anna är svensktalande med
  svenska som modersmål och kommunicerar även flytande på engelska, vilket gör henne väl rustad för
  uppdrag med internationella beroenden eller leverantörer.


  Kompetenser

  - Digital transformation, med fokus på offentlig sektor och storskaliga förändringsprogram

  - Molnmigration – planering, genomförande och styrning av migrationsprojekt över flera
  förvaltningar

  - Djup förståelse för offentlig sektors förutsättningar, styrning och beslutsprocesser

  - Agila arbetssätt enligt SAFe och Scrum, från portföljnivå till teamnivå

  - Svenska (modersmål) och engelska (flytande) i tal och skrift


  Uppdrag i urval


  Stockholms stad – Lead konsult, 2019–2024

  Anna anlitades som lead konsult i ett av stadens största digitaliseringsinitiativ, en
  molnmigration som omfattade tolv olika förvaltningar. Hon ansvarade för att sätta den övergripande
  migrationsstrategin, koordinera arbetet mellan förvaltningarnas IT-organisationer och säkerställa
  att arbetet bedrevs enligt SAFe på programnivå. I rollen ingick att leda ett antal Scrum-team
  genom migrationens olika faser, hantera intressenter på hög nivå inom den kommunala organisationen
  samt säkerställa att digital transformation genomfördes med hänsyn till offentlig sektors
  särskilda krav på säkerhet, tillgänglighet och regelefterlevnad. Uppdraget sträckte sig över fem
  år och resulterade i att samtliga tolv förvaltningar migrerades till molnbaserad infrastruktur.


  Region Skåne – Digitaliseringsstrateg, 2015–2019

  Som digitaliseringsstrateg hos Region Skåne arbetade Anna med ett omfattande journalsystem-projekt
  inom ramen för regionens digitala transformation. Hon bidrog med strategisk rådgivning kring hur
  den nya lösningen skulle införas i en komplex offentlig verksamhet med många intressenter, och
  stöttade projektet med agila arbetssätt inspirerade av Scrum för att säkerställa leverans i
  iterativa steg. Anna arbetade nära vårdverksamheten för att förankra förändringen och säkerställa
  att journalsystemet möttes av god förändringsberedskap i organisationen. Uppdraget gav henne en
  gedigen förståelse för digitaliseringsprocesser inom offentlig sektor och lade grunden för hennes
  fortsatta specialisering inom området.


  Språk

  - Svenska – modersmål

  - Engelska – flytande


  Övrigt

  Anna har genom sina uppdrag byggt en stark profil inom digital transformation i offentlig sektor,
  med särskild spetskompetens inom molnmigration och agila arbetssätt (SAFe och Scrum). Hon är van
  vid att verka som lead konsult i uppdrag av stor omfattning och komplexitet, och levererar
  resultat i nära samarbete med både verksamhet och IT.
