id: bertil_larsson
golden:
  competency_count: 4
cv_text: >-
  CV – Bertil Larsson


  Profil

  Junior frontend-utvecklare med två års erfarenhet av att bygga användarvänliga webbgränssnitt.
  Bertil har en stabil grund inom React och TypeScript och har fördjupat sig i utveckling för
  e-handelsbranschen genom sitt nuvarande uppdrag. Han är svensktalande som modersmål och trivs i
  arbetsmiljöer där tydlig kommunikation med kollegor och kunder är viktig. Nyfiken, noggrann och
  angelägen om att fortsätta utvecklas som frontend-utvecklare.


  Kompetenser

  - Frontendutveckling med React, inklusive komponentbaserad arkitektur och hantering av tillstånd i
  användargränssnitt

  - Programmering i TypeScript för robustare och mer underhållbar kod

  - Erfarenhet av e-handelslösningar och de särskilda krav som ställs på kundvända gränssnitt inom
  denna domän

  - Svenska som modersmål, vilket underlättar kommunikation i svenska projektteam och med
  svensktalande kunder


  Uppdrag


  E-handelsstartup AB — Utvecklare, 2024–2026

  Bertil arbetade som utvecklare hos en e-handelsstartup där han ansvarade för frontendutvecklingen
  av bolagets kundportal. I rollen byggde han användargränssnitt i React och skrev typad kod i
  TypeScript för att säkerställa kvalitet och underhållbarhet. Arbetet innebar nära samarbete med
  produktteamet för att ta fram funktioner som stödde kundernas köpresa, samt kontinuerlig testning
  och förbättring av portalens användarupplevelse i en e-handelskontext.


  Språk

  - Svenska: modersmål

  - Engelska: goda kunskaper i tal och skrift


  Övrigt

  Bertil är i ett tidigt skede av sin karriär och söker uppdrag där han kan fortsätta bygga på sina
  kunskaper inom React och TypeScript, gärna inom e-handel eller liknande kundnära digitala
  tjänster.
