cv_text: >-
  David Lindqvist

  Senior verksamhetsanalytiker


  Profil

  David är en senior verksamhetsanalytiker med 14 års erfarenhet av att arbeta med
  processgenomlysning, ekonomistyrning och lokalförsörjning inom kommuner och regioner. Han har en
  gedigen bakgrund inom offentlig sektor och har byggt upp en djup förståelse för hur
  verksamhetsanalys kan kombineras med fastighetsekonomi och internhyresmodeller för att skapa
  hållbara och effektiva styrmodeller. David är känd för sin strukturerade metodik, sin förmåga att
  kartlägga komplexa processer och sin skicklighet i att genomföra kvalitativa intervjuer med
  verksamhetsföreträdare på alla nivåer. Han kommunicerar obehindrat på svenska, som är hans
  modersmål, och på flytande engelska, vilket gör honom väl lämpad för uppdrag med internationella
  kontaktytor eller rapportering.


  Kompetenser

  - Verksamhetsanalys och organisationsutredning inom offentlig sektor

  - Processkartläggning och processgenomlysning av komplexa verksamhetsflöden

  - Ekonomistyrning, inklusive utformning och översyn av styrmodeller

  - Internhyresmodeller för fastighetsförvaltning i kommunal och regional regi

  - Fastighetsekonomi och lokalförsörjningsstrategi

  - Intervjumetodik för kvalitativ datainsamling i verksamhetsnära utredningar

  - Djup erfarenhet av arbete i och med offentlig sektor, kommuner och regioner

  - Svenska (modersmål)

  - Engelska (flytande)


  Uppdrag i urval


  Vänersta kommun, Ansvarig analytiker, 2021–2024

  David ledde en omfattande genomlysning av fastighetsförvaltningens processer i Vänersta kommun.
  Uppdraget innebar att kartlägga hela flödet från behovsinventering till förvaltning och underhåll
  av kommunens lokaler, med syfte att identifiera flaskhalsar och ineffektiviteter. Utifrån analysen
  utformade han en ny internhyresmodell som skapade tydligare incitament för verksamheterna att
  nyttja lokalytor effektivt, samtidigt som modellen förenklade den ekonomiska uppföljningen för
  fastighetsförvaltningen. Arbetet byggde till stor del på strukturerade intervjuer med
  förvaltningschefer, ekonomer och lokalansvariga.


  Region Bergslagen, Verksamhetsanalytiker, 2018–2021

  Som verksamhetsanalytiker i Region Bergslagen ansvarade David för en översyn av regionservice
  ekonomistyrningsmodell. Uppdraget omfattade en genomgripande analys av hur ekonomiska resurser
  fördelades och följdes upp inom serviceorganisationen, samt förslag till en reviderad styrmodell
  som bättre speglade verksamhetens faktiska kostnadsdrivare. Han genomförde ett stort antal
  intervjuer med chefer och medarbetare inom regionservice för att säkerställa att den nya modellen
  var förankrad och praktiskt genomförbar.


  Lindefors kommun, Strategikonsult, 2014–2018

  Under sin tid som strategikonsult i Lindefors kommun arbetade David med att ta fram en
  lokalförsörjningsstrategi samt en tillhörande investeringsprocess för kommunens fastighetsbestånd.
  Uppdraget innefattade analys av befolkningsutveckling, verksamheternas framtida lokalbehov och
  kommunens ekonomiska förutsättningar för investeringar. Resultatet blev en strategisk plan som gav
  kommunen ett långsiktigt ramverk för beslut om nybyggnation, ombyggnation och avveckling av
  lokaler, med fastighetsekonomi som en central utgångspunkt.


  Språk

  - Svenska: Modersmål

  - Engelska: Flytande


  Övrigt

  David har genom sina uppdrag byggt en bred erfarenhet av att verka i gränslandet mellan
  verksamhet, ekonomi och fastighet inom offentlig sektor. Han trivs i rollen som brygga mellan
  analytiskt djup och praktisk implementering, och han lägger stor vikt vid att förankra sina
  slutsatser genom noggrann intervjumetodik och nära dialog med uppdragsgivarens verksamheter.
